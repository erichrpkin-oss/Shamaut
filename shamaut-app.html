{q:"ערך בסיסי לפי מחירון: ₪180,000. עלות תיקון לפני מע\"מ: ₪95,000.\n\nא. חשב עלות תיקון כולל מע\"מ 18%.\nב. חשב אחוז הנזק הגולמי.\nג. מהי המסקנה?",m:"א. ₪95,000 × 1.18 = ₪112,100\n\nב. 95,000 / 180,000 × 100 = 52.78%\n\nג. 52.78% < 60% → לא ניתן להכריז אובדן גמור.\n52.78% > 50% → אובדן גמור להלכה: המבטח רשאי לפצות ללא תיקון."},
{q:"פגיעה חזיתית חשפה:\n• קורת שלדה קדמית ימנית — עיוות\n• עמוד מרכב קדמי ימני — הסטה\n• קורת מסגרת גג קדמית — שבר\n\nא. חשב ניקוד לפי חוזר 23.\nב. האם נדרש דיווח?\nג. מה יירשם ברישיון?",m:"א. קורת שלדה קדמית = 9 | עמוד קדמי = 5 | קורת גג = 5\nסה\"כ: 19 נקודות\n\nב. 19 ≥ 10 → נזק בטיחותי מהותי.\nנדרש: תיקון במפעל + בדיקת תקנה 309 + תעודת בדיקה + דיווח שמאי.\n\nג. ברישיון: \"נזק בטיחותי תוקן ונבדק\""},
{q:"שמאי הביטוח העריך ₪15,000. שמאי מטעמך העריך ₪28,000.\n\nא. מה המנגנון החוקי?\nב. כיצד נבחר השמאי?\nג. מה מעמד ההכרעה?\nד. מי ישלם ומתי?",m:"א. מנגנון שמאי מכריע — פנייה למוקד \"ניהולית\".\nפנייה ישירה = חסרת נפקות.\n\nב. אקראית לפי: אזור גיאוגרפי + סוג רכב.\n\nג. ההכרעה מחייבת שני הצדדים.\n\nד. שמאי המכריע קובע מי ישלם. המבטח ישלם תוך 10 ימי עבודה."},
{q:"פרט את כל המרכיבים החובה בחוות דעת שמאית. ציין לפחות 12 מרכיבים.",m:"① זיהוי הרכב: תוצר, דגם, שנת ייצור, VIN, קוד דגם, מד נסועה\n② צילומי הרכב מסביב\n③ פרטי בעל הרכב / נהג\n④ פרטי המבטחת (פוליסה + תביעה)\n⑤ תאריך האירוע ומועד הבדיקה\n⑥ תיאור הנזק — מילולי ומצולם\n⑦ פרוט חלפים: מק\"ט + סיווג + מחיר\n⑧ שעות עבודה לפי מקצועות\n⑨ האם נדרשת בדיקת תקנה 309\n⑩ אחוז הנזק הגולמי\n⑪ שווי הרכב + שיטת חישוב\n⑫ ירידת ערך + פירוט\n⑬ המלצה: בר-תיקון / אובדן להלכה / אובדן גמור\n⑭ הצהרת שמאי + שם + רישיון + חתימה"},
{q:"מהם 5 העיסוקים האסורים לשמאי רכב? הסבר מדוע כל אחד הוא ניגוד עניינים.",m:"① עסקי ביטוח — עדיפות לאינטרס חברת הביטוח.\n② תיווך/מכירת רכב — הערכות ישרתו אינטרס עסקי.\n③ ניהול מוסך — הפניית עבודות לעצמו.\n④ קצין בטיחות — חפיפת אינטרסים.\n⑤ כל עיסוק בניגוד עניינים — שמאי חייב להישאר עצמאי לחלוטין."},
{q:"מה ההבדל בין \"אובדן גמור\", \"אובדן גמור להלכה\" ו\"בר-תיקון\"?\nציין אחוזים, הגדרה, והשלכות מעשיות.",m:"בר-תיקון: נזק גולמי < 50%. הרכב מתוקן. פיצוי = עלות תיקון + ירידת ערך.\n\nאובדן גמור להלכה: נזק גולמי ≥ 50% ו-< 60%. המבטח רשאי לפצות ללא תיקון — לפי תנאי הפוליסה.\n\nאובדן גמור: נזק גולמי ≥ 60%. חובת דיווח תוך 45 יום. פיצוי = שווי שוק פחות שרידים."},
{q:"רכב אודי Q3 2024. ערך בסיס ₪342,000. עלות תיקון ₪84,010 לפני מע\"מ.\n\nא. חשב אחוז נזק גולמי.\nב. האם הרכב בר-תיקון?\nג. אילו מערכות נוספות יש לבדוק?",m:"א. 84,010 / 342,000 × 100 = 24.6%\n\nב. כן — 24.6% < 60% → בר-תיקון.\n\nג. בנוסף לפח:\n• קורות אורך ורוחב\n• מתלים קדמיים\n• מערכת היגוי\n• רדיאטור ומאוורר\n• כריות אוויר ומחשב SRS\n• סריקת OBD"},
{q:"שמאי חתם ללא בדיקה פיזית. לקוח ביקש חוות דעת מכנית על סיבת קלקול מנוע.\n\nא. האם שמאי רשאי לחתום ללא בדיקה?\nב. האם שמאי יכול לתת חוות דעת מכנית?\nג. מה הסנקציה?",m:"א. לא. חובת בדיקה פיזית עצמאית. חתימה ללא בדיקה = הפרת אתיקה.\n\nב. בדרך כלל לא. שמאי = הערכה כלכלית בלבד. חריג: אם יש לו הכשרה מכנית מוכחת.\n\nג. דין משמעתי, השעייה, ביטול חוות הדעת בבית משפט."},
{q:"פרט את תהליך הדיווח על נזק בטיחותי מהותי לפי חוזר 23 בשלושה מקרים:\nא. נזק שנבדק ע\"י שמאי ותוקן.\nב. נזק שלא נבדק ע\"י שמאי ותוקן.\nג. רכב שהוכרז אובדן להלכה ולא תוקן.",m:"א. נבדק ע\"י שמאי ותוקן:\nשמאי קובע אם הנזק מהותי (ניקוד ≥ 10). לאחר תעודת הבדיקה — השמאי מדווח לרשות.\n\nב. לא נבדק ע\"י שמאי ותוקן:\nהמוסך ממלא טופס 3 למכון בדיקה. מכון הבדיקה מדווח לרשות.\n\nג. הוכרז אובדן להלכה:\nאם הרכב נמכר לתיקון — המוסך ממלא טופס 3. מכון הבדיקה מדווח."},

function carSVG(damages){
  const hit=new Set(damages);
  const Z={front:"M 80 28 Q 120 14 160 28 L 168 58 L 72 58 Z",frontL:"M 72 58 L 50 54 L 46 90 L 72 90 Z",frontR:"M 168 58 L 190 54 L 194 90 L 168 90 Z",sideL:"M 72 90 L 46 90 L 42 170 L 72 170 Z",sideR:"M 168 90 L 194 90 L 198 170 L 168 170 Z",rearL:"M 72 170 L 46 170 L 50 210 L 72 210 Z",rearR:"M 168 170 L 194 170 L 190 210 L 168 210 Z",rear:"M 72 210 L 80 234 Q 120 248 160 234 L 168 210 Z",roof:"M 76 74 L 164 74 L 164 194 L 76 194 Z"};
  const C={front:[120,40],frontL:[57,72],frontR:[183,72],sideL:[52,128],sideR:[188,128],rearL:[57,192],rearR:[183,192],rear:[120,224],roof:[120,134]};
  let p='',m='';
  for(const[id,path]of Object.entries(Z)){
    p+=`<path d="${path}" fill="${hit.has(id)?'rgba(200,40,40,0.2)':'none'}" stroke="${hit.has(id)?'#c82828':'none'}" stroke-width="2"/>`;
  }
  damages.forEach(id=>{
    const c=C[id];if(!c)return;
    m+=`<circle cx="${c[0]}" cy="${c[1]}" r="9" fill="#c82828" opacity="0.9"/><text x="${c[0]}" y="${c[1]+4}" text-anchor="middle" font-size="11" fill="white" font-weight="bold">x</text>`;
  });
  return `<svg viewBox="0 0 240 262" width="155" height="170"><rect x="46" y="54" width="148" height="158" rx="8" fill="#f0f0f0" stroke="#ccc" stroke-width="1.5"/><path d="M 79 60 Q 120 48 161 60 L 157 83 L 83 83 Z" fill="#ddeeff" stroke="#bbb" stroke-width="1"/><path d="M 79 203 Q 120 216 161 203 L 157 183 L 83 183 Z" fill="#ddeeff" stroke="#bbb" stroke-width="1"/><ellipse cx="52" cy="70" rx="11" ry="13" fill="#333"/><ellipse cx="188" cy="70" rx="11" ry="13" fill="#333"/><ellipse cx="52" cy="184" rx="11" ry="13" fill="#333"/><ellipse cx="188" cy="184" rx="11" ry="13" fill="#333"/>${p}${m}</svg>`;
}

function shuffle(a){return[...a].sort(()=>Math.random()-.5)}
S.mcQs=shuffle(MC_Q).slice(0,15);
S.vqQs=shuffle(VISUAL_Q);

function R(){
  const m=document.getElementById('main');
  document.getElementById('hero').style.display=S.tab==='topics'?'':'none';
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===S.tab));
  let h='';
  if(S.tab==='topics')h=rTopics();
  else if(S.tab==='mc')h=rMC();
  else if(S.tab==='visual')h=rVisual();
  else if(S.tab==='written')h=rWritten();
  else if(S.tab==='shoma')h=rShoma();
  else if(S.tab==='ai')h=rAI();
  m.innerHTML=h;m.className='fu';
  bind();
}

function rTopics(){
  if(S.topic){
    const t=S.topic;
    const acc=t.chapters.map((ch,i)=>`<div class="acc-item"><button class="acc-btn" data-acc="${i}"><span class="acc-label">${ch.t}</span><span class="acc-icon ${S.topicCh===i?'open':''}">+</span></button><div class="acc-body ${S.topicCh===i?'open':''}"><pre>${ch.b}</pre></div></div>`).join('');

  }
  return `<h1 class="pg-title">חומר לימוד</h1><p class="pg-sub">בחר נושא</p><div class="topic-grid">${TOPICS.map((t,i)=>`<div class="tc fu" data-topic="${i}" style="animation-delay:${i*.04}s"><div class="tc-num">${t.idx}</div><div class="tc-name">${t.title}</div><div class="tc-sub">${t.sub}</div><div class="tc-arr">${t.chapters.length} פרקים →</div></div>`).join('')}</div>`;

function scoreScreen(pct,s,l,rId){
  return `<div class="score-scr fu"><div class="score-n">${pct}<span style="font-size:50px">%</span></div><div class="score-div"></div><div class="score-d">${s} נכון מתוך ${l}</div><div class="score-m">${pct>=85?'מצוין — מוכן לבחינה':pct>=70?'טוב מאוד':'חזור על החומר'}</div><button class="btn-p" id="${rId}">נסה שוב</button></div>`;
}

function examOpts(opts,sel,locked,ansIdx,pfx){
  return opts.map((o,i)=>{
    let cls='opt';
    if(!locked&&sel===i)cls+=' sel';
    if(locked&&i===ansIdx)cls+=' ok';
    if(locked&&sel===i&&i!==ansIdx)cls+=' bad';
    const lt=locked&&i===ansIdx?'✓':locked&&sel===i&&i!==ansIdx?'✗':String.fromCharCode(65+i);
    return `<button class="${cls}" data-${pfx}="${i}" ${locked?'disabled':''}><span class="opt-lt">${lt}</span>${o}</button>`;
  }).join('');
}

function rMC(){
  if(S.mcDone)return scoreScreen(Math.round(S.mcScore/S.mcQs.length*100),S.mcScore,S.mcQs.length,'mcR');
  const q=S.mcQs[S.mcCur];const pb=(S.mcCur/S.mcQs.length*100).toFixed(1);
  const expl=S.mcLocked?`<div class="expl fu">${q.x}</div>`:'';
  const btn=!S.mcLocked?`<button class="btn-p" id="mcC" ${S.mcSel===null?'disabled':''}>אשר</button>`:`<button class="btn-p" id="mcN">${S.mcCur+1>=S.mcQs.length?'לתוצאות':'הבא'}</button>`;
  return `<h1 class="pg-title">מבחן אמריקאי</h1><p class="pg-sub">שאלה ${S.mcCur+1} מתוך ${S.mcQs.length}</p><div style="max-width:600px;margin:0 auto"><div class="prog"><div class="prog-fill" style="width:${pb}%"></div></div><div class="exam-meta"><span>${S.mcCur+1}/${S.mcQs.length}</span><span>${S.mcScore} נכון</span></div><div class="q-text">${q.q}</div><div class="opts">${examOpts(q.o,S.mcSel,S.mcLocked,q.a,'mco')}</div>${expl}<div class="act">${btn}</div></div>`;
}

function rShoma(){
  const sc=SHOMA_CASES[S.shCase];
  const SNAMES=['שלב 1 — חלקים','שלב 2 — עבודות','שלב 3 — חישוב','שלב 4 — ירידת ערך'];
  const SINST=['סמן את כל החלקים שנפגעו:','בחר את עבודות התיקון:','חישוב אוטומטי של השומה:','קבע ירידת ערך לכל אזור:'];
  const pT=sc.parts.filter(p=>S.shParts[p.id]).reduce((a,p)=>a+p.price,0);
  const wT=sc.works.filter(w=>S.shWorks[w.id]).reduce((a,w)=>a+w.hours*w.rate,0);
  const bef=pT+wT;const vat=Math.round(bef*1.18);const base=sc.car.base;
  const npct=base>0?(bef/base*100):0;const ns=npct.toFixed(1)+'%';
  const stat=npct>=60?'אובדן גמור 🔴':npct>=50?'אובדן להלכה 🟡':'בר-תיקון ✅';
  const yT=sc.yridaZones.reduce((a,z,i)=>a+(S.shYrida[i]||0),0);const yN=Math.round(base*yT/100);
  const ctabs=SHOMA_CASES.map((c,i)=>`<button class="ctab ${S.shCase===i?'active':''}" data-sc="${i}">מקרה ${i+1}</button>`).join('');
  const sbar=[0,1,2,3].map(i=>`<div class="ss ${i<S.shStep?'done':i===S.shStep?'cur':''}"></div>`).join('');
  let sc_html='';
  if(S.shStep===0){
    sc_html=sc.parts.map(p=>`<label class="ci ${S.shParts[p.id]?'on':''}" data-lp="${p.id}"><input type="checkbox" ${S.shParts[p.id]?'checked':''} data-cp="${p.id}"><span class="ci-l">${p.label} <span class="ci-s">— ${p.action}</span></span><span class="ci-p">₪${p.price.toLocaleString()}</span></label>`).join('');
    if(sc.partHint)sc_html+=`<button class="hbtn" id="shH">${S.shHint?'הסתר':'💡 רמז'}</button>`;
    if(S.shHint)sc_html+=`<div class="hbox">${sc.partHint}</div>`;
  }else if(S.shStep===1){
    sc_html=sc.works.map(w=>`<label class="ci ${S.shWorks[w.id]?'on':''}" data-lw="${w.id}"><input type="checkbox" ${S.shWorks[w.id]?'checked':''} data-cw="${w.id}"><span class="ci-l">${w.label} <span class="ci-s">— ${w.hours} שע' × ₪${w.rate}</span></span><span class="ci-p">₪${(w.hours*w.rate).toLocaleString()}</span></label>`).join('');
    if(sc.workHint)sc_html+=`<button class="hbtn" id="shH">${S.shHint?'הסתר':'💡 רמז'}</button>`;
    if(S.shHint)sc_html+=`<div class="hbox">${sc.workHint}</div>`;
  }else if(S.shStep===2){
    sc_html=[['חלקים (לפני מע"מ)','₪'+pT.toLocaleString(),false],['עבודות (לפני מע"מ)','₪'+wT.toLocaleString(),false],['סה"כ לפני מע"מ','₪'+bef.toLocaleString(),false],['מע"מ 18%','₪'+Math.round(bef*.18).toLocaleString(),false],['סה"כ כולל מע"מ','₪'+vat.toLocaleString(),false],['ערך בסיס מחירון','₪'+base.toLocaleString(),false],['אחוז נזק גולמי',ns,true],['מצב הרכב',stat,true]].map(([k,v,h])=>`<div class="cr ${h?'hi':''}"><span class="crk">${k}</span><span class="crv">${v}</span></div>`).join('');
  }else{
    sc_html=sc.yridaZones.map((z,i)=>`<div class="yi"><div class="yil">${z.label}</div><div class="yrow"><input type="range" min="0" max="${z.max}" step="0.5" value="${S.shYrida[i]||0}" data-yr="${i}"><span class="ypct">${S.shYrida[i]||0}%</span></div><div class="ymax">מקסימום: ${z.max}%</div></div>`).join('');
    sc_html+=`<div class="ytot"><span>סה"כ ירידת ערך</span><span>${yT}% = ₪${yN.toLocaleString()}</span></div>`;
  }
  const res=S.shResult?`<div class="rbox fu"><div class="rlbl">סיכום השומה</div><div class="rgrid"><div class="ri"><div class="rik">עלות תיקון</div><div class="riv">₪${vat.toLocaleString()}</div></div><div class="ri"><div class="rik">ירידת ערך</div><div class="riv">₪${yN.toLocaleString()}</div></div><div class="ri"><div class="rik">פיצוי כולל</div><div class="riv">₪${(vat+yN).toLocaleString()}</div></div><div class="ri"><div class="rik">מצב הרכב</div><div class="riv">${stat}</div></div></div></div>`:'';
  const pBtn=`<button class="btn-o" id="shP" ${S.shStep===0?'disabled':''}>← חזרה</button>`;
  const nBtn=S.shResult?`<button class="btn-p" id="shRS">התחל מחדש</button>`:`<button class="btn-p" id="shN">${S.shStep===3?'סיים שומה':'הבא →'}</button>`;
  return `<h1 class="pg-title">בניית שומה</h1><p class="pg-sub">תרגיל מעשי — בנה שומה אמיתית שלב אחר שלב</p><div style="max-width:680px;margin:0 auto"><div class="ctabs">${ctabs}</div><div class="ch">${carSVG(sc.d)}<div style="flex:1;min-width:180px"><div style="font-size:10px;font-weight:600;letter-spacing:2px;color:#6e6e73;text-transform:uppercase;margin-bottom:8px">תרגיל שומה</div><div style="font-size:18px;font-weight:700;margin-bottom:6px">${sc.title}</div><div style="font-size:13px;color:#3d3d3f;line-height:1.6;margin-bottom:8px">${sc.desc}</div><div style="font-size:12px;color:#6e6e73">📅 ${sc.car.year} 🛣 ${sc.car.km.toLocaleString()} ק"מ 💰 ₪${sc.car.base.toLocaleString()}</div></div></div><div class="stepbar">${sbar}</div><div class="scard"><div class="slbl">${SNAMES[S.shStep]}</div><div class="sinst">${SINST[S.shStep]}</div>${sc_html}</div>${res}<div class="navb">${pBtn}${nBtn}</div></div>`;

function rAI(){
  const bubs=S.aiMsgs.map(m=>`<div class="msg ${m.r==='u'?'u':'a'}"><div class="bub ${m.r==='u'?'u':'a'}">${m.t.replace(/</g,'&lt;')}</div></div>`).join('');

  const warn=!S.apiKey?`<div class="api-warn">⚠️ הכנס API Key של Anthropic כדי שה-AI יעבוד</div>`:'';

  return `<h1 class="pg-title">שאל AI</h1><p class="pg-sub">מומחה שמאות רכב זמין לכל שאלה</p><div class="chat-w"><div class="msgs" id="CM">${bubs}${load}</div>${quick}${warn}<div class="api-row"><input class="api-inp" id="akin" type="password" placeholder="API Key של Anthropic (sk-ant-...)" value="${S.apiKey}"></div><div class="cinrow"><input class="cinp" id="cin" placeholder="שאל שאלה..." value="${S.aiInput}"><button class="csend" id="csend" ${S.aiLoading||!S.aiInput?'disabled':''}>שלח</button></div></div>`;

function bind(){
  document.querySelectorAll('.tab-btn').forEach(b=>b.onclick=()=>{S.tab=b.dataset.tab;R();window.scrollTo(0,0)});
  document.querySelectorAll('.tc').forEach(c=>c.onclick=()=>{S.topic=TOPICS[+c.dataset.topic];S.topicCh=null;R()});
  const bk=document.getElementById('bk');if(bk)bk.onclick=()=>{S.topic=null;R()};
  document.querySelectorAll('.acc-btn').forEach(b=>b.onclick=()=>{const i=+b.dataset.acc;S.topicCh=S.topicCh===i?null:i;R()});
  // MC
  document.querySelectorAll('[data-mco]').forEach(b=>b.onclick=()=>{if(!S.mcLocked){S.mcSel=+b.dataset.mco;R()}});
  const mcC=document.getElementById('mcC');if(mcC)mcC.onclick=()=>{if(S.mcSel===null||S.mcLocked)return;S.mcLocked=true;if(S.mcSel===S.mcQs[S.mcCur].a)S.mcScore++;R()};
  const mcN=document.getElementById('mcN');if(mcN)mcN.onclick=()=>{if(S.mcCur+1>=S.mcQs.length)S.mcDone=true;else{S.mcCur++;S.mcSel=null;S.mcLocked=false;}R()};
  const mcR=document.getElementById('mcR');if(mcR)mcR.onclick=()=>{S.mcQs=shuffle(MC_Q).slice(0,15);S.mcCur=0;S.mcSel=null;S.mcLocked=false;S.mcScore=0;S.mcDone=false;R()};
  // Visual
  document.querySelectorAll('[data-vqo]').forEach(b=>b.onclick=()=>{if(!S.vqLocked){S.vqSel=+b.dataset.vqo;R()}});
  const vqC=document.getElementById('vqC');if(vqC)vqC.onclick=()=>{if(S.vqSel===null||S.vqLocked)return;S.vqLocked=true;if(S.vqSel===S.vqQs[S.vqCur].a)S.vqScore++;R()};
  const vqN=document.getElementById('vqN');if(vqN)vqN.onclick=()=>{if(S.vqCur+1>=S.vqQs.length)S.vqDone=true;else{S.vqCur++;S.vqSel=null;S.vqLocked=false;}R()};
  const vqR=document.getElementById('vqR');if(vqR)vqR.onclick=()=>{S.vqQs=shuffle(VISUAL_Q);S.vqCur=0;S.vqSel=null;S.vqLocked=false;S.vqScore=0;S.vqDone=false;R()};
  // Written
  document.querySelectorAll('[data-wt]').forEach(b=>b.onclick=()=>{S.wqCur=+b.dataset.wt;S.wqAns='';S.wqShow=false;R()});
  const wqT=document.getElementById('wqT');if(wqT)wqT.onclick=()=>{S.wqShow=!S.wqShow;R()};
  const wqA=document.getElementById('wqA');if(wqA)wqA.oninput=e=>S.wqAns=e.target.value;
  // Shoma
  document.querySelectorAll('[data-sc]').forEach(b=>b.onclick=()=>{S.shCase=+b.dataset.sc;S.shStep=0;S.shParts={};S.shWorks={};S.shYrida={};S.shHint=false;S.shResult=false;R()});
  document.querySelectorAll('[data-cp]').forEach(i=>i.onchange=e=>{S.shParts[e.target.dataset.cp]=e.target.checked;R()});
  document.querySelectorAll('[data-cw]').forEach(i=>i.onchange=e=>{S.shWorks[e.target.dataset.cw]=e.target.checked;R()});
  document.querySelectorAll('[data-yr]').forEach(i=>i.oninput=e=>{S.shYrida[+e.target.dataset.yr]=parseFloat(e.target.value);R()});
  const shH=document.getElementById('shH');if(shH)shH.onclick=()=>{S.shHint=!S.shHint;R()};
  const shP=document.getElementById('shP');if(shP)shP.onclick=()=>{if(S.shStep>0){S.shStep--;S.shHint=false;R()}};
  const shN=document.getElementById('shN');if(shN)shN.onclick=()=>{if(S.shStep===3){S.shResult=true;R();}else{S.shStep++;S.shHint=false;R()}};
  const shRS=document.getElementById('shRS');if(shRS)shRS.onclick=()=>{S.shStep=0;S.shParts={};S.shWorks={};S.shYrida={};S.shHint=false;S.shResult=false;R()};
  // AI
  const akin=document.getElementById('akin');if(akin)akin.oninput=e=>{S.apiKey=e.target.value;localStorage.setItem('sk',S.apiKey)};
  const cin=document.getElementById('cin');
  if(cin){
    cin.oninput=e=>{S.aiInput=e.target.value;const b=document.getElementById('csend');if(b)b.disabled=!S.aiInput||S.aiLoading};
    cin.onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey)sendAI()};
  }
  const csend=document.getElementById('csend');if(csend)csend.onclick=sendAI;
  document.querySelectorAll('[data-q]').forEach(b=>b.onclick=()=>{S.aiInput=b.dataset.q;sendAI()});
  const cm=document.getElementById('CM');if(cm)cm.scrollTop=cm.scrollHeight;
}

async function sendAI(){
  const t=S.aiInput.trim();if(!t||S.aiLoading)return;
  S.aiInput='';S.aiMsgs.push({r:'u',t});S.aiLoading=true;R();
  const hist=S.aiMsgs.slice(0,-1).map(m=>({role:m.r==='a'?'assistant':'user',content:m.t}));
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','x-api-key':S.apiKey,'anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,
        system:'אתה מומחה שמאות רכב בישראל. ענה בעברית בלבד, בצורה ברורה ומדויקת. מתמחה: שווי רכב, נזק גולמי, ירידת ערך (טבלאות 2025), תקנות 266/309, שמאי מכריע, חוזר 23.',
        messages:[...hist,{role:'user',content:t}]})
    });
    const d=await res.json();
    if(d.error)throw new Error(d.error.message);
    const reply=d.content?.filter(c=>c.type==='text').map(c=>c.text).join('')||'לא התקבלה תשובה.';
    S.aiMsgs.push({r:'a',t:reply});
  }catch(e){S.aiMsgs.push({r:'a',t:'שגיאה: '+(e.message||'נסה שוב')});}
  S.aiLoading=false;R();
}

R();

</script>
