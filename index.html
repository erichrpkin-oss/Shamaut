<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Vehicle Appraisal</title>
<style>

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,Arial,sans-serif;background:#f5f5f7;color:#1d1d1f;direction:rtl;-webkit-font-smoothing:antialiased}
.nav{background:#fff;border-bottom:1px solid #e0e0e0;padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.nav-brand{font-size:17px;font-weight:700}
.btn{padding:8px 16px;border:none;border-radius:980px;cursor:pointer;font-size:13px;font-weight:600;background:#1d1d1f;color:#fff;font-family:inherit}
.btn-s{background:rgba(0,0,0,.08);color:#1d1d1f}
.btn-g{background:#bf9b30;color:#fff}
.btn-r{background:transparent;color:#c0392b;border:none;cursor:pointer;font-size:12px;font-family:inherit}
.hero{padding:44px 28px 28px}
.hero h2{font-size:40px;font-weight:700;letter-spacing:-.02em;margin-bottom:10px}
.hero p{font-size:15px;color:#6e6e73;font-weight:300}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:0 28px 28px}
.card{background:#fff;border-radius:14px;padding:22px;box-shadow:0 2px 10px rgba(0,0,0,.07);cursor:pointer;border:2px solid transparent;transition:transform .2s,border-color .2s}
.card:hover{transform:translateY(-2px)}
.card.active{border-color:#1d1d1f}
.card h3{font-size:16px;font-weight:700;margin-bottom:4px}
.card p{font-size:11px;color:#6e6e73}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:0 28px 24px}
.stat{background:#fff;border-radius:12px;padding:14px 18px;box-shadow:0 2px 10px rgba(0,0,0,.07)}
.stat-n{font-size:26px;font-weight:700}
.stat-l{font-size:10px;color:#6e6e73;margin-top:3px}
.rlist{padding:0 28px 36px}
.rlist-lbl{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#999;margin-bottom:10px}
.ri{background:#fff;border-radius:12px;padding:14px 18px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 10px rgba(0,0,0,.07);gap:8px;flex-wrap:wrap}
.ri-n{font-size:14px;font-weight:600}
.ri-m{font-size:11px;color:#6e6e73;margin-top:2px}
.ri-acts{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:980px;font-size:10px;font-weight:600}
.bg{background:rgba(29,122,74,.1);color:#1d7a4a}
.ba{background:rgba(138,90,0,.1);color:#8a5a00}
.br{background:rgba(192,57,43,.1);color:#c0392b}
.noprof{background:rgba(191,155,48,.1);border:1px solid rgba(191,155,48,.3);border-radius:10px;padding:12px 16px;font-size:13px;color:#7a5a00;margin:0 28px 28px}
.editor{display:grid;grid-template-columns:1fr 1fr;height:calc(100vh - 52px);overflow:hidden}
.eleft{overflow-y:auto;padding:20px 24px;border-left:1px solid #e0e0e0;background:#fff}
.eright{display:flex;flex-direction:column;background:#f5f5f7;overflow:hidden}
.sec{margin-bottom:22px}
.sec-t{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#6e6e73;margin-bottom:10px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px 18px}
.s2{grid-column:span 2}
.fld{display:flex;flex-direction:column;gap:5px}
.fld label{font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#999}
.fld input,.fld select,.fld textarea{background:rgba(0,0,0,.05);border:none;border-radius:8px;padding:10px 12px;font-size:14px;color:#1d1d1f;outline:none;width:100%;font-family:inherit;-webkit-appearance:none}
.fld input:focus,.fld select:focus,.fld textarea:focus{background:rgba(0,0,0,.09)}
.fld textarea{resize:vertical;min-height:70px;line-height:1.5}
.fld-ro input{background:rgba(191,155,48,.1)!important;color:#8b6914!important;font-weight:600!important}
.lookup{background:rgba(0,113,227,.07);border:1px solid rgba(0,113,227,.2);border-radius:10px;padding:12px;margin-bottom:14px}
.lookup-row{display:flex;gap:8px;margin-top:8px}
.lookup-row input{flex:1;background:rgba(0,0,0,.05);border:none;border-radius:8px;padding:10px 12px;font-size:14px;outline:none;font-family:inherit}
.ticker{display:grid;grid-template-columns:repeat(4,1fr);background:#e0e0e0;gap:1px;flex-shrink:0}
.tick{background:#fff;padding:10px 14px}
.tick-v{font-size:14px;font-weight:700}
.tick-l{font-size:9px;color:#999;text-transform:uppercase;letter-spacing:.04em;margin-top:2px}
.gauge{background:#fff;padding:11px 16px;flex-shrink:0;border-bottom:1px solid #e0e0e0}
.gauge-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.gauge-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#999}
.gauge-bar{height:4px;background:#e0e0e0;border-radius:2px;position:relative}
.gauge-fill{height:100%;border-radius:2px;transition:width .5s}
.gauge-ticks{display:flex;justify-content:space-between;margin-top:3px}
.gauge-tick{font-size:8px;color:#bbb}
.tabs{display:flex;background:#fff;border-bottom:1px solid #e0e0e0;flex-shrink:0}
.tab{flex:1;padding:11px 0;border:none;background:none;cursor:pointer;font-size:11px;font-weight:500;color:#999;border-bottom:2px solid transparent;margin-bottom:-1px;font-family:inherit;text-transform:uppercase;letter-spacing:.04em}
.tab.on{color:#1d1d1f;border-bottom-color:#1d1d1f;font-weight:700}
.tab-panel{padding:16px;overflow-y:auto;flex:1}
.zpills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.zpill{padding:4px 10px;border-radius:980px;font-size:11px;font-weight:500;border:1.5px solid #ddd;background:#fff;color:#999;cursor:pointer;font-family:inherit}
.zpill.on{background:#1d1d1f;color:#fff;border-color:#1d1d1f}
.zpill.hit{border-color:rgba(192,57,43,.35);color:#c0392b;background:rgba(192,57,43,.06)}
.pbox{border-radius:10px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.07)}
.prow{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#fff;border-bottom:1px solid rgba(0,0,0,.05);cursor:pointer}
.prow:hover{background:#fafafa}
.prow.sel{background:rgba(29,122,74,.05)}
.pck{width:18px;height:18px;border-radius:50%;border:1.5px solid #ddd;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;transition:all .15s}
.pck.on{background:#1d1d1f;border-color:#1d1d1f;color:#fff}
.pn{flex:1;font-size:13px;color:#6e6e73}
.prow.sel .pn{color:#1d1d1f;font-weight:500}
.pp{font-size:11px;color:#bbb}
.sp{background:#fff;border-radius:10px;padding:12px;margin-bottom:8px;box-shadow:0 1px 6px rgba(0,0,0,.07)}
.sp-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.sp-n{font-size:13px;font-weight:600}
.sp-z{font-size:10px;color:#999;background:rgba(0,0,0,.06);padding:2px 8px;border-radius:980px}
.mg{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
.mf{display:flex;flex-direction:column;gap:3px}
.mf label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#999}
.mf input,.mf select{background:rgba(0,0,0,.05);border:none;border-radius:6px;padding:6px 8px;font-size:12px;outline:none;font-family:inherit}
.price-inp{background:rgba(191,155,48,.12)!important;color:#8b6914!important;font-weight:700!important}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:flex;align-items:flex-end;justify-content:center;padding:0}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:26px 22px 36px;width:100%;max-width:520px;max-height:92vh;overflow-y:auto}


.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px}
.photo-item{position:relative;aspect-ratio:4/3;border-radius:8px;overflow:hidden;background:rgba(0,0,0,.05);cursor:pointer}
.photo-item img{width:100%;height:100%;object-fit:cover}
.photo-del{position:absolute;top:4px;left:4px;background:rgba(192,57,43,.9);color:#fff;border:none;border-radius:50%;width:22px;height:22px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center}
.photo-add{border:2px dashed #ccc;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px;cursor:pointer;color:#999;font-size:12px;aspect-ratio:4/3;border-radius:8px;background:rgba(0,0,0,.02)}
.photo-add:hover{border-color:#1d1d1f;color:#1d1d1f}
.sig-canvas{border:1.5px solid #ccc;border-radius:8px;cursor:crosshair;touch-action:none;width:100%;max-width:400px;height:120px;background:#fff}
.dark-mode .photo-add{border-color:#3a3a3c;color:#6e6e73;background:rgba(255,255,255,.03)}
.tmpl-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.tmpl-card{padding:10px 12px;border-radius:10px;border:1.5px solid #e0e0e0;cursor:pointer;font-size:12px;font-weight:500;transition:all .15s}
.tmpl-card:hover{border-color:#1d1d1f;background:rgba(0,0,0,.03)}

@media(prefers-color-scheme:dark){
  body.dark-mode,.dark-mode .card,.dark-mode .stat,.dark-mode .ri,.dark-mode .eleft,.dark-mode .sp,.dark-mode .prow,.dark-mode .tick,.dark-mode .gauge,.dark-mode .tabs,.dark-mode .modal,.dark-mode .lookup{background:#1c1c1e;color:#f5f5f7}
  .dark-mode .nav,.dark-mode .editor-top{background:rgba(28,28,30,.92);border-color:#3a3a3c}
  .dark-mode .fld input,.dark-mode .fld select,.dark-mode .fld textarea,.dark-mode .mf input,.dark-mode .mf select{background:rgba(255,255,255,.08);color:#f5f5f7}
  .dark-mode .sec-t,.dark-mode .tick-l,.dark-mode .pn,.dark-mode .rlist-lbl{color:#aeaeb2}
  .dark-mode .eright,.dark-mode body{background:#000}
  .dark-mode .pbox,.dark-mode .parts-box{box-shadow:0 2px 10px rgba(0,0,0,.5)}
  .dark-mode .fld label{color:#6e6e73}
  .dark-mode .cards,.dark-mode .stats,.dark-mode .rlist{background:transparent}
  .dark-mode .zpill{background:#2c2c2e;border-color:#3a3a3c;color:#aeaeb2}
  .dark-mode .zpill.on{background:#f5f5f7;color:#1d1d1f}
  .dark-mode .tab{color:#6e6e73}
  .dark-mode .tab.on{color:#f5f5f7}
}
@media(max-width:640px){
  .hero{padding:28px 16px 20px} .hero h2{font-size:30px}
  .cards{grid-template-columns:1fr;padding:0 16px 20px}
  .stats{grid-template-columns:repeat(3,1fr);padding:0 16px 20px;gap:8px}
  .rlist{padding:0 16px 28px} .noprof{margin:0 16px 20px}
  .editor{grid-template-columns:1fr;height:auto;overflow:visible}
  .eleft{border-left:none;border-bottom:1px solid #e0e0e0}
  .eright{min-height:50vh}
  .fg{grid-template-columns:1fr} .s2{grid-column:span 1}
  .ticker{grid-template-columns:1fr 1fr}
  .mg{grid-template-columns:1fr 1fr}
  .fld input,.fld select,.fld textarea{font-size:16px}
  .lookup-row{flex-direction:column}
}
@media print{.noprint{display:none!important}*{-webkit-print-color-adjust:exact!important}}


@media print{
  body > *{display:none!important}
  #proot{display:block!important}
  .noprint{display:none!important}
  .pg{page-break-after:always!important;break-after:page!important}
  .pg:last-child{page-break-after:auto!important;break-after:auto!important}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
}
@page{size:A4;margin:0}
#proot{display:none;font-family:Arial,sans-serif;direction:rtl;color:#000;background:#fff}
.pg{width:210mm;min-height:297mm;box-sizing:border-box;position:relative;padding:8mm 10mm 18mm;background:#fff}
.pg-hdr{border-bottom:1.5px solid #000;padding-bottom:6px;margin-bottom:4px;display:flex;justify-content:space-between;align-items:flex-start}
.pg-hdr-left{font-size:9px;line-height:1.6;text-align:right}
.pg-hdr-mid{text-align:center;font-size:11px;font-weight:bold}
.pg-hdr-right{font-size:9px;line-height:1.8;text-align:left}
.pg-copy{text-align:center;font-size:10px;margin:4px 0 2px;color:#555}
.pg-section-title{text-align:center;font-size:13px;font-weight:bold;border-top:1px solid #000;border-bottom:1px solid #000;padding:4px 0;margin:4px 0 10px}
.gen-table{width:100%;border-collapse:collapse;margin-bottom:8px}
.gen-table td{font-size:10px;padding:3px 6px;border:1px solid #ccc;vertical-align:top}
.gen-table .lbl{font-weight:bold;background:#f0f0f0;width:20%}
.dmg-table{width:100%;border-collapse:collapse;margin-bottom:6px}
.dmg-table th{background:#1a1a1a;color:#fff;font-size:9px;padding:4px 5px;text-align:center;border:1px solid #333}
.dmg-table td{font-size:9px;padding:3px 5px;border:1px solid #ccc;text-align:center}
.dmg-table td:first-child{text-align:right}
.focal-row{background:#e8e8e8;font-weight:bold}
.sum-row{background:#d0d0d0;font-weight:bold}
.pg-footer{position:absolute;bottom:6mm;left:10mm;right:10mm;border-top:1px solid #ccc;padding-top:4px;font-size:8px;color:#666;display:flex;justify-content:space-between}
p{margin:4px 0;font-size:10px;line-height:1.7}
</style>

function sget(k){try{var v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}}
function sset(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function sdel(k){try{localStorage.removeItem(k);}catch(e){}}

function loadProfile(){return sget("sh_p");}
function saveProfile(p){sset("sh_p",p);}
function loadReports(){
  var ids=sget("sh_ids")||[];
  return ids.map(function(id){return sget("sh_r_"+id);}).filter(Boolean);
}
function saveReport(r){
  sset("sh_r_"+r.id,r);
  var ids=sget("sh_ids")||[];
  if(ids.indexOf(r.id)<0){ids.unshift(r.id);sset("sh_ids",ids);}
}
function deleteReport(id){
  sdel("sh_r_"+id);
  var ids=(sget("sh_ids")||[]).filter(function(x){return x!==id;});
  sset("sh_ids",ids);
}

function calc(){
  var f=S.form||{};
  var tp=S.parts.reduce(function(s,p){return s+(Number(p.price)||0);},0);
  var tl=S.labor.reduce(function(s,l){return s+(Number(l.hours)||0)*LR;},0);
  var paint=Number(f.paintCost||0),other=Number(f.otherCost||0);
  var sub=tp+tl+paint+other,vat=sub*VAT,total=sub+vat;
  var vv=Number(f.vehicleValue||0),pct=vv?(sub/vv*100):0;
  return {tp:tp,tl:tl,paint:paint,other:other,sub:sub,vat:vat,total:total,vv:vv,pct:pct};

  if(S.form.baseValue)S.form.vehicleValue=String(v);

function ce(tag,opts){

  if(opts)Object.keys(opts).forEach(function(k){
    if(k==="style")el.style.cssText=opts[k];
    else if(k==="className")el.className=opts[k];

}
function btn(text,cls,fn){var b=ce("button",{textContent:text,className:"btn "+(cls||"")});b.onclick=fn;return b;}

function makeFieldEl(label,cls){var d=ce("div",{className:"fld"+(cls?" "+cls:"")});d.appendChild(ce("label",{textContent:label}));return d;}
function field(label,key,val,type,cls,ro){
  var d=ce("div",{className:"fld"+(cls?" "+cls:"")+(ro?" fld-ro":"")});
  var l=ce("label",{textContent:label});
  var inp=ce("input");
  inp.type=type||"text"; inp.value=val||"";
  if(ro)inp.readOnly=true;
  if(!ro){inp.onchange=(function(k){return function(){S.form[k]=this.value;if(["baseValue","kmAdj","ownersAdj","extras"].indexOf(k)>=0)updateVV();render();};})(key);}
  d.appendChild(l); d.appendChild(inp); return d;
}
function fieldN(label,key,val,cls){
  var d=ce("div",{className:"fld"+(cls?" "+cls:"")});
  var l=ce("label",{textContent:label});
  var inp=ce("input");
  inp.type="number"; inp.value=val||"";
  inp.onchange=(function(k){return function(){S.form[k]=this.value;if(["baseValue","kmAdj","ownersAdj","extras"].indexOf(k)>=0)updateVV();render();};})(key);
  d.appendChild(l); d.appendChild(inp); return d;
}
function fieldD(label,key,val,cls){
  var d=ce("div",{className:"fld"+(cls?" "+cls:"")});
  var l=ce("label",{textContent:label});
  var inp=ce("input"); inp.type="date"; inp.value=val||"";
  inp.onchange=(function(k){return function(){S.form[k]=this.value;render();};})(key);
  d.appendChild(l); d.appendChild(inp); return d;
}
function fieldSel(label,key,val,opts,cls){
  var d=ce("div",{className:"fld"+(cls?" "+cls:"")});
  var l=ce("label",{textContent:label});
  var sel=ce("select");
  opts.forEach(function(o){var op=ce("option",{textContent:o,value:o});if(val===o)op.selected=true;sel.appendChild(op);});
  sel.onchange=(function(k){return function(){S.form[k]=this.value;render();};})(key);
  d.appendChild(l); d.appendChild(sel); return d;
}
function fieldTA(label,key,val){
  var d=ce("div",{className:"fld s2"});
  var l=ce("label",{textContent:label});
  var ta=ce("textarea"); ta.rows=3; ta.value=val||"";
  ta.onchange=(function(k){return function(){S.form[k]=this.value;};})(key);
  d.appendChild(l); d.appendChild(ta); return d;
}

function nav(title,right){
  var n=ce("nav",{className:"nav"});
  var b=ce("div",{className:"nav-brand",textContent:title});
  var r=ce("div",{style:"display:flex;gap:8px;align-items:center"});
  (right||[]).forEach(function(x){r.appendChild(x);});
  n.appendChild(b); n.appendChild(r);
  return n;
}

function render(){
  S.reports=loadReports();
  var app=g("app");
  if(!app)return;
  app.innerHTML="";
  app.removeAttribute("style");
  if(S.screen==="home")renderHome(app);
  else if(S.screen==="list")renderList(app);
  else if(S.screen==="editor")renderEditor(app);
  else if(S.screen==="print")renderPrint(app);
}

function renderHome(app){
  var P=S.profile;
  var reports=S.reports;
  app.appendChild(nav(H.appTitle,[
    btn(H.assessorProfile,"btn-s",function(){S.profile=S.profile||loadProfile()||{};showModal();}),
    btn(H.archive+" ("+reports.length+")","btn-s",function(){S.screen="list";render();}),
    btn(H.newReport,"",function(){S.form=newForm();S.parts=[];S.labor=[{description:"",type:"bodywork",hours:"2"}];S.zone="front";S.tab="diagram";S.screen="editor";render();})
  ]));

  // Check for unsaved draft
  var draft=loadDraft();
  if(draft&&draft.form&&draft.form.ownerName){
    var draftBar=ce("div",{style:"background:rgba(0,113,227,.1);border:1px solid rgba(0,113,227,.3);border-radius:10px;padding:12px 16px;margin:0 28px 16px;display:flex;justify-content:space-between;align-items:center"});
    var draftTxt=ce("div");
    var draftTitle=ce("div",{style:"font-size:13px;font-weight:600;color:#0058b3"});
    draftTitle.textContent="\u05e9\u05d5\u05de\u05d4 \u05dc\u05d0 \u05e9\u05de\u05d5\u05e8\u05d4: "+draft.form.ownerName;
    var draftSub=ce("div",{style:"font-size:11px;color:#6e6e73;margin-top:2px"});
    var ago=Math.round((Date.now()-draft.ts)/60000);
    draftSub.textContent="\u05e0\u05e9\u05de\u05e8 "+ago+" \u05d3\u05e7\u05d5\u05ea \u05d0\u05d7\u05d5\u05e8\u05e0\u05d4";
    draftTxt.appendChild(draftTitle); draftTxt.appendChild(draftSub);
    var draftBtns=ce("div",{style:"display:flex;gap:8px"});
    var restoreBtn=ce("button",{className:"btn",style:"height:32px;padding:0 14px;font-size:12px;background:#0071e3"});
    restoreBtn.textContent="\u05d4\u05de\u05e9\u05da \u05e2\u05e8\u05d9\u05db\u05d4";
    restoreBtn.onclick=function(){
      S.form=draft.form; S.parts=draft.parts||[]; S.labor=draft.labor||[];
      S.photos=draft.photos||[]; S.zone="front"; S.tab="diagram";
      S.screen="editor"; render();
    };
    var discardBtn=ce("button",{className:"btn btn-s",style:"height:32px;padding:0 12px;font-size:12px"});
    discardBtn.textContent="\u05d1\u05d8\u05dc";
    discardBtn.onclick=function(){clearDraft();render();};
    draftBtns.appendChild(restoreBtn); draftBtns.appendChild(discardBtn);
    draftBar.appendChild(draftTxt); draftBar.appendChild(draftBtns);
    app.appendChild(draftBar);
  }
  var hero=ce("div",{className:"hero"});
  var h2=ce("h2",{textContent:H.appTitle});
  var p=ce("p",{textContent:H.repair_d+" | "+H.defacto_d+" | "+H.total_d});
  hero.appendChild(h2); hero.appendChild(p); app.appendChild(hero);

  var cards=ce("div",{className:"cards"});
  TYPES.forEach(function(t){
    var c=ce("div",{className:"card"});
    c.style.borderTop="3px solid "+t.c;
    var dot=ce("div"); dot.style.cssText="width:10px;height:10px;border-radius:50%;background:"+t.c+";margin-bottom:12px";
    var h3=ce("h3",{textContent:t.n});
    var pd=ce("p",{textContent:t.d});
    c.appendChild(dot); c.appendChild(h3); c.appendChild(pd);
    c.onclick=(function(tid){return function(){S.form=newForm();S.form.reportType=tid;S.parts=[];S.labor=[{description:"",type:"bodywork",hours:"2"}];S.zone="front";S.tab="diagram";S.screen="editor";render();};})(t.id);
    cards.appendChild(c);
  });
  app.appendChild(cards);

  var totalILS=reports.reduce(function(s,r){var rtp=(r.parts||[]).reduce(function(a,p){return a+(Number(p.price)||0);},0);var rtl=(r.laborItems||[]).reduce(function(a,l){return a+(Number(l.hours)||0)*LR;},0);return s+(rtp+rtl)*(1+VAT);},0);
  var stats=ce("div",{className:"stats",style:"grid-template-columns:repeat(4,1fr)"});
  [[reports.length,H.reportsCreated],[reports.filter(function(r){return r.reportType==="defacto";}).length,H.defacto],[reports.filter(function(r){return r.reportType==="total";}).length,H.total],[fmt(totalILS),"\u05e1\u05d4\u05f4\u05db \u05e9\u05d5\u05de\u05d5\u05ea (\u05e9\u05e7\u05dc)"]].forEach(function(s){
    var st=ce("div",{className:"stat"});
    var n=ce("div",{className:"stat-n",textContent:s[0]});
    var l=ce("div",{className:"stat-l",textContent:s[1]});
    st.appendChild(n); st.appendChild(l); stats.appendChild(st);
  });
  app.appendChild(stats);

  if(reports.length>0){
    var rl=ce("div",{className:"rlist"});
    var lbl=ce("div",{className:"rlist-lbl",textContent:H.archive});
    rl.appendChild(lbl);
    reports.slice(0,6).forEach(function(r){
      var rtp=(r.parts||[]).reduce(function(s,p){return s+(Number(p.price)||0);},0);
      var rtl=(r.laborItems||[]).reduce(function(s,l){return s+(Number(l.hours)||0)*LR;},0);
      var rtot=(rtp+rtl)*(1+VAT);
      var type=getType(r.reportType);
      var ri=ce("div",{className:"ri"});
      var info=ce("div");
      var rn=ce("div",{className:"ri-n",textContent:r.ownerName});
      var rm=ce("div",{className:"ri-m",textContent:(r.carMake||"")+" "+(r.carModel||"")+" "+(r.carYear||"")+" - "+(r.licenseNum||"")});
      info.appendChild(rn); info.appendChild(rm);
      var acts=ce("div",{className:"ri-acts"});
      var badge=ce("span",{className:"badge "+type.bc,textContent:type.n});
      var amt=ce("span",{textContent:fmt(rtot)+" ILS"});
      var pb=btn(H.print,"btn-s",(function(rid){return function(){S.printData=loadReports().find(function(x){return x.id===rid;});S.screen="print";render();};})(r.id));
      pb.style.cssText="height:30px;padding:0 12px;font-size:12px";
      var eb=btn(H.edit_btn,"btn-s",(function(rid){return function(){doEdit(rid);};})(r.id));
      eb.style.cssText="height:30px;padding:0 12px;font-size:12px";
      var db=btn(H.delete,"btn-r",(function(rid){return function(){if(confirm(H.confirm_del)){deleteReport(rid);render();}};})(r.id));
      var cpb=btn("\u05e9\u05db\u05e4\u05dc","btn-s",(function(rid){return function(){doDuplicate(rid);};})(r.id));
      cpb.style.cssText="height:30px;padding:0 10px;font-size:11px";
      acts.appendChild(badge); acts.appendChild(amt); acts.appendChild(eb); acts.appendChild(cpb); acts.appendChild(pb); acts.appendChild(db);
      ri.appendChild(info); ri.appendChild(acts);
      rl.appendChild(ri);
    });
    app.appendChild(rl);
  }

  if(!P){
    var al=ce("div",{className:"noprof"});
    var t=ce("span",{textContent:H.noProfile});
    var lnk=ce("span",{textContent:H.setup,style:"text-decoration:underline;cursor:pointer"});
    lnk.onclick=function(){S.profile=S.profile||loadProfile()||{};showModal();};
    al.appendChild(t); al.appendChild(lnk); app.appendChild(al);
  }
}

function renderList(app){
  app.appendChild(nav(H.archive,[btn(H.back,"btn-s",function(){S.screen="home";render();})]));
  var wrap=ce("div",{style:"padding:20px 24px"});
  var srch=ce("input"); srch.placeholder="\u05d7\u05d9\u05e4\u05d5\u05e9...";
  srch.style.cssText="background:rgba(0,0,0,.05);border:none;border-radius:10px;padding:10px 14px;font-size:14px;width:100%;outline:none;font-family:inherit;margin-bottom:14px;display:block";
  srch.oninput=function(){var q=this.value.toLowerCase();wrap.querySelectorAll(".ri").forEach(function(r){r.style.display=r.textContent.toLowerCase().indexOf(q)>=0?"":"none";});};
  wrap.appendChild(srch);
  var reports=loadReports().sort(function(a,b){return (b.createdAt||0)-(a.createdAt||0);});
  if(!reports.length){wrap.appendChild(ce("p",{textContent:H.empty_arch,style:"color:#999"}));}
  reports.forEach(function(r){
    var rtp=(r.parts||[]).reduce(function(s,p){return s+(Number(p.price)||0);},0);
    var rtl=(r.laborItems||[]).reduce(function(s,l){return s+(Number(l.hours)||0)*LR;},0);
    var rtot=(rtp+rtl)*(1+VAT);
    var type=getType(r.reportType);
    var ri=ce("div",{className:"ri"});
    var info=ce("div",{style:"min-width:0;flex:1"});
    var rn=ce("div",{className:"ri-n",textContent:r.ownerName});
    var rm=ce("div",{className:"ri-m",textContent:r.carMake+" "+r.carModel+" - "+r.licenseNum+" - \u05ea\u05d9\u05e7 "+r.caseNumber});
    info.appendChild(rn); info.appendChild(rm);
    var acts=ce("div",{className:"ri-acts"});
    var badge=ce("span",{className:"badge "+type.bc,textContent:type.n});
    var amt=ce("span",{textContent:fmt(rtot)+" ILS"});
    var pb=btn(H.print,"btn-g",(function(rid){return function(){S.printData=loadReports().find(function(x){return x.id===rid;});S.screen="print";render();};})(r.id));
    pb.style.cssText="height:30px;padding:0 12px;font-size:12px";
    var eb2=btn(H.edit_btn,"btn-s",(function(rid){return function(){doEdit(rid);};})(r.id));
    eb2.style.cssText="height:30px;padding:0 12px;font-size:12px";
    var db=btn(H.delete,"btn-r",(function(rid){return function(){if(confirm(H.confirm_del)){deleteReport(rid);render();}};})(r.id));
    acts.appendChild(badge); acts.appendChild(amt); acts.appendChild(eb2); acts.appendChild(pb); acts.appendChild(db);
    ri.appendChild(info); ri.appendChild(acts);
    wrap.appendChild(ri);
  });
  app.appendChild(wrap);
}

function renderEditor(app){
  var c=calc(), f=S.form, pct=c.pct;
  var pCol=pct>=60?"#c0392b":pct>=50?"#8a5a00":"#1d7a4a";
  var pLbl=pct>=60?H.total:pct>=50?H.defacto:pct>0?H.repair:"";

  // Top nav
  var topBar=ce("div",{style:"background:#fff;border-bottom:1px solid #e0e0e0;padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100"});
  var tLeft=ce("div",{style:"display:flex;align-items:center;gap:10px"});
  var backB=btn(H.back,"btn-s",function(){S.screen="home";render();});

  var caseSpan=ce("span",{textContent:f.caseNumber,style:"font-size:12px;color:#6e6e73"});
  var autoSaveSpan=ce("span",{id:"autosave-indicator",style:"font-size:10px;color:#1d7a4a;opacity:0;transition:opacity 1s"});
  autoSaveSpan.textContent="\u2713 \u05e0\u05e9\u05de\u05e8";
  tLeft.appendChild(backB); tLeft.appendChild(caseSpan);
  var tRight=ce("div",{style:"display:flex;align-items:center;gap:10px"});

  var saveB=btn(H.save,"btn-g",function(){
    if(!S.form.ownerName){alert(H.save_alert);return;}
    var r=JSON.parse(JSON.stringify(S.form));
    r.id=S.form.id||Date.now().toString(); r.createdAt=S.form.createdAt||Date.now();
    r.parts=JSON.parse(JSON.stringify(S.parts));
    r.laborItems=JSON.parse(JSON.stringify(S.labor));
    saveReport(r); clearDraft(); S.form=newForm(); S.photos=[]; S.sigData=null; S.screen="home"; render();
  });
  saveB.style.cssText="height:34px;padding:0 16px;font-size:13px";
  tRight.appendChild(totalSpan); tRight.appendChild(saveB);
  topBar.appendChild(tLeft); topBar.appendChild(tRight);
  app.appendChild(topBar);

  // Editor grid
  var grid=ce("div",{className:"editor"});

  // LEFT FORM
  var left=ce("div",{className:"eleft"});

  // Type cards
  var secT=makeSec(H.sec_type);
  var tg=ce("div",{style:"display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:4px"});
  TYPES.forEach(function(t){
    var card=ce("div");
    card.style.cssText="padding:12px;border-radius:10px;border:2px solid "+(f.reportType===t.id?"#1d1d1f":"#eee")+";background:"+(f.reportType===t.id?"#1d1d1f":"#fff")+";cursor:pointer";
    var dot=ce("div"); dot.style.cssText="width:8px;height:8px;border-radius:50%;background:"+t.c+";margin-bottom:7px";
    var tn=ce("div",{textContent:t.n}); tn.style.cssText="font-size:12px;font-weight:700;color:"+(f.reportType===t.id?"#fff":"#1d1d1f");
    var td2=ce("div",{textContent:t.d}); td2.style.cssText="font-size:10px;color:"+(f.reportType===t.id?"rgba(255,255,255,.5)":"#999");
    card.appendChild(dot); card.appendChild(tn); card.appendChild(td2);
    card.onclick=(function(tid){return function(){S.form.reportType=tid;render();};})(t.id);
    tg.appendChild(card);
  });
  secT.appendChild(tg); left.appendChild(secT);

  // Vehicle
  var secV=makeSec(H.sec_veh);
  var recipField=ce("div",{className:"fld s2"});
  recipField.appendChild(ce("label",{textContent:H.f_recipient}));
  var recipInp=ce("input"); recipInp.value=f.recipient||"";

  recipField.appendChild(recipInp);
  var recipWrap=ce("div",{className:"fg",style:"margin-bottom:14px"});
  recipWrap.appendChild(recipField);
  secV.appendChild(recipWrap);
  var lbox=ce("div",{className:"lookup"});
  var lt=ce("div",{textContent:H.fetchTitle,style:"font-size:11px;font-weight:700;color:#0071e3;letter-spacing:.06em;text-transform:uppercase"});

  var lmsg=ce("div"); lmsg.id="lmsg"; lmsg.style.cssText="font-size:12px;margin-top:8px;color:#6e6e73";

  makeField.appendChild(makeInp); makeField.appendChild(multNotice);

  secC.appendChild(cfg); left.appendChild(secC);

  var secI=makeSec(H.sec_ins);
  var ifg=ce("div",{className:"fg"});
  ifg.appendChild(field(H.f_insurance,"insurance",f.insurance));
  ifg.appendChild(field(H.f_policy,"policyNum",f.policyNum));
  ifg.appendChild(field(H.f_claim,"claimNum",f.claimNum,"text","s2"));
  secI.appendChild(ifg); left.appendChild(secI);

  // Value

  var vvfg=ce("div",{className:"fg"});
  vvfg.appendChild(fieldN(H.f_base_val,"baseValue",f.baseValue));
  vvfg.appendChild(fieldN(H.f_km_adj,"kmAdj",f.kmAdj));
  vvfg.appendChild(fieldN(H.f_owners_adj,"ownersAdj",f.ownersAdj));
  vvfg.appendChild(fieldN(H.f_extras,"extras",f.extras));

  if(f.reportType==="defacto"||f.reportType==="total") vvfg.appendChild(fieldN(H.f_salvage,"salvageValue",f.salvageValue));
  secVal.appendChild(vvfg); left.appendChild(secVal);

  // Descriptions
  var secD=makeSec(H.sec_desc);
  secD.appendChild(fieldTA(H.f_incident_desc,"incidentDesc",f.incidentDesc));
  secD.appendChild(fieldTA(H.f_damage_desc,"description",f.description));
  secD.appendChild(fieldTA(H.f_notes,"notes",f.notes));
  left.appendChild(secD);

  // Labor
  var secL=makeSec(H.sec_labor+" - "+LR+" ILS/hr");
  S.labor.forEach(function(l,i){
    var row=ce("div",{style:"display:grid;grid-template-columns:2fr 1fr .65fr auto;gap:8px;margin-bottom:8px;align-items:end"});
    var df=ce("div",{className:"fld"});
    if(i===0){df.appendChild(ce("label",{textContent:H.f_labor_desc}));}

    di.onchange=(function(ii){return function(){S.labor[ii].description=this.value;};})(i);
    df.appendChild(di);
    var ds=ce("div",{className:"fld"});
    if(i===0){ds.appendChild(ce("label",{textContent:H.f_type}));}

    dsel.onchange=(function(ii){return function(){S.labor[ii].type=this.value;};})(i);
    ds.appendChild(dsel);

async function doLookup(){
  var inp=document.getElementById("lplate");
  var msg=document.getElementById("lmsg");
  if(!inp||!msg)return;
  var plate=inp.value.replace(/[^0-9]/g,"");
  if(plate.length<5){msg.textContent="?";return;}
  msg.textContent="...";
  var datasets=["053cea08-09bc-40ec-8f7a-156f0677aff3","03adc637-b6fe-402b-9937-7c3d3afc9140"];
  for(var di=0;di<datasets.length;di++){
    try{
      var url="https://data.gov.il/api/3/action/datastore_search?resource_id="+datasets[di]+"&q="+plate+"&limit=5";
      var res=await fetch(url,{signal:AbortSignal.timeout(6000)});
      if(!res.ok)continue;
      var data=await res.json();
      if(data&&data.result&&data.result.records&&data.result.records.length>0){
        var rec=data.result.records.find(function(r){return String(r.mispar_rechev||"")===plate;})||data.result.records[0];
        S.form.licenseNum=String(rec.mispar_rechev||"");
        S.form.carMake=rec.tozeret_nm||rec.tozeret_cd_nm||"";
        S.form.carModel=rec.kinuy_mishari||rec.degem_nm||"";
        S.form.carYear=String(rec.shnat_yitzur||"");
        S.form.vin=rec.misgeret||"";
        S.form.color=rec.tzeva_rechev||"";
        S.form.fuelType=rec.sug_delek_nm||"";
        S.form.engineCC=rec.nefah_manoa?String(rec.nefah_manoa):"";
        S.form.gearbox=rec.automatic_ind?(String(rec.automatic_ind)==="1"?GEAR_OPTS[1]:GEAR_OPTS[2]):"";
        S.form.licenseExpiry=rec.tokef_dt||"";
        S.form.firstRegistration=rec.moed_aliya_lakvish||"";
        msg.style.color="#1d7a4a";
        msg.textContent="\u2713 \u05e0\u05de\u05e6\u05d0: "+S.form.carMake+" "+S.form.carModel+" "+S.form.carYear;
        // Show history
        var hist=getVehicleHistory(plate);
        if(hist.length>0){
          var hNote=document.getElementById("veh-history-note");
          if(!hNote){hNote=document.createElement("div");hNote.id="veh-history-note";hNote.style.cssText="font-size:11px;color:#8a5a00;background:rgba(138,90,0,.1);padding:6px 10px;border-radius:6px;margin-top:6px";}
          hNote.textContent="\u26a0 "+hist.length+" \u05e9\u05d5\u05de\u05d5\u05ea \u05e7\u05d5\u05d3\u05de\u05d5\u05ea \u05e0\u05de\u05e6\u05d0\u05d5 \u05dc\u05e8\u05db\u05d1 \u05d6\u05d4";
          if(!document.getElementById("veh-history-note"))lmsg.parentNode.appendChild(hNote);
        }
        render(); return;
      }
    }catch(e){continue;}
  }
  msg.textContent="Not found";
}

// \u2550\u2550\u2550 SIGNATURE \u2550\u2550\u2550
function initSigCanvas(canvasEl){
  if(!canvasEl)return;
  var ctx=canvasEl.getContext("2d");
  var drawing=false;
  var rect;
  function getPos(e){
    rect=canvasEl.getBoundingClientRect();
    var touch=e.touches?e.touches[0]:e;
    return {x:(touch.clientX-rect.left)*(canvasEl.width/rect.width),y:(touch.clientY-rect.top)*(canvasEl.height/rect.height)};
  }
  function start(e){e.preventDefault();drawing=true;var p=getPos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);}
  function move(e){e.preventDefault();if(!drawing)return;var p=getPos(e);ctx.lineTo(p.x,p.y);ctx.strokeStyle="#1d1d1f";ctx.lineWidth=2;ctx.lineCap="round";ctx.stroke();}
  function stop(e){drawing=false;S.sigData=canvasEl.toDataURL();}
  canvasEl.addEventListener("mousedown",start);canvasEl.addEventListener("mousemove",move);canvasEl.addEventListener("mouseup",stop);
  canvasEl.addEventListener("touchstart",start,{passive:false});canvasEl.addEventListener("touchmove",move,{passive:false});canvasEl.addEventListener("touchend",stop);
  // Restore previous signature
  if(S.sigData){var img=new Image();img.onload=function(){ctx.drawImage(img,0,0);};img.src=S.sigData;}
}

  try{if(SUPA_TOKEN)await supaFetch('/auth/v1/logout',{method:'POST'});}catch(e){}
  SUPA_TOKEN=null;SUPA_USER=null;SUPA_ROLE='student';
  try{localStorage.removeItem('sh_token');localStorage.removeItem('sh_user');localStorage.removeItem('sh_refresh');localStorage.removeItem('sh_role');}catch(e){}
  S.screen='login';render();
}
async function supaRefreshToken(){
  var rf='';try{rf=localStorage.getItem('sh_refresh')||'';}catch(e){}
  if(!rf)return false;
  try{
    var r=await supaFetch('/auth/v1/token?grant_type=refresh_token',{method:'POST',body:JSON.stringify({refresh_token:rf})});
    var d=await r.json();
    if(d.access_token){SUPA_TOKEN=d.access_token;SUPA_USER=d.user;try{localStorage.setItem('sh_token',d.access_token);localStorage.setItem('sh_user',JSON.stringify(d.user));localStorage.setItem('sh_refresh',d.refresh_token||'');}catch(e){}return true;}
  }catch(e){}return false;
}
async function loadUserRole(){
  if(!SUPA_TOKEN||!SUPA_USER)return;
  try{var r=await supaFetch('/rest/v1/user_roles?user_id=eq.'+SUPA_USER.id+'&select=role');var d=await r.json();SUPA_ROLE=(d&&d[0])?d[0].role:'student';}catch(e){SUPA_ROLE='student';}
}
async function cloudSaveReport(r){
  if(!SUPA_TOKEN){saveReport(r);return;}
  var p={id:r.id,user_id:SUPA_USER.id,case_number:r.caseNumber||'',owner_name:r.ownerName||'',car_make:r.carMake||'',car_model:r.carModel||'',car_year:r.carYear||'',license_num:r.licenseNum||'',report_type:r.reportType||'repair',total_amount:0,data:r,updated_at:new Date().toISOString()};
  try{var chk=await supaFetch('/rest/v1/reports?id=eq.'+r.id+'&select=id');var ex=await chk.json();if(ex&&ex.length>0)await supaFetch('/rest/v1/reports?id=eq.'+r.id,{method:'PATCH',body:JSON.stringify(p)});else{p.created_at=new Date().toISOString();await supaFetch('/rest/v1/reports',{method:'POST',body:JSON.stringify(p)});}}catch(e){}
  saveReport(r);
}
function initAuth(){
  var token='',user=null;
  try{token=localStorage.getItem('sh_token')||'';var us=localStorage.getItem('sh_user')||'';if(us)user=JSON.parse(us);}catch(e){}
  if(token&&user){
    SUPA_TOKEN=token;SUPA_USER=user;
    try{SUPA_ROLE=localStorage.getItem('sh_role')||'student';}catch(e){}
    S.screen='home';
    supaRefreshToken().then(function(ok){
      if(!ok){SUPA_TOKEN=null;SUPA_USER=null;S.screen='login';render();}
      else{loadUserRole().then(function(){try{localStorage.setItem('sh_role',SUPA_ROLE);}catch(e){}render();}).catch(function(){render();});}
    }).catch(function(){S.screen='login';render();});
  }else{S.screen='login';}
  render();
}
function renderLogin(app){
  app.innerHTML='';
  app.style.cssText='background:#1a1a2e;min-height:100vh;width:100%;box-sizing:border-box;padding:40px 20px';
  // Test 1: simple text
  var test=document.createElement('p');
  test.style.cssText='color:white;font-size:24px;font-weight:bold;margin:0 0 20px;text-align:center;direction:rtl';
  test.textContent='\u05e9\u05de\u05d0\u05d5\u05ea \u05e8\u05db\u05d1';
  app.appendChild(test);
  // Test 2: simple white box
  var box=document.createElement('div');
  box.style.cssText='background:white;color:black;padding:30px;border-radius:12px;max-width:400px;margin:0 auto;text-align:center';
  box.innerHTML='<h2 style="margin:0 0 16px;font-size:20px">\u05e9\u05de\u05d0\u05d5\u05ea \u05e8\u05db\u05d1</h2><input type="email" placeholder="Email" style="width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;margin-bottom:12px;font-size:15px;box-sizing:border-box"><br><input type="password" placeholder="\u05e1\u05d9\u05e1\u05de\u05d0" style="width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;margin-bottom:16px;font-size:15px;box-sizing:border-box"><br><button id="login-btn" style="width:100%;padding:14px;background:#1d1d1f;color:white;border:none;border-radius:10px;font-size:16px;cursor:pointer">\u05d4\u05ea\u05d7\u05d1\u05e8</button><p id="login-err" style="color:red;margin-top:8px"></p>';
  app.appendChild(box);
  // Wire login button
  var btn=document.getElementById('login-btn');
  if(btn){btn.onclick=async function(){
    var em=box.querySelector('input[type=email]').value.trim();
    var pw=box.querySelector('input[type=password]').value;
    var errP=document.getElementById('login-err');
    if(!em||!pw){if(errP)errP.textContent='\u05e0\u05d0 \u05de\u05dc\u05d0 \u05e4\u05e8\u05d8\u05d9\u05dd';return;}
    btn.textContent='\u05de\u05ea\u05d7\u05d1\u05e8...';btn.disabled=true;
    try{var res=await supaSignIn(em,pw);
      if(res.ok){app.style.cssText='';S.screen='home';S.profile=loadProfile();render();}
      else{if(errP)errP.textContent=res.error||'\u05e9\u05d2\u05d9\u05d0\u05d4';btn.disabled=false;btn.textContent='\u05d4\u05ea\u05d7\u05d1\u05e8';}
    }catch(e){if(errP)errP.textContent='\u05e9\u05d2\u05d9\u05d0\u05d4: '+e.message;btn.disabled=false;btn.textContent='\u05d4\u05ea\u05d7\u05d1\u05e8';}
  };}
}

var _origRender=render;
render=function(){
  S.reports=loadReports();
  var app=g('app');if(!app)return;
  var _ov=document.getElementById('err-overlay');if(_ov)_ov.style.display='none';
  app.innerHTML='';
  if(S.screen==='login'){renderLogin(app);return;}
  app.removeAttribute('style');
  if(S.screen==='home')renderHome(app);
  else if(S.screen==='list')renderList(app);
  else if(S.screen==='editor')renderEditor(app);
  else if(S.screen==='print')renderPrint(app);
};
S.profile=loadProfile();
initAuth();
}catch(__e){alert('ERROR: '+__e.message+' line:'+(__e.stack||'').split('\n')[1]);var __o=document.getElementById('err-overlay');if(__o){__o.style.cssText='display:block;position:fixed;inset:0;background:#fff;z-index:9999;padding:24px;font-family:monospace;direction:ltr;overflow:auto';__o.innerHTML='<h2 style=color:red>Init Error</h2><b>'+__e.message+'</b><br><pre>'+(__e.stack||'')+'</pre>';}}
</script>
