  { q:`השמאי מטעם חברת הביטוח העריך: ₪15,000.
השמאי מטעם בעל הרכב העריך: ₪28,000.

א. מה המנגנון החוקי?
ב. כיצד נבחר השמאי?
ג. מה מעמד ההכרעה?
ד. מי ישלם ומתי?`,
    m:`א. מנגנון שמאי מכריע — פנייה למוקד "ניהולית".
פנייה ישירה לשמאי ללא המוקד = חסרת נפקות לחלוטין.

ב. אקראית לפי: אזור גיאוגרפי + סוג רכב (עד/מעל 4 טון) + תנאי החוזר.

ג. ההכרעה מחייבת שני הצדדים. אין ממנה ערעור ישיר.

ד. השמאי המכריע קובע מי ישלם ובאיזה שיעור. המבטח ישלם לפונה תוך 10 ימי עבודה.` },

  { q:`פרט את כל המרכיבים החובה בחוות דעת שמאית לפי הנחייה מקצועית מס' 2. ציין לפחות 12 מרכיבים.`,
    m:`① זיהוי הרכב: תוצר, דגם, שנת ייצור, VIN, קוד דגם, מד נסועה
② צילומי הרכב מסביב
③ פרטי בעל הרכב / נהג
④ פרטי המבטחת (פוליסה + תביעה)
⑤ תאריך האירוע ומועד הבדיקה
⑥ תיאור הנזק — מילולי ומצולם
⑦ פרוט חלפים: מק"ט + סיווג + מחיר
⑧ שעות עבודה לפי מקצועות (פח/צבע/מכונאות/חשמל/מזגן/כיוון)
⑨ האם נדרשת בדיקת בטיחות (תקנה 309)
⑩ אחוז הנזק הגולמי ליום האירוע
⑪ שווי הרכב + שיטת חישוב
⑫ ירידת ערך + פירוט
⑬ המלצה: בר-תיקון / אובדן להלכה / אובדן גמור
⑭ הצהרת שמאי + שם + רישיון + חתימה` },

  { q:`שמאי מסרב לחתום ללא בדיקה פיזית. לקוח אחר מבקש חוות דעת מכנית על סיבת קלקול מנוע.

א. האם שמאי רשאי לחתום ללא בדיקה פיזית?
ב. האם שמאי יכול לתת חוות דעת מכנית?
ג. מה הסנקציה על הפרה?`,
    m:`א. לא. חתימה מחייבת בדיקה פיזית עצמאית של הרכב. מסמכי מוסך אינם תחליף. חתימה ללא בדיקה = הפרת כללי אתיקה.

ב. בדרך כלל לא. שמאי מעריך נזק כלכלי בלבד. חריג: אם לשמאי יש הכשרה מכנית מוכחת — ייבחן כמומחה טכני בנוסף לתפקידו.

ג. סנקציות:
• דין משמעתי בפני "הרשות"
• השעייה מעיסוק במקצוע
• ביטול חוות הדעת בבית משפט
• תביעה אזרחית על נזקים` },

  { q:`רכב אודי Q3 E-TRON 2024. ערך רכב: ₪367,853. נזק חזית שמאלית.
עלות תיקון לפני מע"מ: ₪84,010.

א. חשב אחוז הנזק הגולמי (לפי ערך בסיס ₪342,000).
ב. האם הרכב בר-תיקון?
ג. אילו מערכות יש לבדוק בנוסף לפח החיצוני בפגיעת חזית?`,
    m:`א. 84,010 / 342,000 × 100 = 24.6%

ב. כן. 24.6% < 60% → בר-תיקון.

ג. בנוסף לפח יש לבדוק:
• קורות אורך ורוחב (נזק בטיחותי אפשרי)
• מסגרת מנוע ותושבות מנוע
• מתלים קדמיים (משולשים, בולמים, תפוחים)
• מערכת היגוי (מסרק הגה, מוטות)
• רדיאטור, מאוורר, אינטרקולר
• כריות אוויר ומחשב SRS
• סריקת OBD לתקלות אלקטרוניות` },

  { q:`מה ההבדל בין "אובדן גמור", "אובדן גמור להלכה" ו"בר-תיקון"?
הגדר כל מצב, ציין את אחוזי הנזק הגולמי המגדירים אותו, ומה ההשלכות המעשיות לכל מצב.`,
    m:`בר-תיקון: נזק גולמי < 50%. הרכב מתוקן ע"י חברת הביטוח. הפיצוי = עלות התיקון + ירידת ערך.

אובדן גמור להלכה: נזק גולמי ≥ 50% וגם < 60%. המבטח רשאי (לא חייב) לפצות ללא תיקון, כאילו אובדן גמור. ההחלטה תלויה בתנאי הפוליסה הספציפית.

אובדן גמור: נזק גולמי ≥ 60%, או שהרכב יצא מכלל שימוש. חובה לדווח לרשות הרישוי תוך 45 יום. להחזיר רישיון הרכב. הפיצוי = שווי השוק של הרכב פחות ערך השרידים.` },

  { q:`מהם 5 העיסוקים האסורים לשמאי רכב לפי צו הפיקוח?
עבור כל עיסוק — הסבר מדוע הוא מהווה ניגוד עניינים.`,
    m:`① עסקי ביטוח — שמאי מטעם חברת ביטוח עשוי להעדיף האינטרס שלה על פני המבוטח.

② תיווך/מכירת רכב — שמאי המוכר רכבים עשוי להעריך נזקים בצורה שתשרת את עסקאותיו.

③ ניהול מוסך — שמאי שמנהל מוסך עשוי להפנות עבודות לעצמו ולהגדיל שומות.

④ קצין בטיחות במפעל — עלול ליצור חפיפה אינטרסים בסוגיות בטיחות רכב.

⑤ כל עיסוק בניגוד עניינים — עיקרון כללי: שמאי חייב לשמור על עצמאות מלאה ולא להיות תלוי בגורם כלשהו.` },

  { q:`רכב נהג-חגיגה 2020 עבר תאונה. ניתנו שתי שומות סותרות:
שמאי א': נזק ₪35,000, ערך רכב ₪90,000
שמאי ב': נזק ₪22,000, ערך רכב ₪85,000

א. חשב אחוז נזק גולמי לפי כל שמאי.
ב. באיזה שמאי נוהגים לפי כלל הנזק הגולמי?
ג. מה ניתן לעשות?`,
    m:`א. שמאי א': 35,000 / 90,000 × 100 = 38.9%
שמאי ב': 22,000 / 85,000 × 100 = 25.9%

ב. שני השמאים מגיעים לאחוז נזק גולמי נמוך מ-50%, כך שבשני המקרים הרכב בר-תיקון.
המחלוקת היא על עלות התיקון ושווי הרכב, לא על מצב הרכב.

ג. ניתן לפנות למנגנון שמאי מכריע: פנייה למוקד "ניהולית" → בחירה אקראית של שמאי מכריע → הכרעה מחייבת.` },

  { q:`פרט את תהליך הדיווח על נזק בטיחותי מהותי לפי חוזר 23 בשלושה מקרים שונים:
א. נזק שנבדק ע"י שמאי ותוקן.
ב. נזק שלא נבדק ע"י שמאי ותוקן.
ג. רכב שהוכרז אובדן להלכה ולא תוקן.`,
    m:`א. נבדק ע"י שמאי ותוקן:
השמאי קובע אם הנזק מהותי (לפי ניקוד חוזר 23 ≥ 10).
לאחר קבלת תעודת הבדיקה — השמאי מדווח לרשות הרישוי בכרטיס מקוון.
ברישיון נרשם: "נזק בטיחותי תוקן ונבדק".

ב. לא נבדק ע"י שמאי ותוקן:
המוסך ממלא טופס 3 ושולח למכון בדיקה מוסמך.
מכון הבדיקה מדווח לרשות הרישוי בסיום הבדיקה.

ג. הוכרז אובדן להלכה (לא תוקן):
אם הרכב נמכר לתיקון — המוסך ממלא טופס 3 למכון הבדיקה.
מכון הבדיקה מדווח לרשות הרישוי בסיום הבדיקה.` },
];

// Top-down car outline with damage zones
function CarTopView({ damages=[], label="" }) {
  // damages: array of zone ids: "front","rear","sideL","sideR","roof","frontL","frontR","rearL","rearR"
  const zones = {
    front:  { path:"M 80 30 Q 120 15 160 30 L 170 60 L 70 60 Z", label:"חזית" },
    frontL: { path:"M 70 60 L 50 55 L 45 90 L 70 90 Z", label:"כנף קד' שמ'" },
    frontR: { path:"M 170 60 L 190 55 L 195 90 L 170 90 Z", label:"כנף קד' ימ'" },
    sideL:  { path:"M 70 90 L 45 90 L 40 170 L 70 170 Z", label:"צד שמאלי" },
    sideR:  { path:"M 170 90 L 195 90 L 200 170 L 170 170 Z", label:"צד ימני" },
    rearL:  { path:"M 70 170 L 45 170 L 50 210 L 70 210 Z", label:"כנף אח' שמ'" },
    rearR:  { path:"M 170 170 L 195 170 L 190 210 L 170 210 Z", label:"כנף אח' ימ'" },
    rear:   { path:"M 70 210 L 80 235 Q 120 248 160 235 L 170 210 Z", label:"אחור" },
    roof:   { path:"M 75 75 L 165 75 L 165 195 L 75 195 Z", label:"גג/גוף" },
  };
  const hit = new Set(damages);
  return (
    <svg viewBox="0 0 240 265" width="180" height="200" style={{display:"block"}}>
      {/* Car body base */}
      <rect x="45" y="55" width="150" height="160" rx="8" fill="#f0f0f0" stroke="#ccc" strokeWidth="1.5"/>
      {/* Windshields */}
      <path d="M 78 62 Q 120 50 162 62 L 158 85 L 82 85 Z" fill="#ddeeff" stroke="#bbb" strokeWidth="1"/>
      <path d="M 78 205 Q 120 218 162 205 L 158 185 L 82 185 Z" fill="#ddeeff" stroke="#bbb" strokeWidth="1"/>
      {/* Wheels */}
      {[[52,70],[178,70],[52,185],[178,185]].map(([cx,cy],i)=>(
        <ellipse key={i} cx={cx} cy={cy} rx="12" ry="14" fill="#333" stroke="#222" strokeWidth="1"/>
      ))}
      {/* Damage zones */}
      {Object.entries(zones).map(([id, z]) => (
        <path key={id} d={z.path}
          fill={hit.has(id) ? "rgba(200,40,40,0.22)" : "transparent"}
          stroke={hit.has(id) ? "#c82828" : "transparent"}
          strokeWidth={hit.has(id) ? 2 : 0}
        />
      ))}
      {/* Damage X markers */}
      {damages.map((id, i) => {
        const centers = {
          front:"120,42", frontL:"57,75", frontR:"183,75",
          sideL:"52,130", sideR:"188,130",
          rearL:"57,193", rearR:"183,193", rear:"120,225", roof:"120,135"
        };
        const [cx,cy] = (centers[id]||"120,135").split(",").map(Number);
        return (
          <g key={i}>
            <circle cx={cx} cy={cy} r="9" fill="#c82828" opacity=".9"/>
            <text x={cx} y={cy+4} textAnchor="middle" fontSize="11" fill="white" fontWeight="bold">✕</text>
          </g>
        );
      })}
      {/* Label */}
      {label && <text x="120" y="258" textAnchor="middle" fontSize="10" fill="#6e6e73">{label}</text>}
    </svg>
  );
}

  { d:["front","frontL","sideL"], q:"ערך בסיס ₪90,000. חלקים: ₪32,000. עבודות: ₪12,000. מהו אחוז הנזק הגולמי?", o:["35.6%","48.9%","55.6%","61.1%"], a:2, x:"(32,000+12,000) / 90,000 × 100 = 44,000/90,000 = 48.9% — אובדן להלכה (50%-60%)." },
];

/* ─── VISUAL EXAM ─────────────────────────────────────────── */
function VisualExam() {
  const [qs] = useState(()=>[...VISUAL_MC].sort(()=>Math.random()-.5));
  const [cur, setCur] = useState(0);
  const [sel, setSel] = useState(null);
  const [locked, setLocked] = useState(false);
  const [score, setScore] = useState(0);
  const [done, setDone] = useState(false);

  const q = qs[cur];

  function confirm() {
    if (sel === null || locked) return;
    setLocked(true);
    if (sel === q.a) setScore(s => s+1);
  }

  function next() {
    if (cur + 1 >= qs.length) { setDone(true); return; }
    setCur(c => c+1);
    setSel(null);
    setLocked(false);
  }

  function reset() {
    setCur(0); setSel(null); setLocked(false); setScore(0); setDone(false);
  }

  const pct = Math.round(score / qs.length * 100);

  if (done) return (
    <div className="fu" style={{maxWidth:480,margin:"60px auto",textAlign:"center"}}>
      <div style={{fontSize:96,fontWeight:700,letterSpacing:"-0.05em",lineHeight:1,marginBottom:4}}>
        {pct}<span style={{fontSize:56}}>%</span>
      </div>
      <div style={{width:48,height:2,background:"#1d1d1f",margin:"24px auto"}}/>
      <div style={{fontSize:15,color:"#6e6e73",marginBottom:8}}>{score} נכון מתוך {qs.length}</div>
      <div style={{fontSize:20,fontWeight:600,marginBottom:48}}>
        {pct>=85?"מצוין — מוכן לבחינה":pct>=70?"טוב מאוד":"חזור על החומר"}
      </div>
      <button onClick={reset} style={{background:"#1d1d1f",color:"#fff",border:"none",borderRadius:980,padding:"14px 36px",fontSize:15,fontWeight:500,cursor:"pointer"}}>נסה שוב</button>
    </div>
  );

  const zoneLabels = {front:"חזית",frontL:"כנף קד' שמ'",frontR:"כנף קד' ימ'",sideL:"צד שמאל",sideR:"צד ימין",rearL:"כנף אח' שמ'",rearR:"כנף אח' ימ'",rear:"אחור",roof:"גג"};

  return (
    <div style={{maxWidth:640,margin:"0 auto"}} className="fu">
      {/* Progress */}
      <div style={{height:2,background:"#e5e5e7",borderRadius:1,marginBottom:28}}>
        <div style={{height:2,background:"#1d1d1f",borderRadius:1,width:`${cur/qs.length*100}%`,transition:"width .5s"}}/>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:13,color:"#6e6e73",marginBottom:24}}>
        <span>{cur+1} / {qs.length}</span><span>{score} נכון</span>
      </div>

      {/* Card: diagram on top, question below */}
      <div style={{background:"#f5f5f7",borderRadius:20,overflow:"hidden",marginBottom:12}}>
        {/* Diagram section */}
        <div style={{background:"#ebebed",padding:"24px 0",display:"flex",flexDirection:"column",alignItems:"center",gap:10}}>
          <CarTopView damages={q.d} label=""/>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",justifyContent:"center"}}>
            {q.d.map(d=>(
              <span key={d} style={{background:"#c82828",color:"#fff",fontSize:11,fontWeight:600,padding:"3px 10px",borderRadius:20}}>
                {zoneLabels[d]||d}
              </span>
            ))}
          </div>
        </div>
        {/* Question section */}
        <div style={{padding:"22px 24px"}}>
          <div style={{fontSize:11,fontWeight:600,letterSpacing:2,color:"#6e6e73",textTransform:"uppercase",marginBottom:10}}>שאלה עם איור</div>
          <div style={{fontSize:16,fontWeight:600,color:"#1d1d1f",lineHeight:1.65}}>{q.q}</div>
        </div>
      </div>

      {/* Options */}
      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:12}}>
        {q.o.map((opt,i)=>{
          let bg="#f5f5f7",col="#1d1d1f",fw=400;
          if (!locked && sel===i) { bg="#e8e8ed"; fw=500; }
          if (locked && i===q.a)  { bg="#1d1d1f"; col="#fff"; fw=600; }
          if (locked && sel===i && i!==q.a) { bg="#fff0f0"; col="#c53030"; }
          return (
            <button key={i} onClick={()=>{ if(!locked) setSel(i); }}
              style={{background:bg,border:"none",color:col,padding:"14px 18px",textAlign:"right",
                cursor:locked?"default":"pointer",fontSize:15,fontWeight:fw,borderRadius:12,
                transition:"all .15s",display:"flex",alignItems:"center",gap:12}}>
              <span style={{width:26,height:26,borderRadius:"50%",background:"rgba(0,0,0,.06)",
                display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,
                flexShrink:0,color:col}}>
                {locked&&i===q.a?"✓":locked&&sel===i&&i!==q.a?"✗":String.fromCharCode(65+i)}
              </span>
              {opt}
            </button>
          );
        })}
      </div>

      {/* Explanation */}
      {locked && (
        <div className="fi" style={{background:"#f5f5f7",borderRadius:12,padding:"14px 18px",marginBottom:12,fontSize:14,color:"#3d3d3f",lineHeight:1.7}}>
          {q.x}
        </div>
      )}

      {/* Buttons */}
      <div style={{display:"flex",justifyContent:"flex-end",gap:10}}>
        {!locked
          ? <button onClick={confirm} disabled={sel===null}
              style={{background:sel===null?"#e5e5e7":"#1d1d1f",color:sel===null?"#999":"#fff",
                border:"none",borderRadius:980,padding:"14px 36px",fontSize:15,fontWeight:500,
                cursor:sel===null?"default":"pointer",transition:"all .2s"}}>
              אשר
            </button>
          : <button onClick={next}
              style={{background:"#1d1d1f",color:"#fff",border:"none",borderRadius:980,
                padding:"14px 36px",fontSize:15,fontWeight:500,cursor:"pointer"}}>
              {cur+1>=qs.length ? "לתוצאות" : "הבא"}
            </button>
        }
      </div>
    </div>
  );
}

/* ─── SHOMA BUILDER ───────────────────────────────────────── */
function ShomaBuilder() {
  const [caseIdx, setCaseIdx] = useState(0);
  const [step, setStep]       = useState(0);
  const [parts, setParts]     = useState({});   // {id: bool}
  const [works, setWorks]     = useState({});   // {id: bool}
  const [yrida, setYrida]     = useState({});   // {idx: number}
  const [hint, setHint]       = useState(false);
  const [result, setResult]   = useState(false);

  const sc = SHOMA_CASES[caseIdx];
  const st = sc.steps[step];

  function goCase(idx) {
    setCaseIdx(idx); setStep(0); setParts({}); setWorks({});
    setYrida({}); setHint(false); setResult(false);
  }

  function goNext() {
    if (step + 1 >= sc.steps.length) { setResult(true); }
    else { setStep(s => s+1); setHint(false); }
  }

  function goPrev() {
    if (step > 0) { setStep(s => s-1); setHint(false); }
  }

  // ── Totals ──
  const pStep = sc.steps.find(s=>s.id==="parts");
  const wStep = sc.steps.find(s=>s.id==="work");
  const yStep = sc.steps.find(s=>s.id==="yrida");

  const partsTotal = pStep ? pStep.items.filter(i=>parts[i.id]).reduce((a,i)=>a+i.price,0) : 0;
  const workTotal  = wStep ? wStep.items.filter(i=>works[i.id]).reduce((a,i)=>a+i.hours*i.rate,0) : 0;
  const beforeVat  = partsTotal + workTotal;
  const withVat    = Math.round(beforeVat * 1.18);
  const baseVal    = sc.car.baseValue;
  const nezekPct   = baseVal > 0 ? (beforeVat / baseVal * 100) : 0;
  const nezekStr   = nezekPct.toFixed(1) + "%";
  const status     = nezekPct >= 60 ? "אובדן גמור 🔴" : nezekPct >= 50 ? "אובדן להלכה 🟡" : "בר-תיקון ✅";
  const yTotal     = yStep ? yStep.zones.reduce((a,z,i)=>a+(yrida[i]||0),0) : 0;
  const yNis       = Math.round(baseVal * yTotal / 100);

  return (
    <div style={{maxWidth:700,margin:"0 auto"}} className="fu">
      {/* Case tabs */}
      <div style={{display:"flex",gap:2,background:"#f5f5f7",borderRadius:12,padding:4,marginBottom:32,width:"fit-content"}}>
        {SHOMA_CASES.map((c,i)=>(
          <button key={c.id} onClick={()=>goCase(i)}
            style={{background:caseIdx===i?"#fff":"transparent",color:caseIdx===i?"#1d1d1f":"#6e6e73",
              border:"none",borderRadius:9,padding:"8px 20px",cursor:"pointer",fontSize:14,
              fontWeight:caseIdx===i?600:400,transition:"all .2s",
              boxShadow:caseIdx===i?"0 1px 4px rgba(0,0,0,.08)":"none"}}>
            מקרה {i+1}
          </button>
        ))}
      </div>

      {/* Header card with diagram */}
      <div style={{background:"#f5f5f7",borderRadius:20,padding:"22px 24px",marginBottom:24,
        display:"flex",gap:24,alignItems:"center",flexWrap:"wrap"}}>
        <div style={{flexShrink:0}}>
          <CarTopView damages={sc.diagram.damages} label=""/>
        </div>
        <div style={{flex:1,minWidth:200}}>
          <div style={{fontSize:11,fontWeight:600,letterSpacing:2,color:"#6e6e73",textTransform:"uppercase",marginBottom:8}}>תרגיל שומה</div>
          <div style={{fontSize:19,fontWeight:700,marginBottom:6,letterSpacing:"-0.02em"}}>{sc.title}</div>
          <div style={{fontSize:14,color:"#3d3d3f",lineHeight:1.65,marginBottom:10}}>{sc.description}</div>
          <div style={{display:"flex",gap:14,flexWrap:"wrap"}}>
            {[["📅",sc.car.year],["🛣",sc.car.km.toLocaleString()+" ק\"מ"],["💰","₪"+sc.car.baseValue.toLocaleString()]].map(([ic,v])=>(
              <span key={v} style={{fontSize:13,color:"#6e6e73"}}>{ic} {v}</span>
            ))}
          </div>
        </div>
      </div>

      {/* Step progress */}
      <div style={{display:"flex",gap:6,marginBottom:24}}>
        {sc.steps.map((s,i)=>(
          <div key={i} style={{flex:1,height:3,borderRadius:2,
            background:i<step?"#1d1d1f":i===step?"#555":"#e5e5e7",transition:"background .3s"}}/>
        ))}
      </div>

      {/* Step card */}
      <div style={{background:"#f5f5f7",borderRadius:20,padding:"24px 24px",marginBottom:14}}>
        <div style={{fontSize:11,fontWeight:600,letterSpacing:2,color:"#6e6e73",textTransform:"uppercase",marginBottom:10}}>{st.title}</div>
        <div style={{fontSize:16,fontWeight:500,color:"#1d1d1f",marginBottom:18}}>{st.instruction}</div>

        {/* PARTS */}
        {st.type==="checklist" && st.items.map(item=>(
          <label key={item.id} style={{display:"flex",alignItems:"center",gap:14,background:"#fff",
            borderRadius:12,padding:"13px 16px",cursor:"pointer",marginBottom:8,
            border:`1.5px solid ${parts[item.id]?"#1d1d1f":"#e5e5e7"}`,transition:"border-color .15s"}}>
            <input type="checkbox" checked={!!parts[item.id]}
              onChange={e=>setParts(p=>({...p,[item.id]:e.target.checked}))}
              style={{width:18,height:18,accentColor:"#1d1d1f",cursor:"pointer",flexShrink:0}}/>
            <span style={{flex:1,fontSize:15,fontWeight:500}}>{item.label}
              <span style={{fontSize:13,color:"#6e6e73",marginRight:6}}> — {item.action}</span>
            </span>
            <span style={{fontSize:14,fontWeight:600}}>₪{item.price.toLocaleString()}</span>
          </label>
        ))}

        {/* WORK */}
        {st.type==="work" && st.items.map(item=>(
          <label key={item.id} style={{display:"flex",alignItems:"center",gap:14,background:"#fff",
            borderRadius:12,padding:"13px 16px",cursor:"pointer",marginBottom:8,
            border:`1.5px solid ${works[item.id]?"#1d1d1f":"#e5e5e7"}`,transition:"border-color .15s"}}>
            <input type="checkbox" checked={!!works[item.id]}
              onChange={e=>setWorks(p=>({...p,[item.id]:e.target.checked}))}
              style={{width:18,height:18,accentColor:"#1d1d1f",cursor:"pointer",flexShrink:0}}/>
            <span style={{flex:1,fontSize:15,fontWeight:500}}>{item.label}
              <span style={{fontSize:13,color:"#6e6e73",marginRight:6}}> — {item.hours} שע' × ₪{item.rate}</span>
            </span>
            <span style={{fontSize:14,fontWeight:600}}>₪{(item.hours*item.rate).toLocaleString()}</span>
          </label>
        ))}

        {/* CALCULATE */}
        {st.type==="calculate" && (
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {[
              ["חלקים (לפני מע\"מ)", "₪"+partsTotal.toLocaleString(), false],
              ["עבודות (לפני מע\"מ)", "₪"+workTotal.toLocaleString(), false],
              ["סה\"כ לפני מע\"מ", "₪"+beforeVat.toLocaleString(), false],
              ["מע\"מ 18%", "₪"+Math.round(beforeVat*0.18).toLocaleString(), false],
              ["סה\"כ כולל מע\"מ", "₪"+withVat.toLocaleString(), false],
              ["ערך בסיס מחירון", "₪"+baseVal.toLocaleString(), false],
              ["אחוז נזק גולמי", nezekStr, true],
              ["מצב הרכב", status, true],
            ].map(([k,v,bold])=>(
              <div key={k} style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                padding:"11px 14px",background:bold?"#1d1d1f":"#fff",borderRadius:10}}>
                <span style={{fontSize:14,color:bold?"#fff":"#3d3d3f"}}>{k}</span>
                <span style={{fontSize:15,fontWeight:700,color:bold?"#fff":"#1d1d1f"}}>{v}</span>
              </div>
            ))}
          </div>
        )}

        {/* YRIDA */}
        {st.type==="yrida" && (
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            {st.zones.map((z,i)=>(
              <div key={i} style={{background:"#fff",borderRadius:12,padding:"14px 16px"}}>
                <div style={{fontSize:14,fontWeight:500,marginBottom:10}}>{z.label}</div>
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  <input type="range" min={0} max={z.maxPct} step={0.5}
                    value={yrida[i]||0}
                    onChange={e=>setYrida(p=>({...p,[i]:parseFloat(e.target.value)}))}
                    style={{flex:1,accentColor:"#1d1d1f",height:4}}/>
                  <span style={{fontSize:17,fontWeight:700,minWidth:42,textAlign:"left"}}>{yrida[i]||0}%</span>
                </div>
                <div style={{fontSize:12,color:"#6e6e73",marginTop:4}}>מקסימום: {z.maxPct}%</div>
              </div>
            ))}
            <div style={{background:"#1d1d1f",color:"#fff",borderRadius:12,padding:"14px 16px",
              display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:14}}>סה"כ ירידת ערך</span>
              <span style={{fontSize:16,fontWeight:700}}>{yTotal}% = ₪{yNis.toLocaleString()}</span>
            </div>
          </div>
        )}

        {/* Hint */}
        {st.hint ? (
          <div style={{marginTop:14}}>
            <button onClick={()=>setHint(h=>!h)}
              style={{background:"none",border:"1px solid #e5e5e7",borderRadius:980,padding:"6px 16px",
                cursor:"pointer",fontSize:13,color:"#6e6e73"}}>
              {hint?"הסתר רמז":"💡 רמז"}
            </button>
            {hint && (
              <div className="fi" style={{marginTop:10,background:"#fffbea",borderRadius:10,
                padding:"11px 14px",fontSize:14,color:"#5a4500",lineHeight:1.6}}>
                {st.hint}
              </div>
            )}
          </div>
        ) : null}
      </div>

      {/* Final summary */}
      {result && (
        <div className="fi" style={{background:"#1d1d1f",borderRadius:20,padding:"24px",marginBottom:14,color:"#fff"}}>
          <div style={{fontSize:11,letterSpacing:2,color:"rgba(255,255,255,.45)",textTransform:"uppercase",marginBottom:14}}>סיכום השומה</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            {[["עלות תיקון","₪"+withVat.toLocaleString()],["ירידת ערך","₪"+yNis.toLocaleString()],["פיצוי כולל","₪"+(withVat+yNis).toLocaleString()],["מצב הרכב",status]].map(([k,v])=>(
              <div key={k} style={{background:"rgba(255,255,255,.08)",borderRadius:10,padding:"12px 14px"}}>
                <div style={{fontSize:12,color:"rgba(255,255,255,.45)",marginBottom:3}}>{k}</div>
                <div style={{fontSize:17,fontWeight:700}}>{v}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Nav buttons */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <button onClick={goPrev} disabled={step===0}
          style={{background:"none",border:"1px solid #e5e5e7",borderRadius:980,padding:"12px 24px",
            cursor:step===0?"default":"pointer",fontSize:14,color:"#6e6e73",
            opacity:step===0?0.3:1,transition:"opacity .2s"}}>
          ← חזרה
        </button>
        {!result ? (
          <button onClick={goNext}
            style={{background:"#1d1d1f",color:"#fff",border:"none",borderRadius:980,
              padding:"14px 36px",cursor:"pointer",fontSize:15,fontWeight:500}}>
            {step===sc.steps.length-1 ? "סיים שומה" : "הבא →"}
          </button>
        ) : (
          <button onClick={()=>goCase(caseIdx)}
            style={{background:"#1d1d1f",color:"#fff",border:"none",borderRadius:980,
              padding:"14px 36px",cursor:"pointer",fontSize:15,fontWeight:500}}>
            התחל מחדש
          </button>
        )}
      </div>
    </div>
  );
}

/* ─── VISUAL EXAM COMPONENT ───────────────────────────────── */
function VisualExam() {
  const [qs] = useState(()=>[...VISUAL_MC].sort(()=>Math.random()-.5));
  const [cur, setCur] = useState(0);
  const [sel, setSel] = useState(null);
  const [locked, setLocked] = useState(false);
  const [results, setResults] = useState([]);
  const [done, setDone] = useState(false);

  const q = qs[cur];
  const score = results.filter(Boolean).length;
  const pct = done ? Math.round(score/qs.length*100) : 0;

  function confirm(){if(sel===null||locked)return;setLocked(true);setResults(r=>[...r,sel===q.a]);}
  function next(){if(cur+1>=qs.length){setDone(true);return;}setCur(c=>c+1);setSel(null);setLocked(false);}
  function reset(){setCur(0);setSel(null);setLocked(false);setResults([]);setDone(false);}

  if(done) return (
    <div className="fu" style={{maxWidth:480,margin:"60px auto",textAlign:"center"}}>
      <div style={{fontSize:96,fontWeight:700,letterSpacing:"-0.05em",lineHeight:1,marginBottom:4}}>
        {pct}<span style={{fontSize:56}}>%</span>
      </div>
      <div style={{width:48,height:2,background:"#1d1d1f",margin:"24px auto"}}/>
      <div style={{fontSize:15,color:"#6e6e73",marginBottom:8}}>{score} נכון מתוך {qs.length}</div>
      <div style={{fontSize:20,fontWeight:600,marginBottom:48}}>
        {pct>=85?"מצוין":"pct>=70"?"טוב מאוד":"חזור על החומר"}
      </div>
      <button onClick={reset} style={{background:"#1d1d1f",color:"#fff",border:"none",borderRadius:980,padding:"14px 36px",fontSize:15,fontWeight:500,cursor:"pointer"}}>נסה שוב</button>
    </div>
  );

  return (
    <div style={{maxWidth:660,margin:"0 auto"}} className="fu">
      <div style={{height:2,background:"#e5e5e7",borderRadius:1,marginBottom:32}}>
        <div style={{height:2,background:"#1d1d1f",borderRadius:1,width:`${cur/qs.length*100}%`,transition:"width .5s"}}/>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:13,color:"#6e6e73",marginBottom:28}}>
        <span>{cur+1} / {qs.length}</span><span>{score} נכון</span>
      </div>

      {/* Car diagram + question side by side */}
      <div style={{background:"#f5f5f7",borderRadius:16,padding:"24px 24px",marginBottom:16,display:"flex",gap:24,alignItems:"flex-start",flexWrap:"wrap"}}>
        <div style={{flexShrink:0,display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
          <CarTopView damages={q.diagram.damages} label={q.diagram.label}/>
          <div style={{fontSize:11,color:"#c82828",fontWeight:600,textAlign:"center",maxWidth:180}}>
            {q.diagram.damages.map(d=>({
              front:"חזית",frontL:"כנף קד' שמ'",frontR:"כנף קד' ימ'",
              sideL:"צד שמאל",sideR:"צד ימין",rearL:"כנף אח' שמ'",
              rearR:"כנף אח' ימ'",rear:"אחור",roof:"גג"
            }[d]||d)).join(" + ")}
          </div>
        </div>
        <div style={{flex:1,minWidth:220}}>
          <div style={{fontSize:11,fontWeight:600,letterSpacing:2,color:"#6e6e73",textTransform:"uppercase",marginBottom:12}}>שאלה עם איור</div>
          <div style={{fontSize:16,fontWeight:600,color:"#1d1d1f",lineHeight:1.6}}>{q.q}</div>
        </div>
      </div>

      {/* Options */}
      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
        {q.o.map((opt,i)=>{
          let bg="#f5f5f7",col="#1d1d1f",fw=400;
          if(!locked&&sel===i){bg="#e8e8ed";fw=500;}
          if(locked&&i===q.a){bg="#1d1d1f";col="#fff";fw=600;}
          if(locked&&sel===i&&i!==q.a){bg="#fff0f0";col="#c53030";}
          return(
            <button key={i} onClick={()=>!locked&&setSel(i)}
              style={{background:bg,border:"none",color:col,padding:"14px 18px",textAlign:"right",
                cursor:locked?"default":"pointer",fontSize:15,fontWeight:fw,borderRadius:12,
                transition:"all .15s",display:"flex",alignItems:"center",gap:12}}>
              <span style={{width:26,height:26,borderRadius:"50%",background:"rgba(0,0,0,.06)",
                display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,flexShrink:0,color:col}}>
                {locked&&i===q.a?"✓":locked&&sel===i&&i!==q.a?"✗":String.fromCharCode(65+i)}
              </span>{opt}
            </button>
          );
        })}
      </div>

      {locked&&(
        <div className="fi" style={{background:"#f5f5f7",borderRadius:12,padding:"14px 18px",marginBottom:16,fontSize:14,color:"#3d3d3f",lineHeight:1.7}}>
          {q.x}
        </div>
      )}
      <div style={{display:"flex",justifyContent:"flex-end"}}>
        {!locked
          ?<button onClick={confirm} disabled={sel===null} style={{background:sel===null?"#e5e5e7":"#1d1d1f",color:sel===null?"#999":"#fff",border:"none",borderRadius:980,padding:"14px 36px",fontSize:15,fontWeight:500,cursor:sel===null?"default":"pointer",transition:"all .2s"}}>אשר</button>
          :<button onClick={next} style={{background:"#1d1d1f",color:"#fff",border:"none",borderRadius:980,padding:"14px 36px",fontSize:15,fontWeight:500,cursor:"pointer"}}>{cur+1>=qs.length?"לתוצאות":"הבא"}</button>
        }
      </div>
    </div>
  );
}

/* ─── SHOMA BUILDER COMPONENT ─────────────────────────────── */
function ShomaBuilder() {
  const [caseIdx, setCaseIdx] = useState(0);
  const [step, setStep] = useState(0);
  const [selected, setSelected] = useState({});
  const [workSelected, setWorkSelected] = useState({});
  const [yridaPct, setYridaPct] = useState({});
  const [showHint, setShowHint] = useState(false);
  const [stepDone, setStepDone] = useState(false);
  const [showResult, setShowResult] = useState(false);

  const sc = SHOMA_CASES[caseIdx];
  const st = sc.steps[step];

  function resetCase(idx) {
    setCaseIdx(idx); setStep(0); setSelected({}); setWorkSelected({});
    setYridaPct({}); setShowHint(false); setStepDone(false); setShowResult(false);
  }

  // Calculate totals
  const partsStep = sc.steps.find(s=>s.id==="parts");
  const workStep  = sc.steps.find(s=>s.id==="work");
  const yridaStep = sc.steps.find(s=>s.id==="yrida");
  const partsTotal = partsStep ? partsStep.items.filter(i=>selected[i.id]).reduce((s,i)=>s+i.price,0) : 0;
  const workTotal  = workStep  ? workStep.items.filter(i=>workSelected[i.id]).reduce((s,i)=>s+i.hours*i.rate,0) : 0;
  const beforeVat  = partsTotal + workTotal;
  const withVat    = Math.round(beforeVat * 1.18);
  const baseVal    = sc.car.baseValue;
  const nezekPct   = baseVal>0 ? (beforeVat/baseVal*100).toFixed(1) : 0;
  const yridaTotal = yridaStep ? yridaStep.zones.reduce((s,z,i)=>s+(yridaPct[i]||0),0) : 0;
  const yridaNis   = Math.round(baseVal * yridaTotal / 100);
  const status     = nezekPct>=60?"אובדן גמור 🔴":nezekPct>=50?"אובדן להלכה 🟡":"בר-תיקון ✅";

  function checkStep() {
    setStepDone(true);
    if(step===sc.steps.length-1) setShowResult(true);
  }

  const s = (id) => `rgba(0,0,0,${selected[id]?.checked?".08":".04"})`;

  return (
    <div style={{maxWidth:760,margin:"0 auto"}} className="fu">
      {/* Case selector */}
      <div style={{display:"flex",gap:2,background:"#f5f5f7",borderRadius:12,padding:4,marginBottom:40,width:"fit-content"}}>
        {SHOMA_CASES.map((c,i)=>(
          <button key={c.id} onClick={()=>resetCase(i)}
            style={{background:caseIdx===i?"#fff":"transparent",color:caseIdx===i?"#1d1d1f":"#6e6e73",
              border:"none",borderRadius:9,padding:"8px 20px",cursor:"pointer",fontSize:14,fontWeight:caseIdx===i?600:400,
              transition:"all .2s",boxShadow:caseIdx===i?"0 1px 4px rgba(0,0,0,.08)":"none"}}>
            מקרה {i+1}
          </button>
        ))}
      </div>

      {/* Car info + diagram */}
      <div style={{background:"#f5f5f7",borderRadius:20,padding:"24px 28px",marginBottom:28,display:"flex",gap:28,alignItems:"center",flexWrap:"wrap"}}>
        <CarTopView damages={sc.diagram.damages} label={sc.title}/>
        <div style={{flex:1,minWidth:220}}>
          <div style={{fontSize:11,fontWeight:600,letterSpacing:2,color:"#6e6e73",textTransform:"uppercase",marginBottom:12}}>מקרה בדיקה</div>
          <div style={{fontSize:20,fontWeight:700,letterSpacing:"-0.02em",marginBottom:8}}>{sc.title}</div>
          <div style={{fontSize:14,color:"#3d3d3f",lineHeight:1.7,marginBottom:12}}>{sc.description}</div>
          <div style={{display:"flex",gap:16,fontSize:13,color:"#6e6e73"}}>
            <span>📅 {sc.car.year}</span>
            <span>🛣 {sc.car.km.toLocaleString()} ק"מ</span>
            <span>💰 ₪{sc.car.baseValue.toLocaleString()} ערך בסיס</span>
          </div>
        </div>
      </div>

      {/* Step indicator */}
      <div style={{display:"flex",gap:8,marginBottom:28}}>
        {sc.steps.map((s,i)=>(
          <div key={i} style={{flex:1,height:3,borderRadius:2,background:i<=step?"#1d1d1f":"#e5e5e7",transition:"background .3s"}}/>
        ))}
      </div>

      {/* Current step */}
      <div style={{background:"#f5f5f7",borderRadius:20,padding:"28px 28px",marginBottom:16}}>
        <div style={{fontSize:11,fontWeight:600,letterSpacing:2,color:"#6e6e73",textTransform:"uppercase",marginBottom:12}}>{st.title}</div>
        <div style={{fontSize:17,fontWeight:500,color:"#1d1d1f",marginBottom:20}}>{st.instruction}</div>

        {/* CHECKLIST step */}
        {st.type==="checklist" && (
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {st.items.map(item=>(
              <label key={item.id} style={{display:"flex",alignItems:"center",gap:14,background:"#fff",
                borderRadius:12,padding:"14px 18px",cursor:"pointer",
                border:`1.5px solid ${selected[item.id]?"#1d1d1f":"#e5e5e7"}`,transition:"all .15s"}}>
                <input type="checkbox" checked={!!selected[item.id]}
                  onChange={e=>setSelected(p=>({...p,[item.id]:e.target.checked}))}
                  style={{width:18,height:18,cursor:"pointer",accentColor:"#1d1d1f"}}/>
                <div style={{flex:1}}>
                  <span style={{fontWeight:500,fontSize:15}}>{item.label}</span>
                  <span style={{fontSize:13,color:"#6e6e73",marginRight:8}}> — {item.action}</span>
                </div>
                <span style={{fontSize:14,fontWeight:600,color:"#1d1d1f"}}>₪{item.price.toLocaleString()}</span>
              </label>
            ))}
          </div>
        )}

        {/* WORK step */}
        {st.type==="work" && (
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {st.items.map(item=>(
              <label key={item.id} style={{display:"flex",alignItems:"center",gap:14,background:"#fff",
                borderRadius:12,padding:"14px 18px",cursor:"pointer",
                border:`1.5px solid ${workSelected[item.id]?"#1d1d1f":"#e5e5e7"}`,transition:"all .15s"}}>
                <input type="checkbox" checked={!!workSelected[item.id]}
                  onChange={e=>setWorkSelected(p=>({...p,[item.id]:e.target.checked}))}
                  style={{width:18,height:18,cursor:"pointer",accentColor:"#1d1d1f"}}/>
                <div style={{flex:1}}>
                  <span style={{fontWeight:500,fontSize:15}}>{item.label}</span>
                  <span style={{fontSize:13,color:"#6e6e73"}}> — {item.hours} שעות × ₪{item.rate}</span>
                </div>
                <span style={{fontSize:14,fontWeight:600}}>₪{(item.hours*item.rate).toLocaleString()}</span>
              </label>
            ))}
          </div>
        )}

        {/* CALCULATE step */}
        {st.type==="calculate" && (
          <div style={{display:"flex",flexDirection:"column",gap:12}}>

            {showResult?"✓ הושלם":"סיים שומה"}

    </div>
  );

function MCExam() {
  const [qs] = useState(()=>[...ALL_MC].sort(()=>Math.random()-.5).slice(0,15));
  const [cur,setCur] = useState(0);
  const [sel,setSel] = useState(null);
  const [locked,setLocked] = useState(false);
  const [results,setResults] = useState([]);
  const [done,setDone] = useState(false);
  const q=qs[cur];
  const score=results.filter(Boolean).length;
  const pct=done?Math.round(score/qs.length*100):0;

  function confirm(){if(sel===null||locked)return;setLocked(true);setResults(r=>[...r,sel===q.a]);}
  function next(){if(cur+1>=qs.length){setDone(true);return;}setCur(c=>c+1);setSel(null);setLocked(false);}
  function reset(){setCur(0);setSel(null);setLocked(false);setResults([]);setDone(false);}

  if(done) return(
    <div className="fu" style={{maxWidth:480,margin:"60px auto",textAlign:"center"}}>
      <div style={{fontSize:96,fontWeight:700,letterSpacing:"-0.05em",color:"#1d1d1f",lineHeight:1,marginBottom:4}}>
        {pct}<span style={{fontSize:56}}>%</span>
      </div>
      <div style={{width:48,height:2,background:"#1d1d1f",margin:"24px auto"}}/>
      <div style={{fontSize:15,color:"#6e6e73",marginBottom:8}}>{score} נכון מתוך {qs.length}</div>
      <div style={{fontSize:20,fontWeight:600,color:"#1d1d1f",marginBottom:48,letterSpacing:"-0.02em"}}>
        {pct>=85?"מצוין — מוכן לבחינה":pct>=70?"טוב מאוד":"חזור על החומר"}
      </div>
      <button onClick={reset} style={{background:"#1d1d1f",color:"#fff",border:"none",borderRadius:980,padding:"14px 36px",fontSize:15,fontWeight:500,cursor:"pointer"}}>נסה שוב</button>
    </div>
  );

  return(
    <div style={{maxWidth:620,margin:"0 auto"}} className="fu">
      <div style={{height:2,background:"#e5e5e7",borderRadius:1,marginBottom:40}}>
        <div style={{height:2,background:"#1d1d1f",borderRadius:1,width:`${cur/qs.length*100}%`,transition:"width .5s cubic-bezier(.2,.8,.2,1)"}}/>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:13,color:"#6e6e73",marginBottom:32}}>
        <span>{cur+1} / {qs.length}</span><span>{score} נכון</span>
      </div>
      <div style={{fontSize:22,fontWeight:600,color:"#1d1d1f",lineHeight:1.4,letterSpacing:"-0.02em",marginBottom:32}}>{q.q}</div>
      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:24}}>
        {q.o.map((opt,i)=>{
          let bg="#f5f5f7",col="#1d1d1f",fw=400;
          if(!locked&&sel===i){bg="#e8e8ed";fw=500;}
          if(locked&&i===q.a){bg="#1d1d1f";col="#fff";fw=600;}
          if(locked&&sel===i&&i!==q.a){bg="#fff0f0";col="#c53030";}
          return(
            <button key={i} onClick={()=>!locked&&setSel(i)}
              style={{background:bg,border:"none",color:col,padding:"16px 20px",textAlign:"right",
                cursor:locked?"default":"pointer",fontSize:15,fontWeight:fw,borderRadius:12,
                transition:"all .15s",display:"flex",alignItems:"center",gap:12}}>
              <span style={{width:28,height:28,borderRadius:"50%",background:"rgba(0,0,0,.06)",
                display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,
                flexShrink:0,color:col,
                ...(locked&&i===q.a?{background:"rgba(255,255,255,.2)"}:{}),
                ...(locked&&sel===i&&i!==q.a?{background:"rgba(197,48,48,.15)"}:{})}}>
                {locked&&i===q.a?"✓":locked&&sel===i&&i!==q.a?"✗":String.fromCharCode(65+i)}
              </span>
              {opt}
            </button>
          );
        })}
      </div>
      {locked&&(
        <div className="fi" style={{background:"#f5f5f7",borderRadius:12,padding:"16px 20px",marginBottom:24,fontSize:14,color:"#3d3d3f",lineHeight:1.7}}>
          {q.x}
        </div>
      )}
      <div style={{display:"flex",justifyContent:"flex-end"}}>
        {!locked
          ?<button onClick={confirm} disabled={sel===null} style={{background:sel===null?"#e5e5e7":"#1d1d1f",color:sel===null?"#999":"#fff",border:"none",borderRadius:980,padding:"14px 36px",fontSize:15,fontWeight:500,cursor:sel===null?"default":"pointer",transition:"all .2s"}}>אשר</button>
          :<button onClick={next} style={{background:"#1d1d1f",color:"#fff",border:"none",borderRadius:980,padding:"14px 36px",fontSize:15,fontWeight:500,cursor:"pointer"}}>{cur+1>=qs.length?"לתוצאות":"הבא"}</button>
        }
      </div>
    </div>
  );
}

/* ─── AI CHAT — FIXED ──────────────────────────────────────── */
function AiChat() {
  const [msgs,setMsgs]=useState([{r:"a",t:"שלום, אני מומחה שמאות רכב.\nשאל אותי כל שאלה על החומר.\n\nכדי שה-AI יעבוד, יש להזין API Key של Anthropic בשדה למטה."}]);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const [apiKey,setApiKey]=useState(localStorage.getItem("shamaut_apikey")||"");
  function saveKey(k){setApiKey(k);localStorage.setItem("shamaut_apikey",k);}
  const endRef=useRef(null);
  useEffect(()=>endRef.current?.scrollIntoView({behavior:"smooth"}),[msgs]);

  async function send(){
    if(!input.trim()||loading)return;
    const text=input.trim();
    setInput("");
    setMsgs(p=>[...p,{r:"u",t:text}]);
    setLoading(true);
    try{
      const history=msgs.map(m=>({
        role: m.r==="a" ? "assistant" : "user",
        content: m.t
      }));

      const SYSTEM=`אתה מומחה שמאות רכב בישראל. ענה בעברית בלבד, בצורה ברורה ומדויקת.
מומחה ב: שווי רכב (מחירון לוי יצחק), נזק גולמי, ירידת ערך (טבלאות האיגוד 2025), צו שמאי רכב תש"מ-1980, תקנות 266/309, מנגנון שמאי מכריע, חוזר 23 (נזק בטיחותי מהותי), כללי אתיקה.
שומות אמיתיות: אודי Q3 E-TRON 2024 → נזק 24.6% בר-תיקון. סקודה 2015 → 80.26% אובדן גמור.`;

      const allMessages = [...history, { role:"user", content: text }];

      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "anthropic-version": "2023-06-01",
          "x-api-key": apiKey,
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: SYSTEM,
          messages: allMessages
        })
      });

      const data = await response.json();

      if (data.type === "error") {
        throw new Error(data.error?.message || "שגיאת API");
      }

      const reply = data.content
        ?.filter(c => c.type === "text")
        .map(c => c.text)
        .join("") || "לא התקבלה תשובה.";

      setMsgs(p=>[...p,{r:"a",t:reply}]);
    }catch(e){
      console.error("AI Error:", e);
      setMsgs(p=>[...p,{r:"a",t:"שגיאה בחיבור. ודא שהאפליקציה רצה ב-Claude.ai."}]);
    }
    setLoading(false);
  }

  const quick=["מה ההבדל בין נזק גולמי לירידת ערך?","כיצד מחשבים ירידת ערך?","מה תפקיד השמאי המכריע?","הסבר חוזר 23 ונזק בטיחותי"];

  return(
    <div style={{maxWidth:660,margin:"0 auto",display:"flex",flexDirection:"column",height:520}}>
      <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:12,paddingBottom:8}}>
        {msgs.map((m,i)=>(
          <div key={i} style={{display:"flex",justifyContent:m.r==="u"?"flex-start":"flex-end"}}>
            <div style={{background:m.r==="u"?"#f5f5f7":"#1d1d1f",color:m.r==="u"?"#1d1d1f":"#f5f5f7",
              padding:"14px 18px",maxWidth:"80%",fontSize:15,lineHeight:1.7,whiteSpace:"pre-wrap",
              borderRadius:18}}>
              {m.t}
            </div>
          </div>
        ))}
        {loading&&(
          <div style={{display:"flex",justifyContent:"flex-end"}}>
            <div style={{background:"#1d1d1f",color:"#f5f5f7",padding:"14px 18px",borderRadius:18,fontSize:15,letterSpacing:2}}>
              ···
            </div>
          </div>
        )}
        <div ref={endRef}/>
      </div>
      {msgs.length<3&&(
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
          {quick.map((s,i)=>(
            <button key={i} onClick={()=>setInput(s)}
              style={{background:"#f5f5f7",color:"#3d3d3f",border:"none",borderRadius:980,
                padding:"8px 16px",cursor:"pointer",fontSize:13}}>
              {s}
            </button>
          ))}
        </div>
      )}
      <div style={{display:"flex",gap:8,background:"#f5f5f7",borderRadius:16,padding:6}}>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&send()}
          placeholder="שאל שאלה..."
          style={{flex:1,background:"transparent",border:"none",padding:"8px 12px",fontSize:15,color:"#1d1d1f"}}/>
        <button onClick={send} disabled={loading||!input.trim()}
          style={{background:loading||!input.trim()?"transparent":"#1d1d1f",
            color:loading||!input.trim()?"#6e6e73":"#fff",border:"none",borderRadius:12,
            padding:"10px 20px",cursor:loading||!input.trim()?"default":"pointer",
            fontSize:14,fontWeight:500,transition:"all .2s"}}>
          שלח
        </button>
      </div>
    </div>
  );
}

        WebkitBackdropFilter:"blur(20px) saturate(180%)",
        borderBottom:"1px solid rgba(0,0,0,.06)"}}>
        <div style={{maxWidth:1100,margin:"0 auto",padding:"0 28px",display:"flex",alignItems:"center",height:52}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginLeft:"auto"}}>
            <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
              <circle cx="11" cy="11" r="10" stroke="#1d1d1f" strokeWidth="1.2"/>
              <path d="M5 14h12M6.5 14l1.5-4h2.5l1-2h3l1 2H18l1.5 4" stroke="#1d1d1f" strokeWidth="1" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
            <span style={{fontSize:15,fontWeight:600,color:"#1d1d1f",letterSpacing:"-0.02em"}}>שמאות רכב</span>
          </div>
          <div style={{display:"flex",gap:0,marginRight:"auto"}}>
            {TABS.map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)}
                style={{background:"none",border:"none",cursor:"pointer",padding:"0 18px",height:52,
                  fontSize:14,fontWeight:500,color:tab===t.id?"#1d1d1f":"#6e6e73",
                  borderBottom:`2px solid ${tab===t.id?"#1d1d1f":"transparent"}`,
                  transition:"all .2s"}}>
                {t.label}
              </button>
            ))}
          </div>
        </div>
      </nav>

      {tab==="topics"&&(
        <div style={{background:"#000",padding:"80px 28px 72px",textAlign:"center"}}>
          <p style={{fontSize:14,fontWeight:500,color:"rgba(255,255,255,.5)",letterSpacing:3,textTransform:"uppercase",marginBottom:16}}>קורס מקצועי</p>
          <h1 style={{fontSize:"clamp(40px,8vw,80px)",fontWeight:700,color:"#fff",letterSpacing:"-0.04em",lineHeight:1,marginBottom:20}}>שמאות רכב</h1>
          <p style={{fontSize:19,color:"rgba(255,255,255,.5)",maxWidth:480,margin:"0 auto 40px"}}>כל החומר לעבוד כשמאי רכב מקצועי בישראל</p>
          <div style={{display:"flex",gap:32,justifyContent:"center"}}>
            {[{n:TOPICS.length,l:"נושאים"},{n:ALL_MC.length+VISUAL_MC.length,l:'שאלות'},{n:WRITTEN.length,l:"שאלות כתב"},{n:SHOMA_CASES.length,l:"תרגילי שומה"}].map(s=>(
              <div key={s.l}>
                <div style={{fontSize:32,fontWeight:700,color:"#fff",letterSpacing:"-0.04em"}}>{s.n}</div>
                <div style={{fontSize:12,color:"rgba(255,255,255,.4)",letterSpacing:1,textTransform:"uppercase",marginTop:2}}>{s.l}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      <main style={{maxWidth:1100,margin:"0 auto",padding:"56px 28px 100px"}}>
        {tab==="topics"&&<Topics/>}
        {tab==="mc"&&(
          <div>
            <div style={{marginBottom:48}}>
              <h1 style={{fontSize:40,fontWeight:700,letterSpacing:"-0.04em",marginBottom:8}}>מבחן אמריקאי</h1>
              <p style={{fontSize:17,color:"#6e6e73"}}>15 שאלות אקראיות מתוך {ALL_MC.length}</p>
            </div>
            <MCExam key={tab+Math.random()}/>
          </div>
        )}
        {tab==="visual"&&(
          <div>
            <div style={{marginBottom:48}}>
              <h1 style={{fontSize:40,fontWeight:700,letterSpacing:"-0.04em",marginBottom:8}}>שאלות עם איורים</h1>
              <p style={{fontSize:17,color:"#6e6e73"}}>{VISUAL_MC.length} שאלות — זיהוי נזק לפי תמונה וחישוב ירידת ערך</p>
            </div>
            <VisualExam key={tab}/>
          </div>
        )}
        {tab==="written"&&(
          <div>
            <div style={{marginBottom:48}}>
              <h1 style={{fontSize:40,fontWeight:700,letterSpacing:"-0.04em",marginBottom:8}}>שאלות כתב</h1>
              <p style={{fontSize:17,color:"#6e6e73"}}>{WRITTEN.length} שאלות פתוחות — כתב תשובה ואז השווה לתשובת המודל</p>
            </div>
            <WrittenExam/>
          </div>
        )}
        {tab==="shoma"&&(
          <div>
            <div style={{marginBottom:48}}>
              <h1 style={{fontSize:40,fontWeight:700,letterSpacing:"-0.04em",marginBottom:8}}>בניית שומה</h1>
              <p style={{fontSize:17,color:"#6e6e73"}}>תרגיל מעשי — בנה שומה אמיתית שלב אחר שלב</p>
            </div>
            <ShomaBuilder/>
          </div>
        )}
        {tab==="ai"&&(
          <div>
            <div style={{marginBottom:48}}>
              <h1 style={{fontSize:40,fontWeight:700,letterSpacing:"-0.04em",marginBottom:8}}>שאל AI</h1>
              <p style={{fontSize:17,color:"#6e6e73"}}>מומחה שמאות זמין לכל שאלה</p>
            </div>
            <AiChat/>
          </div>
        )}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
