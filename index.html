<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>שמאות רכב — קורס מקצועי</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{background:#fff;font-family:'Inter',-apple-system,sans-serif;direction:rtl;color:#1d1d1f;font-size:16px}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#d0d0d0;border-radius:2px}
button,input,textarea{font-family:inherit}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fi{from{opacity:0}to{opacity:1}}
.fu{animation:fu .35s cubic-bezier(.2,.8,.2,1) both}
.fi{animation:fi .25s ease both}
nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.92);backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,0,0,.07)}
.nav-inner{max-width:1100px;margin:0 auto;padding:0 16px;display:flex;align-items:center;height:52px}
.logo{display:flex;align-items:center;gap:9px;margin-left:auto;text-decoration:none}
.logo span{font-size:15px;font-weight:600;color:#1d1d1f}
.tabs{display:flex;margin-right:auto;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab-btn{background:none;border:none;border-bottom:2px solid transparent;padding:0 13px;height:52px;font-size:13px;font-weight:500;color:#6e6e73;cursor:pointer;transition:all .2s;white-space:nowrap}
.tab-btn.active{color:#1d1d1f;border-bottom-color:#1d1d1f}
.hero{background:#000;padding:56px 20px 48px;text-align:center}
.hero-lbl{font-size:11px;font-weight:600;color:rgba(255,255,255,.4);letter-spacing:3px;text-transform:uppercase;margin-bottom:12px}
.hero h1{font-size:clamp(32px,7vw,68px);font-weight:700;color:#fff;letter-spacing:-.04em;line-height:1;margin-bottom:14px}
.hero-sub{font-size:15px;color:rgba(255,255,255,.4);max-width:400px;margin:0 auto 28px}
.hero-stats{display:flex;gap:20px;justify-content:center;flex-wrap:wrap}
.stn{font-size:24px;font-weight:700;color:#fff;letter-spacing:-.03em}
.stl{font-size:10px;color:rgba(255,255,255,.3);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px}
/* PROGRESS BAR */
.progress-banner{background:#f5f5f7;border-bottom:1px solid #e5e5e7;padding:10px 20px;display:none}
.progress-banner.show{display:block}
.pb-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:14px}
.pb-label{font-size:12px;color:#6e6e73;font-weight:500;white-space:nowrap}
.pb-bar{flex:1;height:4px;background:#e5e5e7;border-radius:2px}
.pb-fill{height:4px;background:#1d1d1f;border-radius:2px;transition:width .5s}
.pb-pct{font-size:12px;font-weight:600;color:#1d1d1f;white-space:nowrap}
main{max-width:1100px;margin:0 auto;padding:36px 16px 80px}
.pg-title{font-size:28px;font-weight:700;letter-spacing:-.04em;margin-bottom:6px}
.pg-sub{font-size:15px;color:#6e6e73;margin-bottom:30px}
/* TOPICS */
.topic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:2px}
.tc{background:#f5f5f7;padding:22px 18px;cursor:pointer;transition:background .2s;position:relative}
.tc:hover{background:#ebebed}
.tc-num{font-size:10px;font-weight:600;letter-spacing:3px;color:#6e6e73;text-transform:uppercase;margin-bottom:8px}
.tc-name{font-size:17px;font-weight:600;color:#1d1d1f;letter-spacing:-.02em;margin-bottom:5px;line-height:1.2}
.tc-sub{font-size:12px;color:#6e6e73;line-height:1.5;margin-bottom:14px}
.tc-arr{font-size:13px;font-weight:500;color:#1d1d1f}
.tc-done{position:absolute;top:14px;left:14px;width:20px;height:20px;background:#1d1d1f;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff}
.back-btn{background:none;border:none;color:#6e6e73;font-size:13px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:6px;margin-bottom:28px;padding:0}
.acc{border-top:1px solid #e5e5e7}
.acc-item{border-bottom:1px solid #e5e5e7}
.acc-btn{width:100%;background:none;border:none;padding:16px 0;display:flex;justify-content:space-between;align-items:center;cursor:pointer;gap:16px}
.acc-label{font-size:15px;font-weight:500;color:#1d1d1f;text-align:right;line-height:1.3}
.acc-icon{color:#6e6e73;font-size:20px;transition:transform .25s;flex-shrink:0;font-weight:300;width:24px;text-align:center}
.acc-icon.open{transform:rotate(45deg)}
.acc-body{display:none;padding-bottom:20px}
.acc-body.open{display:block}
.acc-body pre{font-family:inherit;font-size:14px;color:#3d3d3f;line-height:2;white-space:pre-wrap;font-weight:400}
/* EXAM */
.prog{height:2px;background:#e5e5e7;border-radius:1px;margin-bottom:28px}
.prog-fill{height:2px;background:#1d1d1f;border-radius:1px;transition:width .5s}
.exam-meta{display:flex;justify-content:space-between;font-size:13px;color:#6e6e73;margin-bottom:20px}
.q-text{font-size:18px;font-weight:600;color:#1d1d1f;line-height:1.45;letter-spacing:-.02em;margin-bottom:20px}
.opts{display:flex;flex-direction:column;gap:7px;margin-bottom:12px}
.opt{background:#f5f5f7;border:none;color:#1d1d1f;padding:12px 15px;text-align:right;cursor:pointer;font-size:14px;border-radius:10px;transition:all .15s;display:flex;align-items:center;gap:11px;width:100%}
.opt:hover:not(:disabled){background:#ebebed}
.opt.sel{background:#e8e8ed;font-weight:500}
.opt.ok{background:#1d1d1f;color:#fff;font-weight:600}
.opt.bad{background:#fff0f0;color:#c53030}
.opt-lt{width:24px;height:24px;border-radius:50%;background:rgba(0,0,0,.06);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;color:inherit}
.opt.ok .opt-lt{background:rgba(255,255,255,.2)}
.opt.bad .opt-lt{background:rgba(197,48,48,.12)}
.expl{background:#f5f5f7;border-radius:10px;padding:12px 15px;font-size:14px;color:#3d3d3f;line-height:1.7;margin-bottom:12px}
.act{display:flex;justify-content:flex-end;gap:10px}
.btn-p{background:#1d1d1f;color:#fff;border:none;border-radius:980px;padding:12px 28px;font-size:14px;font-weight:500;cursor:pointer;transition:opacity .2s}
.btn-p:hover{opacity:.85}
.btn-p:disabled{background:#e5e5e7;color:#999;cursor:default;opacity:1}
.btn-o{background:transparent;color:#1d1d1f;border:1.5px solid #1d1d1f;border-radius:980px;padding:10px 22px;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s}
.btn-o:hover{background:#1d1d1f;color:#fff}
.btn-o:disabled{opacity:.3;cursor:default}
/* SCORE SCREEN */
.score-scr{max-width:400px;margin:48px auto;text-align:center}
.score-n{font-size:80px;font-weight:700;letter-spacing:-.05em;line-height:1}
.score-grade{font-size:22px;font-weight:600;margin:6px 0}
.score-div{width:40px;height:2px;background:#1d1d1f;margin:14px auto}
.score-d{font-size:14px;color:#6e6e73;margin-bottom:5px}
.score-m{font-size:17px;font-weight:600;color:#1d1d1f;margin-bottom:36px;letter-spacing:-.02em}
.grade-A{color:#1a7a3a}.grade-B{color:#2a5c8a}.grade-C{color:#e07800}.grade-F{color:#c53030}
/* WRITTEN */
.wtabs{display:flex;gap:2px;background:#f5f5f7;border-radius:10px;padding:3px;margin-bottom:28px;flex-wrap:wrap}
.wtab{background:transparent;border:none;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:13px;color:#6e6e73;transition:all .2s}
.wtab.active{background:#fff;color:#1d1d1f;font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.wcard{background:#f5f5f7;border-radius:16px;padding:22px 18px;margin-bottom:10px}
.wlbl{font-size:10px;font-weight:600;letter-spacing:2px;color:#6e6e73;text-transform:uppercase;margin-bottom:12px}
.wq{font-size:15px;font-weight:500;color:#1d1d1f;line-height:1.9;white-space:pre-line;margin-bottom:16px}
.wdiv{height:1px;background:#e5e5e7;margin-bottom:12px}
textarea{width:100%;min-height:130px;background:transparent;border:none;resize:vertical;font-size:14px;color:#1d1d1f;line-height:1.8;outline:none}
.mbox{background:#f5f5f7;border-radius:16px;padding:20px 18px;margin-top:4px}
.mlbl{font-size:10px;font-weight:600;letter-spacing:2px;color:#6e6e73;text-transform:uppercase;margin-bottom:10px}
.mtext{font-size:14px;color:#3d3d3f;line-height:1.9;white-space:pre-line}
/* VISUAL */
.vc{background:#f5f5f7;border-radius:16px;overflow:hidden;margin-bottom:10px}
.darea{background:#e8e8ed;padding:16px;display:flex;flex-direction:column;align-items:center;gap:8px}
.dtags{display:flex;gap:5px;flex-wrap:wrap;justify-content:center}
.dtag{background:#c82828;color:#fff;font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px}
.vq-inner{padding:16px 18px}
.vqlbl{font-size:10px;font-weight:600;letter-spacing:2px;color:#6e6e73;text-transform:uppercase;margin-bottom:7px}
.vqtext{font-size:15px;font-weight:600;color:#1d1d1f;line-height:1.55}
/* SHOMA */
.ctabs{display:flex;gap:2px;background:#f5f5f7;border-radius:10px;padding:3px;margin-bottom:22px;flex-wrap:wrap}
.ctab{background:transparent;border:none;border-radius:8px;padding:6px 13px;cursor:pointer;font-size:13px;color:#6e6e73;transition:all .2s;white-space:nowrap}
.ctab.active{background:#fff;color:#1d1d1f;font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.ch{background:#f5f5f7;border-radius:16px;padding:16px 18px;margin-bottom:18px;display:flex;gap:18px;align-items:center;flex-wrap:wrap}
.stepbar{display:flex;gap:5px;margin-bottom:18px}
.ss{flex:1;height:3px;border-radius:2px;background:#e5e5e7;transition:background .3s}
.ss.done{background:#1d1d1f}.ss.cur{background:#888}
.scard{background:#f5f5f7;border-radius:16px;padding:18px;margin-bottom:12px}
.slbl{font-size:10px;font-weight:600;letter-spacing:2px;color:#6e6e73;text-transform:uppercase;margin-bottom:6px}
.sinst{font-size:14px;font-weight:500;color:#1d1d1f;margin-bottom:12px}
.ci{display:flex;align-items:center;gap:11px;background:#fff;border-radius:10px;padding:11px 13px;margin-bottom:6px;cursor:pointer;border:1.5px solid #e5e5e7;transition:border-color .15s}
.ci.on{border-color:#1d1d1f}
.ci input{width:16px;height:16px;accent-color:#1d1d1f;cursor:pointer;flex-shrink:0}
.ci-l{flex:1;font-size:14px;font-weight:500}
.ci-s{font-size:11px;color:#6e6e73}
.ci-p{font-size:13px;font-weight:600}
.cr{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;background:#fff;border-radius:9px;margin-bottom:5px}
.cr.hi{background:#1d1d1f}
.crk{font-size:13px;color:#3d3d3f}.crv{font-size:14px;font-weight:700;color:#1d1d1f}
.cr.hi .crk{color:rgba(255,255,255,.6)}.cr.hi .crv{color:#fff}
.yi{background:#fff;border-radius:10px;padding:11px 13px;margin-bottom:7px}
.yil{font-size:13px;font-weight:500;margin-bottom:7px}
.yrow{display:flex;align-items:center;gap:11px}
.yrow input[type=range]{flex:1;accent-color:#1d1d1f;height:4px}
.ypct{font-size:14px;font-weight:700;min-width:34px;text-align:left}
.ymax{font-size:11px;color:#6e6e73;margin-top:2px}
.ytot{background:#1d1d1f;color:#fff;border-radius:10px;padding:11px 13px;display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.ytot span:first-child{font-size:13px}.ytot span:last-child{font-size:14px;font-weight:700}
.rbox{background:#1d1d1f;border-radius:16px;padding:18px;margin-bottom:12px;color:#fff}
.rlbl{font-size:10px;letter-spacing:2px;color:rgba(255,255,255,.4);text-transform:uppercase;margin-bottom:10px}
.rgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.ri{background:rgba(255,255,255,.08);border-radius:9px;padding:11px 12px}
.rik{font-size:11px;color:rgba(255,255,255,.4);margin-bottom:2px}.riv{font-size:15px;font-weight:700}
.hbtn{background:none;border:1px solid #e5e5e7;border-radius:980px;padding:5px 13px;cursor:pointer;font-size:12px;color:#6e6e73;margin-top:9px}
.hbox{background:#fffbea;border-radius:9px;padding:9px 12px;font-size:13px;color:#5a4500;line-height:1.6;margin-top:7px}
.navb{display:flex;justify-content:space-between;align-items:center;margin-top:4px}
/* AI */
.chat-w{max-width:600px;margin:0 auto;display:flex;flex-direction:column;height:480px}
.msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:9px;padding-bottom:8px}
.msg{display:flex}
.msg.u{justify-content:flex-start}.msg.a{justify-content:flex-end}
.bub{padding:11px 14px;max-width:82%;font-size:14px;line-height:1.75;white-space:pre-wrap;border-radius:16px}
.bub.u{background:#f5f5f7;color:#1d1d1f}.bub.a{background:#1d1d1f;color:#f5f5f7}
.qbtns{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.qbtn{background:#f5f5f7;color:#3d3d3f;border:none;border-radius:980px;padding:6px 12px;cursor:pointer;font-size:12px}
.api-row{display:flex;gap:7px;margin-bottom:6px}
.api-inp{flex:1;background:#f5f5f7;border:1px solid #e5e5e7;border-radius:9px;padding:8px 11px;font-size:13px;color:#1d1d1f;outline:none}
.api-warn{background:#fff8e7;border:1px solid #f0d060;border-radius:9px;padding:7px 11px;font-size:12px;color:#7a5c00;margin-bottom:6px}
.cinrow{display:flex;gap:7px;background:#f5f5f7;border-radius:13px;padding:4px}
.cinp{flex:1;background:transparent;border:none;outline:none;padding:7px 10px;font-size:14px;color:#1d1d1f}
.csend{background:#1d1d1f;color:#fff;border:none;border-radius:10px;padding:8px 16px;cursor:pointer;font-size:13px;font-weight:500}
.csend:disabled{background:transparent;color:#6e6e73;cursor:default}
</style>
</head>
<body>
<nav><div class="nav-inner">
  <a class="logo" href="#">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
      <circle cx="11" cy="11" r="10" stroke="#1d1d1f" stroke-width="1.2"/>
      <path d="M5 14h12M6.5 14l1.5-4h2.5l1-2h3l1 2H18l1.5 4" stroke="#1d1d1f" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span>שמאות רכב</span>
  </a>
  <div class="tabs" id="tabs">
    <button class="tab-btn active" data-tab="topics">לימוד</button>
    <button class="tab-btn" data-tab="mc">אמריקאי</button>
    <button class="tab-btn" data-tab="visual">איורים</button>
    <button class="tab-btn" data-tab="written">כתב</button>
    <button class="tab-btn" data-tab="shoma">בניית שומה</button>
    <button class="tab-btn" data-tab="ai">AI</button>
  </div>
</div></nav>

<div class="progress-banner" id="pb">
  <div class="pb-inner">
    <span class="pb-label">התקדמות בקורס</span>
    <div class="pb-bar"><div class="pb-fill" id="pbFill" style="width:0%"></div></div>
    <span class="pb-pct" id="pbPct">0%</span>
  </div>
</div>

<div class="hero" id="hero">
  <div class="hero-lbl">קורס מקצועי</div>
  <h1>שמאות רכב</h1>
  <p class="hero-sub">כל החומר לעבוד כשמאי רכב מקצועי בישראל</p>
  <div class="hero-stats">
    <div><div class="stn">16</div><div class="stl">נושאים</div></div>
    <div><div class="stn">40</div><div class="stl">שאלות</div></div>
    <div><div class="stn">16</div><div class="stl">שאלות איורים</div></div>

<main id="main"></main>

<script>
// ═══════════════════════════════════════════════
// PROGRESS TRACKING
// ═══════════════════════════════════════════════
const PROG = JSON.parse(localStorage.getItem('shamaut_prog')||'{}');
// prog keys: topics_read (set), mc_best, visual_best, written_viewed (set)

function saveProg(){localStorage.setItem('shamaut_prog',JSON.stringify(PROG));}

function calcProgress(){
  // chapters_read is a flat set of "topicId:chapterIndex" strings
  const chapRead   = (PROG.chapters_read||[]).length;
  const TOTAL_CHAP = 59; // total chapters across all topics
  const chapPts    = Math.min(chapRead/TOTAL_CHAP*35, 35);
  const mcPts      = Math.min((PROG.mc_best||0)/100*25, 25);
  const vqPts      = Math.min((PROG.vq_best||0)/100*20, 20);
  const writPts    = Math.min(((PROG.written_viewed||[]).length)/10*20, 20);
  return Math.round(chapPts + mcPts + vqPts + writPts);
}

function updateProgressBar(){
  const pct = calcProgress();
  document.getElementById('pbFill').style.width = pct+'%';
  document.getElementById('pbPct').textContent = pct+'%';
  document.getElementById('pb').className = 'progress-banner show';
}

// ═══════════════════════════════════════════════
// REALISTIC CAR SVG
// ═══════════════════════════════════════════════
function carSVG(damages, scale=1){
  const hit = new Set(damages);
  const w = 220, h = 320;

  // Zone paths
  const ZONES = {
    front:  "M 65 25 Q 110 8 155 25 L 162 55 L 58 55 Z",
    frontL: "M 58 55 L 35 50 L 30 85 L 58 85 Z",
    frontR: "M 162 55 L 185 50 L 190 85 L 162 85 Z",
    sideL:  "M 58 85 L 30 85 L 26 195 L 58 195 Z",
    sideR:  "M 162 85 L 190 85 L 194 195 L 162 195 Z",
    rearL:  "M 58 195 L 30 195 L 35 228 L 58 228 Z",
    rearR:  "M 162 195 L 190 195 L 185 228 L 162 228 Z",
    rear:   "M 58 228 L 65 250 Q 110 262 155 250 L 162 228 Z",
    roof:   "M 62 72 L 158 72 L 158 208 L 62 208 Z",
  };

  const CENTERS = {
    front:[110,36], frontL:[42,68], frontR:[178,68],
    sideL:[38,138], sideR:[182,138],
    rearL:[42,212], rearR:[178,212], rear:[110,242], roof:[110,140]
  };

  let zonePaths='', markers='';

  // Render base zones
  for(const [id, path] of Object.entries(ZONES)){
    const isHit = hit.has(id);
    zonePaths += `<path d="${path}" fill="${isHit?'rgba(200,40,40,0.25)':'rgba(255,255,255,0.04)'}" stroke="${isHit?'#c82828':'rgba(255,255,255,0.15)'}" stroke-width="${isHit?2:1}"/>`;
  }

  // Damage markers
  damages.forEach(id => {
    const c = CENTERS[id]; if(!c) return;
    markers += `<circle cx="${c[0]}" cy="${c[1]}" r="10" fill="#c82828" opacity="0.92"/>`;
    markers += `<text x="${c[0]}" y="${c[1]+4}" text-anchor="middle" font-size="12" fill="white" font-weight="700" font-family="Arial">✕</text>`;
  });

  const svgW = Math.round(w*scale), svgH = Math.round(h*scale);

  return `<svg viewBox="0 0 ${w} ${h}" width="${svgW}" height="${svgH}" style="display:block">
  <defs>
    <linearGradient id="bodyG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a4a5a"/>
      <stop offset="100%" stop-color="#2a2a36"/>
    </linearGradient>
    <linearGradient id="glassG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a8d8ea" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#7ab8d4" stop-opacity="0.65"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Car shadow -->
  <ellipse cx="110" cy="290" rx="80" ry="8" fill="rgba(0,0,0,0.25)"/>

  <!-- Main body -->
  <path d="M 45 60 Q 110 20 175 60 L 185 80 L 195 200 L 185 235 Q 110 268 35 235 L 25 200 L 35 80 Z"
    fill="url(#bodyG)" filter="url(#shadow)" rx="8"/>

  <!-- Body highlight -->
  <path d="M 68 50 Q 110 32 152 50 L 158 70 L 62 70 Z"
    fill="rgba(255,255,255,0.1)"/>

  <!-- Door lines -->
  <line x1="110" y1="80" x2="110" y2="210" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <line x1="30" y1="130" x2="190" y2="130" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  { id:"shamait", idx:"13", title:"תוכנת שמאית (Dcwin)", sub:"מה זה · שעתוני יצרן · חלפים · חוקי הפיקוח",
    chapters:[
      { t:"מה זה תוכנת שמאית ולמה היא קריטית?", b:`תוכנת "שמאית" — הכינוי המקצועי בשוק לתוכנת Dcwin של חברת "דטה קאר" — היא מערכת ניהול משרד השמאי הנפוצה ביותר בישראל.

Dcwin פותחה על ידי חברת דטה קאר בבעלות מגדל חברה לביטוח, ומשמשת אלפי שמאי רכב בכל הארץ.

למה היא חשובה?
כי בלי תוכנת שמאות מקצועית — השמאי לא יכול:
• לדעת את מחירי החלפים המקוריים והתחליפיים
• לחשב שעות עבודה לפי שעתון יצרן
• להפיק דוח שמאות מסודר לחברת הביטוח
• לשדר את השומה אלקטרונית לחברת הביטוח

חוזר הביטוח 2007 מחייב:
על המבטח לאפשר שימוש בלפחות שתי תוכנות שמאות מקובלות בשוק, ולא לאפשר שימוש בתוכנה שאינה מאפשרת לשמאי בחירה בין חלפים ממספר סוגים.` },

      { t:"מה כוללת התוכנה — פירוט תכונות", b:`מרכיבי התוכנה העיקריים:

א. ניהול תיק השמאות:
קבלת נתוני התביעה מחברת הביטוח, פתיחת תיק, זיהוי הרכב לפי VIN, מעקב סטטוס.

ב. קטלוג חלפים מלא:
מחירי חלפים מקוריים (OE) ותחליפיים לפי מקט היצרן.
גרפיקה של מבנה הרכב — ניתן לראות ויזואלית את מיקום כל חלק.
עדכון מחירים אוטומטי ממאגר הנתונים.

ג. שעתון יצרן (חידוש ייחודי):
Dcwin היא היחידה בארץ הנותנת מידע וזמני עבודה לפירוקים והחלפות של מכלולים ברכב — ישירות מנתוני היצרן.
השמאי רואה כמה שעות דרושות לכל פעולת תיקון ספציפית.

ד. שידור לחברות ביטוח:
כל שומה נשלחת אלקטרונית. הפלט מותאם לכל חברת ביטוח בנפרד.

ה. בינה מלאכותית לזיהוי נזקים (תוספת חדשה):
קבלת תמונות, זיהוי נזקים, חישוב אוטומטי של עלות תיקון.` },

      { t:"שעתון יצרן — המושג החשוב", b:`שעתון יצרן = טבלת זמני העבודה הרשמית של יצרן הרכב לכל פעולת תיקון.

  { id:"vaadot", idx:"14", title:"ועדות ופסיקות מנחות", sub:"ועדת ששון · בג\"ץ 7721 · ועדת זליכה · פסיקות חשובות",
    chapters:[
      { t:"ועדת ששון — מהפכת ירידת הערך", b:`מתי: מונתה בהמלצת המפקח על הביטוח, שנות ה-90.

מטרה: לקבוע קריטריונים אחידים לחישוב ירידת ערך — במקום שכל שמאי יחשב כרצונו.

מה יצאה: חוברת מנחה בנושא חישוב ירידת ערך, שהפכה לסטנדרט מחייב של שמאי חברות הביטוח שנים רבות.

הבעיה שהתגלתה:
ירידת הערך שנקבעה בחוברת ששון הייתה נמוכה משמעותית מהירידה המסחרית האמיתית בשוק.
בעלי רכב שניסו למכור — נאלצו להפחית הרבה מעבר למה שקיבלו כפיצוי.

תגובת בית המשפט:
שופטים קבעו שחברות ביטוח המסתתרות מאחורי חוברת ששון אינן פועלות נכון, כי "מה שקובע זו התייחסות השוק לערכו של רכב לאחר תאונה — לא חוברת."

המסקנה:
איגוד השמאים החל ב-2008 לפעול לשינוי, מה שהוביל לטבלאות ירידת הערך המעודכנות של האיגוד שבשימוש היום (2025).` },

      { t:"בג\"ץ 7721/96 — מהפכת שמאי החוץ", b:`שם: בג"ץ 7721/96
פסיקה: בית המשפט העליון

מה היה:
לפני 1996, חברות הביטוח העסיקו "שמאי בית" שכירים שקבעו את שומות הנזק — ובכך שימשו למעשה גם כנתבע וגם כשופט.

מה קבע בית המשפט:
מצב זה יוצר ניגוד עניינים מהותי שאינו קביל. יש להעביר את עשיית השומות לשמאי חוץ עצמאיים.

השפעה מיידית:
המפקח על הביטוח הוציא חוזר מקיף (2002) שקבע:
• שמאי חוץ הוא הקובע הבלעדי של השומה
• המבטח חייב להרכיב רשימות שמאי חוץ לפי מחוזות
• שמאי בית לא יוכל להיכלל ברשימה
• נוצר מנגנון שמאי מכריע למחלוקות

חשיבות היסטורית:
זהו הבסיס המשפטי לכל מערכת שמאות הרכב הנוכחית בישראל.` },

      { t:"ועדת זליכה — הגברת התחרות", b:`שם: ועדת זליכה להגברת התחרות בענף הרכב

מה בדקה: כשלי שוק בענף הביטוח והשמאות, בעיקר חוסר תחרות בשמאות.

המלצות עיקריות שרלוונטיות לשמאות:

המלצה 42:
לבטל את רשימות השמאים של חברות הביטוח ולהקים מנגנון אובייקטיבי — בחירה אקראית מתוך מאגר כלל השמאים המורשים.
"להקים מנגנון של שמאי אובייקטיבי לענף הרכב, קביעת השמאי האובייקטיבי תהיה על סמך בחירה אקראית מתוך מאגר השמאים המורשים."

מה קרה בפועל:
ועדת הכלכלה של הכנסת אישרה (פברואר 2026) תקנות חדשות לשמאות רכב:
• איסור על ניגודי עניינים
• הסדרת אגרות
• הגבלה על רשימות חברות הביטוח` },

      { t:"פסיקות מנחות חשובות", b:`פסיקה 1 — מחירון לוי יצחק הוא המחייב:
בית משפט שלום נצרת (ת"א 1295/95):
"מקובל וידוע כבר מזה שנים ששוויו של רכב מסוג מסוים נלקח מהמחירון של יצחק לוי. מי שגובה פרמיה לפי לוי יצחק — חייב לשלם פיצוי לפי לוי יצחק."

פסיקה 2 — חברת ביטוח לא יכולה לחייב תיקון:
"מבטחת לא יכולה לחייב את המבוטח לתקן את רכבו" (פסיקה עדכנית — המבוטח רשאי לבחור פיצוי כסף במקום תיקון).

פסיקה 3 — פיצוי לפני תיקון:
הכרעת הפיקוח מיום 20/6/1999:
צד שלישי זכאי לקבל פיצוי גם לפני תיקון הרכב. ההפחתה היחידה המותרת — בגובה המע"מ בלבד.

פסיקה 4 — ירידת ערך לפי שוק, לא לפי חוברת:
שופט בדימוס ערן פינשטיין:
"לא יתכן ששמאים יקבעו ירידת ערך חד-ספרתית לרכב עם פגיעת שאסי, כשברור שבמכירה ירידת הערך היא דו-ספרתית."` },
    ]

  { id:"zchuyot", idx:"15", title:"זכויות בעל הרכב", sub:"בחירת מוסך ושמאי · ירידת ערך · 10 כללי זהב",
    chapters:[
      { t:"זכויות בסיסיות — בחירת מוסך ושמאי", b:`זכות 1 — בחירת מוסך:
בעל הרכב זכאי להכניס את רכבו לכל מוסך שבחר. חברת הביטוח, סוכן הביטוח, שמאי הרכב ויבואן הרכב אינם רשאים להפנות רכב למוסך מסוים ובוודאי לא לכפות זאת.
שים לב: בחלק מהתוכניות ניתן לקבל הנחה בהשתתפות העצמית אם מפנים למוסך מוסכם — זו הטבה, לא חובה.

זכות 2 — בחירת שמאי:
לפי חוזר השמאים, בעל הרכב בוחר שמאי חוץ מתוך רשימת חברת הביטוח. השומה שיגיש תהיה הקובעת. אפשר לבחור שמאי פרטי שאינו ברשימה — אך שומתו לא תהיה הקובעת.

זכות 3 — אסורה השפעה על השמאי:
מבטח, סוכן ביטוח, מבוטח, מוסך — אסור להם להשפיע על שיקול דעתו המקצועי של השמאי.
אסורה טובת הנאה — עמלה, הנחה בהשתתפות עצמית, רכב חלוף — כל אלה אסורים בהליך בחירת השמאי.

זכות 4 — קבלת כל הצעות התיקון:
על המבטח למסור לבעל הרכב, לפני תיקון, את כל הצעות התיקון שהגיעו לידיו.` },

      { t:"זכויות לגבי חלפים וירידת ערך", b:`זכות 5 — ירידת ערך:
בעל הרכב זכאי לפיצוי כספי בגין ירידת ערך הרכב על פי חוות דעת שמאי מוסמך.

זכות 6 — חלפים חדשים לרכב עד שנתיים:
בעת עריכת חוות דעת נזק לרכב שגילו עד שנתיים — חייב שמאי הרכב לאשר חלפים חדשים בלבד. אין חובה לחלפים מקוריים (אלא אם הותנה בפוליסה במפורש).

let S={
  tab:'topics', topic:null, topicCh:null,
  mcQs:[], mcCur:0, mcSel:null, mcLocked:false, mcScore:0, mcDone:false,
  vqQs:[], vqCur:0, vqSel:null, vqLocked:false, vqScore:0, vqDone:false,
  wqCur:0, wqAns:'', wqShow:false,
  shCase:0, shStep:0, shParts:{}, shWorks:{}, shYrida:{}, shHint:false, shResult:false,
  aiMsgs:[{r:'a',t:'שלום, אני מומחה שמאות רכב.\nשאל אותי כל שאלה על החומר.'}],
  aiInput:'', aiLoading:false, apiKey:localStorage.getItem('sk')||''
};

function shuffle(a){return[...a].sort(()=>Math.random()-.5)}
S.mcQs=shuffle(MC_Q).slice(0,15);
S.vqQs=shuffle(VISUAL_Q);

// ═══════════════════════════════════════════════
// GRADE HELPER
// ═══════════════════════════════════════════════
function grade(pct){
  if(pct>=90)return{g:'100-90',cls:'grade-A',msg:'מצוין — שמאי לעתיד!'};
  if(pct>=80)return{g:'89-80',cls:'grade-A',msg:'מצוין — מוכן לבחינה'};
  if(pct>=70)return{g:'79-70',cls:'grade-B',msg:'טוב מאוד'};
  if(pct>=60)return{g:'69-60',cls:'grade-C',msg:'עובר — יש על מה לשפר'};
  return{g:'מתחת ל-60',cls:'grade-F',msg:'חזור על החומר ונסה שוב'};
}

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════
function R(){
  const m=document.getElementById('main');
  document.getElementById('hero').style.display=S.tab==='topics'?'':'none';
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===S.tab));
  updateProgressBar();
  let h='';
  if(S.tab==='topics')h=rTopics();
  else if(S.tab==='mc')h=rMC();
  else if(S.tab==='visual')h=rVisual();
  else if(S.tab==='written')h=rWritten();
  else if(S.tab==='shoma')h=rShoma();
  else if(S.tab==='ai')h=rAI();
  m.innerHTML=h; m.className='fu';
  bind();
}

// ─── TOPICS ──────────────────────────────────
function rTopics(){
  if(S.topic){
    const t=S.topic;
    const chapRead = new Set(PROG.chapters_read||[]);
    const readCount = t.chapters.filter((_,ci)=>chapRead.has(t.id+':'+ci)).length;
    const acc=t.chapters.map((ch,i)=>{
      const isRead = chapRead.has(t.id+':'+i);
      return `<div class="acc-item">
        <button class="acc-btn" data-acc="${i}">
          <span class="acc-label">${isRead?'<span style="color:#1a7a3a;margin-left:6px">✓</span>':''}${ch.t}</span>
          <span class="acc-icon ${S.topicCh===i?'open':''}">+</span>
        </button>
        <div class="acc-body ${S.topicCh===i?'open':''}"><pre>${ch.b}</pre>
          ${!isRead&&S.topicCh===i?`<div style="margin-top:16px"><button class="btn-p" style="font-size:13px;padding:9px 22px" data-markread="${i}">✓ סמן כנקרא</button></div>`:''}
        </div>
      </div>`;
    }).join('');
    const progPct2 = Math.round(readCount/t.chapters.length*100);
    return `<div style="max-width:720px;margin:0 auto">
      <button class="back-btn" id="bk">← חזרה לנושאים</button>
      <div style="font-size:10px;font-weight:600;letter-spacing:3px;color:#6e6e73;text-transform:uppercase;margin-bottom:8px">${t.idx}</div>
      <h1 style="font-size:28px;font-weight:700;letter-spacing:-.04em;margin-bottom:6px">${t.title}</h1>
      <p style="font-size:15px;color:#6e6e73;margin-bottom:12px">${t.sub}</p>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:28px">
        <div style="flex:1;height:3px;background:#e5e5e7;border-radius:2px">
          <div style="height:3px;background:#1d1d1f;border-radius:2px;width:${progPct2}%;transition:width .4s"></div>
        </div>
        <span style="font-size:12px;color:#6e6e73;white-space:nowrap">${readCount}/${t.chapters.length} פרקים נקראו</span>
      </div>
      <div class="acc">${acc}</div>
    </div>`;
  }
  return `<h1 class="pg-title">חומר לימוד</h1>
    <p class="pg-sub">בחר נושא</p>
    <div class="topic-grid">
      ${TOPICS.map((t,i)=>`<div class="tc fu" data-topic="${i}" style="animation-delay:${i*.04}s">
        ${((PROG.chapters_read||[]).some(k=>k.startsWith(t.id+':')))?'<div class="tc-done">✓</div>':''}
        <div class="tc-num">${t.idx}</div>
        <div class="tc-name">${t.title}</div>
        <div class="tc-sub">${t.sub}</div>
        <div class="tc-arr">${t.chapters.length} פרקים →</div>
      </div>`).join('')}
    </div>`;
}

// ─── MC ──────────────────────────────────────
function rMC(){
  if(S.mcDone){
    const pct=Math.round(S.mcScore/S.mcQs.length*100);
    const gr=grade(pct);
    // Update best score
    if(pct>(PROG.mc_best||0)){PROG.mc_best=pct;saveProg();}
    return `<div class="score-scr fu">
      <div class="score-n ${gr.cls}">${pct}<span style="font-size:48px">%</span></div>
      <div class="score-grade ${gr.cls}">ציון: ${gr.g}</div>
      <div class="score-div"></div>
      <div class="score-d">${S.mcScore} נכון מתוך ${S.mcQs.length}</div>
      <div class="score-m">${gr.msg}</div>
      ${PROG.mc_best>pct?`<div style="font-size:13px;color:#6e6e73;margin-bottom:20px">שיא אישי: ${PROG.mc_best}%</div>`:'<div style="font-size:13px;color:#1a7a3a;margin-bottom:20px">🏆 שיא אישי חדש!</div>'}
      <button class="btn-p" id="mcR">נסה שוב</button>
    </div>`;
  }
  const q=S.mcQs[S.mcCur]; const pb=(S.mcCur/S.mcQs.length*100).toFixed(1);
  const expl=S.mcLocked?`<div class="expl fi">${q.x}</div>`:'';
  const btn=!S.mcLocked
    ?`<button class="btn-p" id="mcC" ${S.mcSel===null?'disabled':''}>אשר</button>`
    :`<button class="btn-p" id="mcN">${S.mcCur+1>=S.mcQs.length?'לתוצאות':'הבא'}</button>`;
  return `<h1 class="pg-title">מבחן אמריקאי</h1>
    <p class="pg-sub">שאלה ${S.mcCur+1} מתוך ${S.mcQs.length}${PROG.mc_best?` · שיא: ${PROG.mc_best}%`:''}</p>
    <div style="max-width:580px;margin:0 auto">
      <div class="prog"><div class="prog-fill" style="width:${pb}%"></div></div>
      <div class="exam-meta"><span>${S.mcCur+1}/${S.mcQs.length}</span><span>${S.mcScore} נכון</span></div>
      <div class="q-text">${q.q}</div>
      <div class="opts">${q.o.map((o,i)=>{
        let cls='opt';
        if(!S.mcLocked&&S.mcSel===i)cls+=' sel';
        if(S.mcLocked&&i===q.a)cls+=' ok';
        if(S.mcLocked&&S.mcSel===i&&i!==q.a)cls+=' bad';
        const lt=S.mcLocked&&i===q.a?'✓':S.mcLocked&&S.mcSel===i&&i!==q.a?'✗':String.fromCharCode(65+i);
        return `<button class="${cls}" data-mco="${i}" ${S.mcLocked?'disabled':''}><span class="opt-lt">${lt}</span>${o}</button>`;
      }).join('')}</div>
      ${expl}<div class="act">${btn}</div>
    </div>`;
}

        if(!S.vqLocked&&S.vqSel===i)cls+=' sel';
        if(S.vqLocked&&i===q.a)cls+=' ok';
        if(S.vqLocked&&S.vqSel===i&&i!==q.a)cls+=' bad';
        const lt=S.vqLocked&&i===q.a?'✓':S.vqLocked&&S.vqSel===i&&i!==q.a?'✗':String.fromCharCode(65+i);
        return `<button class="${cls}" data-vqo="${i}" ${S.vqLocked?'disabled':''}><span class="opt-lt">${lt}</span>${o}</button>`;
      }).join('')}</div>
      ${expl}<div class="act">${btn}</div>
    </div>`;
}

// ─── WRITTEN ─────────────────────────────────
function rWritten(){
  const tabs=WRITTEN_Q.map((w,i)=>`<button class="wtab ${S.wqCur===i?'active':''}" data-wt="${i}">${i+1}</button>`).join('');
  const q=WRITTEN_Q[S.wqCur];
  const model=S.wqShow?`<div class="mbox fi"><div class="mlbl">תשובת מודל</div><div class="mtext">${q.m}</div></div>`:'';
  return `<h1 class="pg-title">שאלות כתב</h1>
    <p class="pg-sub">${WRITTEN_Q.length} שאלות פתוחות</p>
    <div style="max-width:640px;margin:0 auto">
      <div class="wtabs">${tabs}</div>
      <div class="wcard">
        <div class="wlbl">שאלה פתוחה ${S.wqCur+1}/${WRITTEN_Q.length}</div>
        <div class="wq">${q.q}</div>
        <div class="wdiv"></div>
        <textarea id="wqA" placeholder="כתב את תשובתך כאן...">${S.wqAns}</textarea>
      </div>
      <div style="display:flex;justify-content:flex-end;margin-bottom:10px">
        <button class="${S.wqShow?'btn-p':'btn-o'}" id="wqT">${S.wqShow?'הסתר תשובה':'הצג תשובת מודל'}</button>
      </div>
      ${model}
    </div>`;
}

// ─── SHOMA ───────────────────────────────────
function rShoma(){
  const sc=SHOMA_CASES[S.shCase];
  const SNAMES=['שלב 1 — חלקים','שלב 2 — עבודות','שלב 3 — חישוב','שלב 4 — ירידת ערך'];
  const SINST=['סמן את החלקים שנפגעו:','בחר עבודות התיקון:','חישוב אוטומטי:','קבע ירידת ערך:'];
  const pT=sc.parts.filter(p=>S.shParts[p.id]).reduce((a,p)=>a+p.p,0);
  const wT=sc.works.filter(w=>S.shWorks[w.id]).reduce((a,w)=>a+w.h*w.r,0);
  const bef=pT+wT; const vat=Math.round(bef*1.18); const base=sc.car.base;
  const npct=base>0?(bef/base*100):0; const ns=npct.toFixed(1)+'%';
  const stat=npct>=60?'אובדן גמור 🔴':npct>=50?'אובדן להלכה 🟡':'בר-תיקון ✅';
  const yT=sc.yz.reduce((a,z,i)=>a+(S.shYrida[i]||0),0);
  const yN=Math.round(base*yT/100);
  const ctabs=SHOMA_CASES.map((c,i)=>`<button class="ctab ${S.shCase===i?'active':''}" data-sc="${i}">${i+1}</button>`).join('');
  const sbar=[0,1,2,3].map(i=>`<div class="ss ${i<S.shStep?'done':i===S.shStep?'cur':''}"></div>`).join('');

  let sc_html='';
  if(S.shStep===0){
    sc_html=sc.parts.map(p=>`<label class="ci ${S.shParts[p.id]?'on':''}" data-lp="${p.id}">
      <input type="checkbox" ${S.shParts[p.id]?'checked':''} data-cp="${p.id}">
      <span class="ci-l">${p.l} <span class="ci-s">— ${p.a}</span></span>
      <span class="ci-p">₪${p.p.toLocaleString()}</span>
    </label>`).join('');
    sc_html+=`<button class="hbtn" id="shH">${S.shHint?'הסתר':'💡 רמז'}</button>`;
    if(S.shHint)sc_html+=`<div class="hbox">${sc.ph}</div>`;
  } else if(S.shStep===1){
    sc_html=sc.works.map(w=>`<label class="ci ${S.shWorks[w.id]?'on':''}" data-lw="${w.id}">
      <input type="checkbox" ${S.shWorks[w.id]?'checked':''} data-cw="${w.id}">
      <span class="ci-l">${w.l} <span class="ci-s">— ${w.h} שע' × ₪${w.r}</span></span>
      <span class="ci-p">₪${(w.h*w.r).toLocaleString()}</span>
    </label>`).join('');
    sc_html+=`<button class="hbtn" id="shH">${S.shHint?'הסתר':'💡 רמז'}</button>`;
    if(S.shHint)sc_html+=`<div class="hbox">${sc.wh}</div>`;
  } else if(S.shStep===2){
    sc_html=[
      ['חלקים (לפני מע"מ)','₪'+pT.toLocaleString(),false],
      ['עבודות (לפני מע"מ)','₪'+wT.toLocaleString(),false],
      ['סה"כ לפני מע"מ','₪'+bef.toLocaleString(),false],
      ['מע"מ 18%','₪'+Math.round(bef*.18).toLocaleString(),false],
      ['סה"כ כולל מע"מ','₪'+vat.toLocaleString(),false],
      ['ערך בסיס מחירון','₪'+base.toLocaleString(),false],
      ['אחוז נזק גולמי',ns,true],
      ['מצב הרכב',stat,true]
    ].map(([k,v,h])=>`<div class="cr ${h?'hi':''}"><span class="crk">${k}</span><span class="crv">${v}</span></div>`).join('');
  } else {
    sc_html=sc.yz.map((z,i)=>`<div class="yi">
      <div class="yil">${z.l}</div>
      <div class="yrow">
        <input type="range" min="0" max="${z.max}" step="0.5" value="${S.shYrida[i]||0}" data-yr="${i}">
        <span class="ypct">${S.shYrida[i]||0}%</span>
      </div>
      <div class="ymax">מקסימום: ${z.max}%</div>
    </div>`).join('');
    sc_html+=`<div class="ytot"><span>סה"כ ירידת ערך</span><span>${yT.toFixed(1)}% = ₪${yN.toLocaleString()}</span></div>`;
  }

  const res=S.shResult?`<div class="rbox fi">
    <div class="rlbl">סיכום השומה</div>
    <div class="rgrid">
      <div class="ri"><div class="rik">עלות תיקון</div><div class="riv">₪${vat.toLocaleString()}</div></div>
      <div class="ri"><div class="rik">ירידת ערך</div><div class="riv">₪${yN.toLocaleString()}</div></div>
      <div class="ri"><div class="rik">פיצוי כולל</div><div class="riv">₪${(vat+yN).toLocaleString()}</div></div>
      <div class="ri"><div class="rik">מצב הרכב</div><div class="riv">${stat}</div></div>
    </div>
  </div>`:'';

  return `<h1 class="pg-title">בניית שומה</h1>
    <p class="pg-sub">תרגיל מעשי — ${SHOMA_CASES.length} מקרים לפתרון</p>
    <div style="max-width:660px;margin:0 auto">
      <div class="ctabs">${ctabs}</div>
      <div class="ch">
        ${carSVG(sc.d,0.65)}
        <div style="flex:1;min-width:170px">
          <div style="font-size:10px;font-weight:600;letter-spacing:2px;color:#6e6e73;text-transform:uppercase;margin-bottom:6px">תרגיל שומה</div>
          <div style="font-size:17px;font-weight:700;margin-bottom:5px;letter-spacing:-.02em">${sc.title}</div>
          <div style="font-size:13px;color:#3d3d3f;line-height:1.6;margin-bottom:7px">${sc.desc}</div>
          <div style="font-size:12px;color:#6e6e73">📅 ${sc.car.year} &nbsp;🛣 ${sc.car.km.toLocaleString()} ק"מ &nbsp;💰 ₪${sc.car.base.toLocaleString()}</div>
        </div>
      </div>
      <div class="stepbar">${sbar}</div>
      <div class="scard">
        <div class="slbl">${SNAMES[S.shStep]}</div>
        <div class="sinst">${SINST[S.shStep]}</div>
        ${sc_html}
      </div>
      ${res}
      <div class="navb">
        <button class="btn-o" id="shP" ${S.shStep===0?'disabled':''}>← חזרה</button>
        ${S.shResult
          ?`<button class="btn-p" id="shRS">התחל מחדש</button>`
          :`<button class="btn-p" id="shN">${S.shStep===3?'סיים שומה':'הבא →'}</button>`
        }
      </div>
    </div>`;
}

// ─── AI ──────────────────────────────────────
function rAI(){
  const bubs=S.aiMsgs.map(m=>`<div class="msg ${m.r==='u'?'u':'a'}"><div class="bub ${m.r==='u'?'u':'a'}">${m.t.replace(/</g,'&lt;')}</div></div>`).join('');
  const load=S.aiLoading?`<div class="msg a"><div class="bub a">···</div></div>`:'';
  const warn=!S.apiKey?`<div class="api-warn">⚠️ הכנס API Key של Anthropic כדי שה-AI יעבוד</div>`:'';
  const quick=S.aiMsgs.length<3?`<div class="qbtns">
    <button class="qbtn" data-q="מה ההבדל בין נזק גולמי לירידת ערך?">נזק גולמי vs ירידת ערך</button>
    <button class="qbtn" data-q="כיצד מחשבים ירידת ערך?">חישוב ירידת ערך</button>
    <button class="qbtn" data-q="מה תפקיד השמאי המכריע?">שמאי מכריע</button>
    <button class="qbtn" data-q="הסבר חוזר 23">חוזר 23</button>
  </div>`:'';
  return `<h1 class="pg-title">שאל AI</h1>
    <p class="pg-sub">מומחה שמאות רכב זמין לכל שאלה</p>
    <div class="chat-w">
      <div class="msgs" id="CM">${bubs}${load}</div>
      ${quick}${warn}
      <div class="api-row"><input class="api-inp" id="akin" type="password" placeholder="API Key של Anthropic (sk-ant-...)" value="${S.apiKey}"></div>
      <div class="cinrow">
        <input class="cinp" id="cin" placeholder="שאל שאלה..." value="${S.aiInput}">
        <button class="csend" id="csend" ${S.aiLoading||!S.aiInput?'disabled':''}>שלח</button>
      </div>
    </div>`;
}

// ═══════════════════════════════════════════════
// BIND EVENTS
// ═══════════════════════════════════════════════
function bind(){
  document.querySelectorAll('.tab-btn').forEach(b=>b.onclick=()=>{S.tab=b.dataset.tab;R();window.scrollTo(0,0)});
  document.querySelectorAll('.tc').forEach(c=>c.onclick=()=>{
    const t=TOPICS[+c.dataset.topic];
    S.topic=t; S.topicCh=null;

    R();
  });
  const bk=document.getElementById('bk');if(bk)bk.onclick=()=>{S.topic=null;R()};
  document.querySelectorAll('.acc-btn').forEach(b=>b.onclick=()=>{
    const i=+b.dataset.acc;
    S.topicCh=S.topicCh===i?null:i;
    // Auto-mark as read when opened
    if(S.topicCh===i && S.topic){
      const key = S.topic.id+':'+i;
      if(!PROG.chapters_read)PROG.chapters_read=[];
      if(!PROG.chapters_read.includes(key)){PROG.chapters_read.push(key);saveProg();}
    }
    R();
  });
  document.querySelectorAll('[data-markread]').forEach(b=>b.onclick=()=>{
    const i=+b.dataset.markread;
    if(S.topic){
      const key=S.topic.id+':'+i;
      if(!PROG.chapters_read)PROG.chapters_read=[];
      if(!PROG.chapters_read.includes(key)){PROG.chapters_read.push(key);saveProg();}
    }
    R();
  });
  // MC
  document.querySelectorAll('[data-mco]').forEach(b=>b.onclick=()=>{if(!S.mcLocked){S.mcSel=+b.dataset.mco;R()}});
  const mcC=document.getElementById('mcC');if(mcC)mcC.onclick=()=>{if(S.mcSel===null||S.mcLocked)return;S.mcLocked=true;if(S.mcSel===S.mcQs[S.mcCur].a)S.mcScore++;R()};
  const mcN=document.getElementById('mcN');if(mcN)mcN.onclick=()=>{if(S.mcCur+1>=S.mcQs.length)S.mcDone=true;else{S.mcCur++;S.mcSel=null;S.mcLocked=false;}R()};
  const mcR=document.getElementById('mcR');if(mcR)mcR.onclick=()=>{S.mcQs=shuffle(MC_Q).slice(0,15);S.mcCur=0;S.mcSel=null;S.mcLocked=false;S.mcScore=0;S.mcDone=false;R()};
  // Visual
  document.querySelectorAll('[data-vqo]').forEach(b=>b.onclick=()=>{if(!S.vqLocked){S.vqSel=+b.dataset.vqo;R()}});
  const vqC=document.getElementById('vqC');if(vqC)vqC.onclick=()=>{if(S.vqSel===null||S.vqLocked)return;S.vqLocked=true;if(S.vqSel===S.vqQs[S.vqCur].a)S.vqScore++;R()};
  const vqN=document.getElementById('vqN');if(vqN)vqN.onclick=()=>{if(S.vqCur+1>=S.vqQs.length)S.vqDone=true;else{S.vqCur++;S.vqSel=null;S.vqLocked=false;}R()};
  const vqR=document.getElementById('vqR');if(vqR)vqR.onclick=()=>{S.vqQs=shuffle(VISUAL_Q);S.vqCur=0;S.vqSel=null;S.vqLocked=false;S.vqScore=0;S.vqDone=false;R()};
  // Written
  document.querySelectorAll('[data-wt]').forEach(b=>b.onclick=()=>{
    S.wqCur=+b.dataset.wt;S.wqAns='';S.wqShow=false;
    if(!PROG.written_viewed)PROG.written_viewed=[];
    if(!PROG.written_viewed.includes(S.wqCur)){PROG.written_viewed.push(S.wqCur);saveProg();}
    R();
  });
  const wqT=document.getElementById('wqT');if(wqT)wqT.onclick=()=>{S.wqShow=!S.wqShow;R()};
  const wqA=document.getElementById('wqA');if(wqA)wqA.oninput=e=>S.wqAns=e.target.value;
  // Shoma
  document.querySelectorAll('[data-sc]').forEach(b=>b.onclick=()=>{S.shCase=+b.dataset.sc;S.shStep=0;S.shParts={};S.shWorks={};S.shYrida={};S.shHint=false;S.shResult=false;R()});
  document.querySelectorAll('[data-cp]').forEach(i=>i.onchange=e=>{S.shParts[e.target.dataset.cp]=e.target.checked;R()});
  document.querySelectorAll('[data-cw]').forEach(i=>i.onchange=e=>{S.shWorks[e.target.dataset.cw]=e.target.checked;R()});
  document.querySelectorAll('[data-yr]').forEach(i=>i.oninput=e=>{S.shYrida[+e.target.dataset.yr]=parseFloat(e.target.value);R()});
  const shH=document.getElementById('shH');if(shH)shH.onclick=()=>{S.shHint=!S.shHint;R()};
  const shP=document.getElementById('shP');if(shP)shP.onclick=()=>{if(S.shStep>0){S.shStep--;S.shHint=false;R()}};
  const shN=document.getElementById('shN');if(shN)shN.onclick=()=>{if(S.shStep===3){S.shResult=true;R();}else{S.shStep++;S.shHint=false;R()}};
  const shRS=document.getElementById('shRS');if(shRS)shRS.onclick=()=>{S.shStep=0;S.shParts={};S.shWorks={};S.shYrida={};S.shHint=false;S.shResult=false;R()};
  // AI
  const akin=document.getElementById('akin');if(akin)akin.oninput=e=>{S.apiKey=e.target.value;localStorage.setItem('sk',S.apiKey)};
  const cin=document.getElementById('cin');
  if(cin){
    cin.oninput=e=>{S.aiInput=e.target.value;const b=document.getElementById('csend');if(b)b.disabled=!S.aiInput||S.aiLoading};
    cin.onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey)sendAI()};
  }
  const csend=document.getElementById('csend');if(csend)csend.onclick=sendAI;
  document.querySelectorAll('[data-q]').forEach(b=>b.onclick=()=>{S.aiInput=b.dataset.q;sendAI()});
  const cm=document.getElementById('CM');if(cm)cm.scrollTop=cm.scrollHeight;
}

// ═══════════════════════════════════════════════
// AI
// ═══════════════════════════════════════════════
async function sendAI(){
  const t=S.aiInput.trim();if(!t||S.aiLoading)return;
  S.aiInput='';S.aiMsgs.push({r:'u',t});S.aiLoading=true;R();
  const hist=S.aiMsgs.slice(0,-1).map(m=>({role:m.r==='a'?'assistant':'user',content:m.t}));
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','x-api-key':S.apiKey,'anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,
        system:'אתה מומחה שמאות רכב בישראל. ענה בעברית בלבד, בצורה ברורה ומדויקת. מתמחה: שווי רכב, נזק גולמי, ירידת ערך (טבלאות 2025), תקנות 266/309, שמאי מכריע, חוזר 23.',
        messages:[...hist,{role:'user',content:t}]})
    });
    const d=await res.json();
    if(d.error)throw new Error(d.error.message);
    const reply=d.content?.filter(c=>c.type==='text').map(c=>c.text).join('')||'לא התקבלה תשובה.';
    S.aiMsgs.push({r:'a',t:reply});
  }catch(e){S.aiMsgs.push({r:'a',t:'שגיאה: '+(e.message||'נסה שוב')});}
  S.aiLoading=false;R();
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
R();
</script>
