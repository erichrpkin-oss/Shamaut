<title>Vehicle Appraisal</title>
<style>

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,Arial,sans-serif;background:#f5f5f7;color:#1d1d1f;direction:rtl;-webkit-font-smoothing:antialiased}
.nav{background:#fff;border-bottom:1px solid #e0e0e0;padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.nav-brand{font-size:17px;font-weight:700}

.hero{padding:44px 28px 28px}
.hero h2{font-size:40px;font-weight:700;letter-spacing:-.02em;margin-bottom:10px}
.hero p{font-size:15px;color:#6e6e73;font-weight:300}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:0 28px 28px}
.card{background:#fff;border-radius:14px;padding:22px;box-shadow:0 2px 10px rgba(0,0,0,.07);cursor:pointer;border:2px solid transparent;transition:transform .2s,border-color .2s}

.card.active{border-color:#1d1d1f}
.card h3{font-size:16px;font-weight:700;margin-bottom:4px}
.card p{font-size:11px;color:#6e6e73}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:0 28px 24px}
.stat{background:#fff;border-radius:12px;padding:14px 18px;box-shadow:0 2px 10px rgba(0,0,0,.07)}
.stat-n{font-size:26px;font-weight:700}
.stat-l{font-size:10px;color:#6e6e73;margin-top:3px}
.rlist{padding:0 28px 36px}
.rlist-lbl{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#999;margin-bottom:10px}
.ri{background:#fff;border-radius:12px;padding:14px 18px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 10px rgba(0,0,0,.07);gap:8px;flex-wrap:wrap}
.ri-n{font-size:14px;font-weight:600}

.bg{background:rgba(29,122,74,.1);color:#1d7a4a}
.ba{background:rgba(138,90,0,.1);color:#8a5a00}
.br{background:rgba(192,57,43,.1);color:#c0392b}
.noprof{background:rgba(191,155,48,.1);border:1px solid rgba(191,155,48,.3);border-radius:10px;padding:12px 16px;font-size:13px;color:#7a5a00;margin:0 28px 28px}
.editor{display:grid;grid-template-columns:1fr 1fr;height:calc(100vh - 52px);overflow:hidden}
.eleft{overflow-y:auto;padding:20px 24px;border-left:1px solid #e0e0e0;background:#fff}
.eright{display:flex;flex-direction:column;background:#f5f5f7;overflow:hidden}
.sec{margin-bottom:22px}
.sec-t{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#6e6e73;margin-bottom:10px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px 18px}
.s2{grid-column:span 2}
.fld{display:flex;flex-direction:column;gap:5px}
.fld label{font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#999}
.fld input,.fld select,.fld textarea{background:rgba(0,0,0,.05);border:none;border-radius:8px;padding:10px 12px;font-size:14px;color:#1d1d1f;outline:none;width:100%;font-family:inherit;-webkit-appearance:none}

.lookup{background:rgba(0,113,227,.07);border:1px solid rgba(0,113,227,.2);border-radius:10px;padding:12px;margin-bottom:14px}

.ticker{display:grid;grid-template-columns:repeat(4,1fr);background:#e0e0e0;gap:1px;flex-shrink:0}
.tick{background:#fff;padding:10px 14px}
.tick-v{font-size:14px;font-weight:700}

.gauge{background:#fff;padding:11px 16px;flex-shrink:0;border-bottom:1px solid #e0e0e0}

.tabs{display:flex;background:#fff;border-bottom:1px solid #e0e0e0;flex-shrink:0}

.tab.on{color:#1d1d1f;border-bottom-color:#1d1d1f;font-weight:700}
.tab-panel{padding:16px;overflow-y:auto;flex:1}
.zpills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}

.pck{width:18px;height:18px;border-radius:50%;border:1.5px solid #ddd;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;transition:all .15s}

.pn{flex:1;font-size:13px;color:#6e6e73}
.prow.sel .pn{color:#1d1d1f;font-weight:500}

.sp{background:#fff;border-radius:10px;padding:12px;margin-bottom:8px;box-shadow:0 1px 6px rgba(0,0,0,.07)}

.mg{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
.mf{display:flex;flex-direction:column;gap:3px}
.mf label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#999}
.mf input,.mf select{background:rgba(0,0,0,.05);border:none;border-radius:6px;padding:6px 8px;font-size:12px;outline:none;font-family:inherit}
.price-inp{background:rgba(191,155,48,.12)!important;color:#8b6914!important;font-weight:700!important}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:flex;align-items:flex-end;justify-content:center;padding:0}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:26px 22px 36px;width:100%;max-width:520px;max-height:92vh;overflow-y:auto}


.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px}
.photo-item{position:relative;aspect-ratio:4/3;border-radius:8px;overflow:hidden;background:rgba(0,0,0,.05);cursor:pointer}
.photo-item img{width:100%;height:100%;object-fit:cover}

input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:#1d1d1f}
.dark-mode input[type=checkbox]{accent-color:#f5f5f7}
.backup-menu-item{padding:10px 16px;font-size:13px;cursor:pointer;color:#1d1d1f}
.backup-menu-item:hover{background:rgba(0,0,0,.05)}
.sig-canvas{border:1.5px solid #ccc;border-radius:8px;cursor:crosshair;touch-action:none;width:100%;max-width:400px;height:120px;background:#fff}
.dark-mode .photo-add{border-color:#3a3a3c;color:#6e6e73;background:rgba(255,255,255,.03)}
.tmpl-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.tmpl-card{padding:10px 12px;border-radius:10px;border:1.5px solid #e0e0e0;cursor:pointer;font-size:12px;font-weight:500;transition:all .15s}

  body.dark-mode,.dark-mode .card,.dark-mode .stat,.dark-mode .ri,.dark-mode .eleft,.dark-mode .sp,.dark-mode .prow,.dark-mode .tick,.dark-mode .gauge,.dark-mode .tabs,.dark-mode .modal,.dark-mode .lookup{background:#1c1c1e;color:#f5f5f7}

  .dark-mode .fld input,.dark-mode .fld select,.dark-mode .fld textarea,.dark-mode .mf input,.dark-mode .mf select{background:rgba(255,255,255,.08);color:#f5f5f7}
  .dark-mode .sec-t,.dark-mode .tick-l,.dark-mode .pn,.dark-mode .rlist-lbl{color:#aeaeb2}

  .dark-mode .pbox,.dark-mode .parts-box{box-shadow:0 2px 10px rgba(0,0,0,.5)}
  .dark-mode .fld label{color:#6e6e73}

  .dark-mode .zpill.on{background:#f5f5f7;color:#1d1d1f}
  .dark-mode .tab{color:#6e6e73}
  .dark-mode .tab.on{color:#f5f5f7}
}

.auth-ok{background:rgba(29,122,74,.1);border:1px solid rgba(29,122,74,.3);border-radius:8px;padding:10px 14px;font-size:13px;color:#1d7a4a;margin-bottom:14px;display:none}
.teacher-badge{background:rgba(191,155,48,.15);border:1px solid rgba(191,155,48,.4);border-radius:980px;padding:3px 10px;font-size:11px;font-weight:700;color:#8b6914}
.teacher-view{padding:0 28px 40px}
.teacher-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.teacher-stat{background:#fff;border-radius:12px;padding:14px 18px;box-shadow:0 2px 10px rgba(0,0,0,.07)}
.teacher-stat-n{font-size:26px;font-weight:700}

.student-row{background:#fff;border-radius:12px;padding:14px 18px;margin-bottom:8px;box-shadow:0 2px 10px rgba(0,0,0,.07)}
.student-name{font-size:14px;font-weight:600;margin-bottom:4px}
.student-reports{font-size:12px;color:#6e6e73}
@media(max-width:640px){
  .hero{padding:28px 16px 20px} .hero h2{font-size:30px}

<body>
<div id="app">Loading...</div>
<div id="err-overlay" style="display:none;position:fixed;inset:0;background:#fff;z-index:9999;padding:24px;font-family:monospace;direction:ltr;overflow:auto"></div>
<script>
window.onerror=function(m,s,l,c,e){
  var o=document.getElementById("err-overlay");
  if(o){o.style.display="block";o.innerHTML="<b>window.onerror:</b> "+m+" line:"+l;}
  return false;
};
try{
var SUPA_URL = 'https://agrblzypxgzxhsfangjz.supabase.co';
var SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFncmJsenlweGd6eGhzZmFuZ2p6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0MDQ3ODksImV4cCI6MjA5Nzk4MDc4OX0.uh95hsG_JXkN2-a0YzmU6XDsNXlWduJdMgMcJMrjguE';
var SUPA_USER = null; // current logged-in user
var SUPA_TOKEN = null; // current session token
var SUPA_ROLE = 'student'; // 'student' or 'teacher'

// ── SUPABASE HELPERS ──────────────────────────────────────────────────────
async function supaFetch(path, opts){
  var headers = {
    'apikey': SUPA_KEY,
    'Content-Type': 'application/json',
    'Prefer': 'return=representation'
  };
  if(SUPA_TOKEN) headers['Authorization'] = 'Bearer ' + SUPA_TOKEN;
  var res = await fetch(SUPA_URL + path, Object.assign({headers: headers}, opts||{}));
  return res;
}

async function supaSignUp(email, password, fullName){
  var res = await supaFetch('/auth/v1/signup', {
    method: 'POST',
    body: JSON.stringify({email: email, password: password, data: {full_name: fullName}})
  });
  return await res.json();
}

async function supaSignIn(email, password){
  var res = await supaFetch('/auth/v1/token?grant_type=password', {
    method: 'POST',
    body: JSON.stringify({email: email, password: password})
  });
  var data = await res.json();
  if(data.access_token){
    SUPA_TOKEN = data.access_token;
    SUPA_USER = data.user;
    try{localStorage.setItem('sh_token', data.access_token);
        localStorage.setItem('sh_user', JSON.stringify(data.user));
        localStorage.setItem('sh_refresh', data.refresh_token||'');}catch(e){}
    // Check if teacher
    await loadUserRole();
    return {ok: true};
  }
  return {ok: false, error: data.error_description || data.msg || '\u05e9\u05d2\u05d9\u05d0\u05d4 \u05d1\u05d4\u05ea\u05d7\u05d1\u05e8\u05d5\u05ea'};
}

async function supaSignOut(){
  try{
    if(SUPA_TOKEN){
      await supaFetch('/auth/v1/logout', {method:'POST'});
    }
  }catch(e){}
  SUPA_TOKEN = null; SUPA_USER = null; SUPA_ROLE = 'student';
  try{localStorage.removeItem('sh_token');localStorage.removeItem('sh_user');localStorage.removeItem('sh_refresh');}catch(e){}
  S.screen = 'login'; render();
}

async function supaRefreshToken(){
  var refresh = '';
  try{refresh = localStorage.getItem('sh_refresh')||'';}catch(e){}
  if(!refresh) return false;
  try{
    var res = await supaFetch('/auth/v1/token?grant_type=refresh_token', {
      method: 'POST',
      body: JSON.stringify({refresh_token: refresh})
    });
    var data = await res.json();
    if(data.access_token){
      SUPA_TOKEN = data.access_token;
      SUPA_USER = data.user;
      try{localStorage.setItem('sh_token', data.access_token);
          localStorage.setItem('sh_user', JSON.stringify(data.user));
          localStorage.setItem('sh_refresh', data.refresh_token||'');}catch(e){}
      await loadUserRole();
      return true;
    }
  }catch(e){}
  return false;
}

async function loadUserRole(){
  if(!SUPA_TOKEN||!SUPA_USER) return;
  try{
    var res = await supaFetch('/rest/v1/user_roles?user_id=eq.'+SUPA_USER.id+'&select=role');
    var data = await res.json();
    if(data&&data[0]) SUPA_ROLE = data[0].role;
    else SUPA_ROLE = 'student';
  }catch(e){SUPA_ROLE='student';}
}

// ── CLOUD REPORTS ─────────────────────────────────────────────────────────
async function cloudSaveReport(r){
  if(!SUPA_TOKEN) return saveReport(r); // fallback to local
  var payload = {
    id: r.id,
    user_id: SUPA_USER.id,
    case_number: r.caseNumber||'',
    owner_name: r.ownerName||'',
    car_make: r.carMake||'',
    car_model: r.carModel||'',
    car_year: r.carYear||'',
    license_num: r.licenseNum||'',
    report_type: r.reportType||'repair',
    total_amount: 0,
    data: r,
    updated_at: new Date().toISOString()
  };
  try{
    var check = await supaFetch('/rest/v1/reports?id=eq.'+r.id+'&select=id');
    var existing = await check.json();
    if(existing&&existing.length>0){
      await supaFetch('/rest/v1/reports?id=eq.'+r.id, {method:'PATCH', body:JSON.stringify(payload)});
    } else {
      payload.created_at = new Date().toISOString();
      await supaFetch('/rest/v1/reports', {method:'POST', body:JSON.stringify(payload)});
    }
  }catch(e){}
  saveReport(r); // also save locally as backup
}

async function cloudLoadReports(){
  if(!SUPA_TOKEN) return loadReports();
  try{
    var url = SUPA_ROLE==='teacher'
      ? '/rest/v1/reports?select=data,profiles:user_id(full_name,email)&order=created_at.desc'
      : '/rest/v1/reports?user_id=eq.'+SUPA_USER.id+'&select=data&order=created_at.desc';
    var res = await supaFetch(url);
    var rows = await res.json();
    if(!Array.isArray(rows)) return loadReports();
    return rows.map(function(row){
      var r = row.data;
      if(SUPA_ROLE==='teacher'&&row.profiles){
        r._studentName = (row.profiles.full_name||row.profiles.email||'');
      }
      return r;
    }).filter(Boolean);
  }catch(e){ return loadReports(); }
}

async function cloudDeleteReport(id){
  if(SUPA_TOKEN){
    try{ await supaFetch('/rest/v1/reports?id=eq.'+id, {method:'DELETE'}); }catch(e){}
  }
  deleteReport(id);
}

// ── INIT AUTH ─────────────────────────────────────────────────────────────
async function initAuth(){
  // Try restore session from localStorage
  var token='', user=null;
  try{
    token = localStorage.getItem('sh_token')||'';
    var uStr = localStorage.getItem('sh_user')||'';
    if(uStr) user = JSON.parse(uStr);
  }catch(e){}
  
  if(token && user){
    SUPA_TOKEN = token;
    SUPA_USER = user;
    // Try to refresh
    var ok = await supaRefreshToken();
    if(ok){
      S.screen = 'home';
    } else {
      SUPA_TOKEN = null; SUPA_USER = null;
      S.screen = 'login';
    }
  } else {
    S.screen = 'login';
  }
  await loadUserRole();
  render();
}

// Storage helpers
function sget(k){try{var v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}}
function sset(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function sdel(k){try{localStorage.removeItem(k);}catch(e){}}

function loadProfile(){return sget("sh_p");}
function saveProfile(p){sset("sh_p",p);}
function loadReports(){
  var ids=sget("sh_ids")||[];
  return ids.map(function(id){return sget("sh_r_"+id);}).filter(Boolean);
}
function saveReport(r){
  sset("sh_r_"+r.id,r);
  var ids=sget("sh_ids")||[];
  if(ids.indexOf(r.id)<0){ids.unshift(r.id);sset("sh_ids",ids);}
}
function deleteReport(id){
  sdel("sh_r_"+id);
  var ids=(sget("sh_ids")||[]).filter(function(x){return x!==id;});
  sset("sh_ids",ids);
}

function calcTotals(){return calc();}
function calc(){
  var f=S.form||{};
  var tp=S.parts.reduce(function(s,p){return s+(Number(p.price)||0);},0);
  var tl=S.labor.reduce(function(s,l){return s+(Number(l.hours)||0)*LR;},0);
  var paint=Number(f.paintCost||0),other=Number(f.otherCost||0);
  var sub=tp+tl+paint+other,vat=sub*VAT,total=sub+vat;
  var vv=Number(f.vehicleValue||0),pct=vv?(sub/vv*100):0;
  return {tp:tp,tl:tl,paint:paint,other:other,sub:sub,vat:vat,total:total,vv:vv,pct:pct};
}

function updateVV(){
  if(!S.form)return;
  var v=(Number(S.form.baseValue)||0)+(Number(S.form.kmAdj)||0)+(Number(S.form.ownersAdj)||0)+(Number(S.form.extras)||0);
  if(S.form.baseValue)S.form.vehicleValue=String(v);
}

function g(id){return document.getElementById(id);}
function ce(tag,opts){
  var el=document.createElement(tag);
  if(opts)Object.keys(opts).forEach(function(k){
    if(k==="style")el.style.cssText=opts[k];
    else if(k==="className")el.className=opts[k];
    else if(k==="textContent")el.textContent=opts[k];

  });
  return el;
}

function renderLogin(app){
  app.innerHTML='';
  var wrap=ce('div',{className:'auth-wrap'});
  var card=ce('div',{className:'auth-card'});

  // Logo
  var logo=ce('div',{className:'auth-logo'});
  logo.appendChild(ce('h1',{textContent:'\u05e9\u05de\u05d0\u05d5\u05ea \u05e8\u05db\u05d1'}));
  logo.appendChild(ce('p',{textContent:'\u05de\u05e2\u05e8\u05db\u05ea \u05e9\u05de\u05d0\u05d5\u05ea \u05de\u05e7\u05e6\u05d5\u05e2\u05d9\u05ea'}));
  card.appendChild(logo);

  // Tabs
  var tabs=ce('div',{className:'auth-tabs'});
  var tLogin=ce('button',{className:'auth-tab on',textContent:'\u05d4\u05ea\u05d7\u05d1\u05e8\u05d5\u05ea'});
  var tRegister=ce('button',{className:'auth-tab',textContent:'\u05d4\u05e8\u05e9\u05de\u05d4'});
  var isLogin=true;
  tabs.appendChild(tLogin); tabs.appendChild(tRegister);
  card.appendChild(tabs);

  // Error/success
  var errDiv=ce('div',{className:'auth-err',id:'auth-err'});
  var okDiv=ce('div',{className:'auth-ok',id:'auth-ok'});
  card.appendChild(errDiv); card.appendChild(okDiv);

  // Fields
  var nameField=ce('div',{className:'auth-field',id:'name-field',style:'display:none'});
  nameField.appendChild(ce('label',{textContent:'\u05e9\u05dd \u05de\u05dc\u05d0'}));
  var nameInp=ce('input'); nameInp.type='text'; nameInp.placeholder='\u05d9\u05e9\u05e8\u05d0\u05dc \u05d9\u05e9\u05e8\u05d0\u05dc\u05d9';
  nameField.appendChild(nameInp); card.appendChild(nameField);

  var emailField=ce('div',{className:'auth-field'});
  emailField.appendChild(ce('label',{textContent:'\u05d0\u05d9\u05de\u05d9\u05d9\u05dc'}));
  var emailInp=ce('input'); emailInp.type='email'; emailInp.placeholder='name@example.com';
  emailInp.style.direction='ltr';
  emailField.appendChild(emailInp); card.appendChild(emailField);

  var passField=ce('div',{className:'auth-field'});
  passField.appendChild(ce('label',{textContent:'\u05e1\u05d9\u05e1\u05de\u05d0'}));
  var passInp=ce('input'); passInp.type='password'; passInp.placeholder='\u05dc\u05e4\u05d7\u05d5\u05ea 6 \u05ea\u05d5\u05d5\u05d9\u05dd';
  passField.appendChild(passInp); card.appendChild(passField);

  // Submit button
  var submitBtn=ce('button',{className:'auth-btn',textContent:'\u05d4\u05ea\u05d7\u05d1\u05e8'});
  card.appendChild(submitBtn);

  // Tab switch
  function showLogin(){
    isLogin=true;
    tLogin.className='auth-tab on'; tRegister.className='auth-tab';
    nameField.style.display='none';
    submitBtn.textContent='\u05d4\u05ea\u05d7\u05d1\u05e8';
    errDiv.style.display='none'; okDiv.style.display='none';
  }
  function showRegister(){
    isLogin=false;
    tRegister.className='auth-tab on'; tLogin.className='auth-tab';
    nameField.style.display='block';
    submitBtn.textContent='\u05e6\u05d5\u05e8 \u05d7\u05e9\u05d1\u05d5\u05df';
    errDiv.style.display='none'; okDiv.style.display='none';
  }
  tLogin.onclick=showLogin;
  tRegister.onclick=showRegister;

  // Submit
  submitBtn.onclick=async function(){
    var email=emailInp.value.trim();
    var pass=passInp.value;
    var name=nameInp.value.trim();
    errDiv.style.display='none'; okDiv.style.display='none';
    if(!email||!pass){errDiv.textContent='\u05e0\u05d0 \u05de\u05dc\u05d0 \u05d0\u05d9\u05de\u05d9\u05d9\u05dc \u05d5\u05e1\u05d9\u05e1\u05de\u05d0';errDiv.style.display='block';return;}
    submitBtn.disabled=true;
    submitBtn.textContent='\u05de\u05ea\u05d7\u05d1\u05e8...';
    if(isLogin){
      var res=await supaSignIn(email,pass);
      if(res.ok){
        S.screen='home'; S.profile=loadProfile(); render();
      } else {
        errDiv.textContent=res.error||'\u05e9\u05d2\u05d9\u05d0\u05d4 \u05d1\u05d4\u05ea\u05d7\u05d1\u05e8\u05d5\u05ea';
        errDiv.style.display='block';
        submitBtn.disabled=false; submitBtn.textContent='\u05d4\u05ea\u05d7\u05d1\u05e8';
      }
    } else {
      if(!name){errDiv.textContent='\u05e0\u05d0 \u05d4\u05d6\u05df \u05e9\u05dd \u05de\u05dc\u05d0';errDiv.style.display='block';submitBtn.disabled=false;submitBtn.textContent='\u05e6\u05d5\u05e8 \u05d7\u05e9\u05d1\u05d5\u05df';return;}
      var res2=await supaSignUp(email,pass,name);
      if(res2.user||res2.id){
        okDiv.textContent='\u05e0\u05e8\u05e9\u05de\u05ea \u05d1\u05d4\u05e6\u05dc\u05d7\u05d4! \u05d0\u05e4\u05e9\u05e8 \u05dc\u05d4\u05ea\u05d7\u05d1\u05e8 \u05e2\u05db\u05e9\u05d9\u05d5';
        okDiv.style.display='block';
        showLogin();
        emailInp.value=email; passInp.value='';
      } else {
        errDiv.textContent=(res2.error_description||res2.msg||'\u05e9\u05d2\u05d9\u05d0\u05d4 \u05d1\u05d4\u05e8\u05e9\u05de\u05d4');
        errDiv.style.display='block';
      }
      submitBtn.disabled=false; submitBtn.textContent='\u05e6\u05d5\u05e8 \u05d7\u05e9\u05d1\u05d5\u05df';
    }
  };

  // Enter key
  [emailInp,passInp,nameInp].forEach(function(inp){
    inp.onkeydown=function(e){if(e.key==='Enter')submitBtn.click();};
  });

  wrap.appendChild(card);
  app.appendChild(wrap);
}

async function renderTeacher(app){
  app.innerHTML='';

  // Loading
  var loading=ce('div',{style:'padding:40px;text-align:center;color:#6e6e73',textContent:'\u05d8\u05d5\u05e2\u05df \u05e0\u05ea\u05d5\u05e0\u05d9\u05dd...'});
  app.appendChild(loading);

  // Load all reports
  var reports=await cloudLoadReports();
  loading.remove();

  // Group by student
  var students={};
  reports.forEach(function(r){
    var key=r._studentName||r.user_id||'\u05dc\u05d0 \u05d9\u05d3\u05d5\u05e2';
    if(!students[key]) students[key]={name:key,reports:[],total:0};
    var tp=(r.parts||[]).reduce(function(s,p){return s+(Number(p.price)||0);},0);
    var tl=(r.laborItems||[]).reduce(function(s,l){return s+(Number(l.hours)||0)*180;},0);
    students[key].total+=(tp+tl)*(1.17);
    students[key].reports.push(r);
  });
  var studentArr=Object.values(students);

  // Stats
  var stats=ce('div',{className:'teacher-stats'});
  [[studentArr.length,'\u05ea\u05dc\u05de\u05d9\u05d3\u05d9\u05dd'],[reports.length,'\u05e9\u05d5\u05de\u05d5\u05ea \u05e1\u05d4\u05f4\u05db'],[reports.filter(function(r){return r.reportType==='defacto';}).length,'\u05d0\u05d5\u05d1\u05d3\u05df \u05dc\u05d4\u05dc\u05db\u05d4'],[reports.filter(function(r){return r.reportType==='total';}).length,'\u05d0\u05d5\u05d1\u05d3\u05df \u05db\u05dc\u05dc\u05d9']].forEach(function(s){
    var st=ce('div',{className:'teacher-stat'});
    st.appendChild(ce('div',{className:'teacher-stat-n',textContent:String(s[0])}));
    st.appendChild(ce('div',{className:'teacher-stat-l',textContent:s[1]}));
    stats.appendChild(st);
  });

  var wrap=ce('div',{className:'teacher-view'});
  wrap.appendChild(stats);

  // Students list
  var listTitle=ce('div',{style:'font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#999;margin-bottom:12px',textContent:'\u05e9\u05d5\u05de\u05d5\u05ea \u05dc\u05e4\u05d9 \u05ea\u05dc\u05de\u05d9\u05d3'});

async function doLookup(){
  var inp=document.getElementById("lplate");
  var msg=document.getElementById("lmsg");
  if(!inp||!msg)return;
  var plate=inp.value.replace(/[^0-9]/g,"");
  if(plate.length<5){msg.textContent="?";return;}
  msg.textContent="...";
  var datasets=["053cea08-09bc-40ec-8f7a-156f0677aff3","03adc637-b6fe-402b-9937-7c3d3afc9140"];
  for(var di=0;di<datasets.length;di++){
    try{
      var url="https://data.gov.il/api/3/action/datastore_search?resource_id="+datasets[di]+"&q="+plate+"&limit=5";
      var _ctrl1=new AbortController(); var _tid1=setTimeout(function(){_ctrl1.abort();},6000);
      var res=await fetch(url,{signal:_ctrl1.signal}); clearTimeout(_tid1);
      if(!res.ok)continue;
      var data=await res.json();
      if(data&&data.result&&data.result.records&&data.result.records.length>0){
        var rec=data.result.records.find(function(r){return String(r.mispar_rechev||"")===plate;})||data.result.records[0];
        S.form.licenseNum=String(rec.mispar_rechev||"");
        S.form.carMake=rec.tozeret_nm||rec.tozeret_cd_nm||"";
        S.form.carModel=rec.kinuy_mishari||rec.degem_nm||"";
        S.form.carYear=String(rec.shnat_yitzur||"");
        S.form.vin=rec.misgeret||"";
        S.form.color=rec.tzeva_rechev||"";
        S.form.fuelType=rec.sug_delek_nm||"";
        S.form.engineCC=rec.nefah_manoa?String(rec.nefah_manoa):"";
        S.form.gearbox=rec.automatic_ind?(String(rec.automatic_ind)==="1"?GEAR_OPTS[1]:GEAR_OPTS[2]):"";
        S.form.licenseExpiry=rec.tokef_dt||"";
        S.form.firstRegistration=rec.moed_aliya_lakvish||"";
        msg.style.color="#1d7a4a";
        msg.textContent="✓ \u05e0\u05de\u05e6\u05d0: "+S.form.carMake+" "+S.form.carModel+" "+S.form.carYear;
        // Show history
        var hist=getVehicleHistory(plate);
        if(hist.length>0){
          var hNote=document.getElementById("veh-history-note");
          if(!hNote){hNote=document.createElement("div");hNote.id="veh-history-note";hNote.style.cssText="font-size:11px;color:#8a5a00;background:rgba(138,90,0,.1);padding:6px 10px;border-radius:6px;margin-top:6px";}
          hNote.textContent="⚠ "+hist.length+" \u05e9\u05d5\u05de\u05d5\u05ea \u05e7\u05d5\u05d3\u05de\u05d5\u05ea \u05e0\u05de\u05e6\u05d0\u05d5 \u05dc\u05e8\u05db\u05d1 \u05d6\u05d4";
          if(!document.getElementById("veh-history-note"))lmsg.parentNode.appendChild(hNote);
        }
        // Try NHTSA for extra specs if we have a VIN
        if(S.form.vin&&S.form.vin.length>=11){
          fetchNHTSASpecs(S.form.vin,S.form.carYear);
        }
        render(); return;
      }
    }catch(e){continue;}
  }
  msg.textContent="Not found";
}

function doDuplicate(id){
  var reports=loadReports();
  var r=reports.find(function(x){return x.id===id;});
  if(!r)return;
  var d=new Date();
  var m=d.getMonth()+1;
  var newR=JSON.parse(JSON.stringify(r));
  newR.id=Date.now().toString();
  newR.createdAt=Date.now();
  newR.caseNumber=d.getFullYear()+"-"+(m<10?"0":"")+m+"-"+Math.floor(Math.random()*9000+1000);
  newR.incidentDate="";
  newR.inspectionDate=d.toISOString().slice(0,10);
  newR.policyNum=""; newR.claimNum="";
  saveReport(newR);
  render();
}
function doEdit(id){
  var reports=loadReports();
  var r=reports.find(function(x){return x.id===id;});

// ═══ NHTSA VIN SPECS ═══
async function fetchNHTSASpecs(vin,year){
  var msgEl=document.getElementById("lmsg");
  if(msgEl) msgEl.textContent="\u05d8\u05d5\u05e2\u05df \u05e0\u05ea\u05d5\u05e0\u05d9\u05dd \u05e0\u05d5\u05e1\u05e4\u05d9\u05dd...";
  try{
    var url="https://vpic.nhtsa.dot.gov/api/vehicles/decodevinvalues/"+encodeURIComponent(vin)+"?format=json"+(year?"&modelyear="+year:"");
    var _ctrl2=new AbortController(); var _tid2=setTimeout(function(){_ctrl2.abort();},8000);
    var res=await fetch(url,{signal:_ctrl2.signal}); clearTimeout(_tid2);
    if(!res.ok)throw new Error("HTTP "+res.status);
    var data=await res.json();
    if(!data.Results||!data.Results[0])throw new Error("No results");
    var r=data.Results[0];
    var specs={};
    // Airbags
    var airbagParts=[];
    if(r.AirBagLocFront&&r.AirBagLocFront!=="Not Applicable")airbagParts.push("\u05e7\u05d3\u05de\u05d9\u05ea: "+r.AirBagLocFront);
    if(r.AirBagLocSide&&r.AirBagLocSide!=="Not Applicable")airbagParts.push("\u05e6\u05d3\u05d3\u05d9\u05ea: "+r.AirBagLocSide);
    if(r.AirBagLocCurtain&&r.AirBagLocCurtain!=="Not Applicable")airbagParts.push("\u05d5\u05d9\u05dc\u05d5\u05df: "+r.AirBagLocCurtain);
    if(r.AirBagLocKnee&&r.AirBagLocKnee!=="Not Applicable")airbagParts.push("\u05d1\u05e8\u05db\u05d9\u05d9\u05dd: "+r.AirBagLocKnee);
    if(airbagParts.length>0) specs.airbags=airbagParts.join(" | ");
    // Safety
    if(r.TPMS&&r.TPMS!=="Not Applicable")specs.tpms=r.TPMS;
    if(r.ESC&&r.ESC!=="Not Applicable")specs.esc=r.ESC;
    if(r.ABS&&r.ABS!=="Not Applicable")specs.abs=r.ABS;
    if(r.SeatBeltsAll&&r.SeatBeltsAll!=="Not Applicable")specs.seatbelts=r.SeatBeltsAll;
    // Steering
    if(r.SteeringLocation&&r.SteeringLocation!=="Not Applicable")specs.steering=r.SteeringLocation;
    // Drivetrain
    if(r.DriveType&&r.DriveType!=="Not Applicable")specs.drivetrain=r.DriveType;
    if(r.TransmissionStyle&&r.TransmissionStyle!=="Not Applicable")specs.transmission=r.TransmissionStyle;
    if(r.TransmissionSpeeds&&r.TransmissionSpeeds!=="Not Applicable"&&r.TransmissionSpeeds!=="")specs.transmissionSpeeds=r.TransmissionSpeeds+" \u05d4\u05d9\u05dc\u05d5\u05db\u05d9\u05dd";
    // Engine
    if(r.EngineCylinders&&r.EngineCylinders!=="Not Applicable"&&r.EngineCylinders!=="")specs.cylinders=r.EngineCylinders+" \u05e6\u05d9\u05dc\u05d9\u05e0\u05d3\u05e8\u05d9\u05dd";
    if(r.EngineHP&&r.EngineHP!=="Not Applicable"&&r.EngineHP!=="")specs.hp=r.EngineHP+" \u05db\u05d5\u05d7 \u05e1\u05d5\u05e1";
    if(r.DisplacementL&&r.DisplacementL!=="Not Applicable"&&r.DisplacementL!=="")specs.engL=parseFloat(r.DisplacementL).toFixed(1)+"L";
    // Body
    if(r.Doors&&r.Doors!=="Not Applicable"&&r.Doors!=="")specs.doors=r.Doors+" \u05d3\u05dc\u05ea\u05d5\u05ea";
    if(r.Seats&&r.Seats!=="Not Applicable"&&r.Seats!=="")specs.seats=r.Seats+" \u05de\u05d5\u05e9\u05d1\u05d9\u05dd";
    if(r.BodyClass&&r.BodyClass!=="Not Applicable")specs.body=r.BodyClass;
    if(r.Series&&r.Series!=="Not Applicable"&&r.Series!=="")specs.series=r.Series;
    if(r.Trim&&r.Trim!=="Not Applicable"&&r.Trim!=="")specs.trim=r.Trim;
    // Country
    if(r.PlantCountry&&r.PlantCountry!=="Not Applicable")specs.plant=r.PlantCountry+(r.PlantCity?", "+r.PlantCity:"");
    if(Object.keys(specs).length>0){
      S.form.nhtsaSpecs=specs;
      if(msgEl) msgEl.textContent="\u2713 \u05e0\u05ea\u05d5\u05e0\u05d9\u05dd \u05e0\u05d5\u05e1\u05e4\u05d9\u05dd \u05e0\u05d8\u05e2\u05e0\u05d5";
      render();
    } else {
      if(msgEl) msgEl.textContent="\u05e0\u05ea\u05d5\u05e0\u05d9\u05dd \u05e0\u05d5\u05e1\u05e4\u05d9\u05dd \u05dc\u05d0 \u05e0\u05de\u05e6\u05d0\u05d5 \u05dc-VIN \u05d6\u05d4";
    }
  }catch(e){
    if(msgEl) msgEl.textContent="\u2713 " + (S.form.carMake||"") + " " + (S.form.carModel||"");
  }
}

// ═══ LEVI YITZHAK PRICE LIST SCANNER ═══
async function scanLeviYitzhak(file){
  var statusEl=document.getElementById("leviStatus");
  if(statusEl){
    statusEl.style.color="#0071e3";
    statusEl.textContent="\u05e1\u05d5\u05e8\u05e7 \u05d0\u05ea \u05d4\u05ea\u05de\u05d5\u05e0\u05d4...";
  }
  try{
    // Convert image to base64
    var base64=await new Promise(function(resolve,reject){
      var reader=new FileReader();
      reader.onload=function(e){resolve(e.target.result.split(",")[1]);};
      reader.onerror=reject;
      reader.readAsDataURL(file);
    });
    var mediaType=file.type||"image/jpeg";

    // Build prompt for Claude
    var prompt_text="This is an image from an Israeli vehicle price list (\u05de\u05d7\u05d9\u05e8\u05d5\u05df \u05dc\u05d5\u05d9 \u05d9\u05e6\u05d7\u05e7 or similar). Please extract the following information and respond ONLY with a valid JSON object, no markdown, no explanation:\n{\n  \"baseValue\": <the main vehicle base price as a number, no commas>,\n  \"modelName\": <vehicle model name as string>,\n  \"year\": <year as string>,\n  \"kmAdj\": <km adjustment value as number, negative if deduction, 0 if not found>,\n  \"ownersAdj\": <ownership adjustment as number, negative if deduction, 0 if not found>,\n  \"extras\": <extras/additions total as number, 0 if not found>,\n  \"totalValue\": <final assessed value as number, no commas>,\n  \"notes\": <any important notes from the page as string>\n}\nIf a value is not found in the image, use 0 for numbers and empty string for strings.";

    var response=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-6",
        max_tokens:1000,
        messages:[{
          role:"user",
          content:[
            {type:"image",source:{type:"base64",media_type:mediaType,data:base64}},
            {type:"text",text:prompt_text}
          ]
        }]
      })
    });

    if(!response.ok)throw new Error("API error "+response.status);
    var data=await response.json();
    var text=data.content&&data.content[0]&&data.content[0].text;
    if(!text)throw new Error("No response");

    // Parse JSON response
    var clean=text.replace(/```json|```/g,"").trim();
    var result=JSON.parse(clean);

    // Fill form fields
    if(result.baseValue&&Number(result.baseValue)>0){
      S.form.baseValue=String(result.baseValue);
    }
    if(result.kmAdj&&Number(result.kmAdj)!==0){
      S.form.kmAdj=String(result.kmAdj);
    }
    if(result.ownersAdj&&Number(result.ownersAdj)!==0){
      S.form.ownersAdj=String(result.ownersAdj);
    }
    if(result.extras&&Number(result.extras)>0){
      S.form.extras=String(result.extras);
    }
    // Update vehicle value
    var v=(Number(S.form.baseValue)||0)+(Number(S.form.kmAdj)||0)+(Number(S.form.ownersAdj)||0)+(Number(S.form.extras)||0);
    if(S.form.baseValue) S.form.vehicleValue=String(v);

    // Update model name if form is empty
    if(!S.form.carModel&&result.modelName) S.form.carModel=result.modelName;
    if(!S.form.carYear&&result.year) S.form.carYear=result.year;

    if(statusEl){
      statusEl.style.color="#1d7a4a";
      statusEl.textContent="\u2713 "+
        (result.baseValue?"\u05e2\u05e8\u05da \u05d1\u05e1\u05d9\u05e1: "+Number(result.baseValue).toLocaleString("he-IL")+" \u05e9\u05e7\u05dc":"\u05dc\u05d0 \u05e0\u05de\u05e6\u05d0 \u05e2\u05e8\u05da")+
        (result.totalValue?" | \u05de\u05e9\u05d5\u05e2\u05e8\u05da: "+Number(result.totalValue).toLocaleString("he-IL")+" \u05e9\u05e7\u05dc":"");
    }
    render();

  }catch(err){
    if(statusEl){
      statusEl.style.color="#c0392b";
      var errMsg="\u05e9\u05d2\u05d9\u05d0\u05d4 \u05d1\u05e7\u05e8\u05d9\u05d0\u05ea \u05d4\u05ea\u05de\u05d5\u05e0\u05d4";
      if(err&&err.message&&err.message.indexOf("JSON")>=0){

}

function getBrandMult(make){
  if(!make)return 1;
  var m=make.toUpperCase().trim();
  for(var k in BRAND_MULT){if(m.indexOf(k)>=0)return BRAND_MULT[k];}
  return 1;
}
function applyBrandPricing(parts,make){
  var mult=getBrandMult(make);
  if(mult===1)return parts;
  return parts.map(function(p){return Object.assign({},p,{p:Math.round(p.p*mult/10)*10});});
}

// ═══ SIGNATURE ═══
function initSigCanvas(canvasEl){
  if(!canvasEl)return;
  var ctx=canvasEl.getContext("2d");
  var drawing=false;
  var rect;
  function getPos(e){
    rect=canvasEl.getBoundingClientRect();
    var touch=e.touches?e.touches[0]:e;
    return {x:(touch.clientX-rect.left)*(canvasEl.width/rect.width),y:(touch.clientY-rect.top)*(canvasEl.height/rect.height)};
  }
  function start(e){e.preventDefault();drawing=true;var p=getPos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);}
  function move(e){e.preventDefault();if(!drawing)return;var p=getPos(e);ctx.lineTo(p.x,p.y);ctx.strokeStyle="#1d1d1f";ctx.lineWidth=2;ctx.lineCap="round";ctx.stroke();}
  function stop(e){drawing=false;S.sigData=canvasEl.toDataURL();}
  canvasEl.addEventListener("mousedown",start);canvasEl.addEventListener("mousemove",move);canvasEl.addEventListener("mouseup",stop);
  canvasEl.addEventListener("touchstart",start,{passive:false});canvasEl.addEventListener("touchmove",move,{passive:false});canvasEl.addEventListener("touchend",stop);
  // Restore previous signature
  if(S.sigData){var img=new Image();img.onload=function(){ctx.drawImage(img,0,0);};img.src=S.sigData;}
}
function clearSig(){
  var c=document.getElementById("sigCanvas");
  if(c){c.getContext("2d").clearRect(0,0,c.width,c.height);}
  S.sigData=null;
}

async function backupToDrive(){
  var reports=loadReports();
  if(!reports.length){alert("\u05d0\u05d9\u05df \u05e9\u05d5\u05de\u05d5\u05ea \u05dc\u05d2\u05d9\u05d1\u05d5\u05d9");return;}
  try{
    var data=JSON.stringify({version:1,exported:new Date().toISOString(),reports:reports},null,2);
    var filename="\u05e9\u05d5\u05de\u05d5\u05ea_\u05e8\u05db\u05d1_"+new Date().toLocaleDateString("he-IL").replace(/[\/\\]/g,"-")+".json";
    // Use fetch to call Google Drive API via MCP
    var boundary="boundary"+Date.now();
    var meta=JSON.stringify({name:filename,mimeType:"application/json",parents:["root"]});
    var body="--"+boundary+"\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n"+meta+"\r\n--"+boundary+"\r\nContent-Type: application/json\r\n\r\n"+data+"\r\n--"+boundary+"--";
    var resp=await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart",{
      method:"POST",
      headers:{"Content-Type":"multipart/related; boundary="+boundary,"Authorization":"Bearer __GDRIVE_TOKEN__"},
      body:body
    });
    if(resp.ok){alert("\u05d2\u05d9\u05d1\u05d5\u05d9 \u05d1\u05d5\u05e6\u05e2 \u05d1-Google Drive: "+filename);}
    else{throw new Error("HTTP "+resp.status);}
  }catch(e){
    // Fallback: download JSON file
    alert("\u05d2\u05d9\u05d1\u05d5\u05d9 \u05d0\u05d5\u05d8\u05d5\u05de\u05d8\u05d9 \u05dc\u05d0 \u05d6\u05de\u05d9\u05df — \u05de\u05d5\u05e8\u05d9\u05d3 \u05e7\u05d5\u05d1\u05e5 \u05d1\u05d9\u05e6\u05d5\u05d0\u05d9 \u05d1\u05de\u05e7\u05d5\u05dd");
    exportAllJSON();
  }
}

  };
  reader.readAsText(file);
}
